<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<!-- native pinch-zoom OFF: it scales the whole visual viewport (composer, strip, pins) not
     just the pdf (his catch, 2026-07-04). The pdf gets its own contained zoom (the lightbox);
     the UI stays put. -->
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<title>review</title>
<style>
  :root{
    --bg:#0e1116; --panel:#141a23; --panel2:#1a212c; --edge:#222a36; --edge2:#2d3744;
    --ink:#d7dee8; --ink2:#9aa5b4; --dim:#6b7689;
    --accent:#7aa2f7; --teal:#5ee6b0; --warn:#e0af68; --bad:#f7768e; --ok:#9ece6a; --keystone:#bb9af7;
    --mono:"Cascadia Code","SF Mono","Consolas",monospace;
    --dur:150ms; --ease:cubic-bezier(.2,.7,.3,1);
    --drawer:0px;             /* desktop side-panel width, 0 when closed */
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font:15px/1.5 -apple-system,"Segoe UI",system-ui,sans-serif;overscroll-behavior-y:none}
  body{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}
  ::selection{background:rgba(122,162,247,.4)}
  button{font:inherit;cursor:pointer}
  .hidden{display:none!important}

  /* ---- unlock ---- */
  #lock{position:fixed;inset:0;z-index:100;background:var(--bg);display:flex;
    align-items:center;justify-content:center;flex-direction:column;gap:14px;padding:24px}
  #lock .glyph{font-size:30px}
  #lock h1{font-size:17px;font-weight:600;margin:0;color:var(--ink)}
  #lock .sub{color:var(--dim);font-size:12.5px;font-family:var(--mono);text-align:center}
  #lock form{display:flex;flex-direction:column;gap:10px;width:min(320px,86vw)}
  #lock input[type=password]{background:var(--panel);border:1px solid var(--edge2);color:var(--ink);
    padding:12px 14px;border-radius:9px;font:inherit}
  #lock input:focus{outline:none;border-color:var(--accent)}
  #lock button{background:var(--accent);border:0;color:#0b0d11;padding:12px;border-radius:9px;font-weight:600}
  #lock label{display:flex;gap:7px;align-items:center;color:var(--ink2);font-size:13px}
  #lock .msg{color:var(--dim);font-size:12px;min-height:16px;font-family:var(--mono)}
  #lock .msg.bad{color:var(--bad)}

  /* ---- top bar ---- */
  #top{flex:none;display:flex;align-items:center;gap:10px;padding:9px 12px;
    border-bottom:1px solid var(--edge);background:var(--panel);z-index:20}
  #top .ttl{font-weight:600;color:var(--accent);font-size:14px}
  #top .stamp{font-family:var(--mono);font-size:10.5px;color:var(--dim);
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
  #top .tbtn{background:var(--panel2);border:1px solid var(--edge2);color:var(--ink);
    border-radius:8px;padding:6px 11px;font-size:13px}
  #top .tbtn:hover{border-color:var(--accent);color:var(--accent)}
  #top .tbtn.on{border-color:var(--accent);color:var(--accent)}
  #top .badge{font-family:var(--mono);font-size:10px;color:var(--warn);margin-left:2px}
  /* the sync pill — the anti-disappearance signal: it is IMPOSSIBLE to miss whether a
     comment is only on this device or safely in your repo (his fear, 2026-07-03). */
  #top .pill{font-size:12px;padding:5px 11px;border-radius:8px;cursor:pointer;font-weight:600;
    white-space:nowrap;max-width:52vw;overflow:hidden;text-overflow:ellipsis}
  #top .pill.warn{background:rgba(224,175,104,.16);color:var(--warn);border:1px solid var(--warn)}
  #top .pill.push{background:rgba(122,162,247,.14);color:var(--accent);border:1px solid var(--accent)}
  #top .pill.ok{background:rgba(158,206,106,.14);color:var(--ok);border:1px solid var(--ok)}

  /* ---- body: reader | drawer ---- */
  #body{flex:1;display:flex;min-height:0;position:relative}
  #reader{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;
    padding:14px 12px 40vh;scroll-behavior:smooth}
  .pg{position:relative;margin:0 auto 16px;max-width:900px;background:#fff;
    box-shadow:0 2px 16px rgba(0,0,0,.5);min-height:120px;border-radius:2px}
  .pg img{display:block;width:100%;height:auto;border-radius:2px;
    touch-action:pinch-zoom;-webkit-user-select:none;user-select:none}
  .pg .ph{aspect-ratio:8.5/11;display:flex;align-items:center;justify-content:center;
    color:#8a8f98;font-family:var(--mono);font-size:11px;background:
    repeating-linear-gradient(-45deg,#eceef1,#eceef1 10px,#e2e4e8 10px,#e2e4e8 20px)}
  .pgnum{position:absolute;top:5px;right:7px;font-family:var(--mono);font-size:10px;
    color:var(--dim);background:rgba(14,17,22,.72);border-radius:4px;padding:1px 6px;z-index:3}
  .pgzoom{position:absolute;top:4px;left:6px;z-index:5;background:rgba(14,17,22,.72);
    border:1px solid var(--edge2);color:var(--ink);border-radius:6px;padding:3px 8px;
    font-size:14px;line-height:1;cursor:pointer}
  .pgzoom:hover{border-color:var(--accent);color:var(--accent)}
  /* the pdf zoom lightbox: ONE page, its own transform-based pinch/pan, fully contained so
     it never touches the reading UI. Native page zoom stays off. */
  #zoom{position:fixed;inset:0;z-index:60;background:#0b0d11;display:none;
    touch-action:none;overflow:hidden;user-select:none}
  #zoom.on{display:block}
  #zoom img{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform;
    -webkit-user-drag:none;user-select:none;pointer-events:none}
  #zoom .zbar{position:fixed;left:0;right:0;bottom:0;z-index:61;display:flex;gap:8px;
    align-items:center;justify-content:center;padding:10px calc(10px + env(safe-area-inset-bottom));
    background:linear-gradient(transparent,rgba(11,13,17,.85) 40%)}
  #zoom .zbar button{background:var(--panel);border:1px solid var(--edge2);color:var(--ink);
    border-radius:9px;padding:9px 16px;font-size:17px;line-height:1;min-width:48px}
  #zoom .zbar button:active{border-color:var(--accent)}
  #zoom .zclose{position:fixed;top:calc(8px + env(safe-area-inset-top));right:10px;z-index:61;
    background:var(--panel);border:1px solid var(--edge2);color:var(--ink);border-radius:9px;
    padding:8px 14px;font-size:15px}
  #zoom .zhint{position:fixed;top:calc(10px + env(safe-area-inset-top));left:12px;z-index:61;
    font-family:var(--mono);font-size:11px;color:var(--dim)}
  /* the transparent, selectable text layer (word boxes) */
  .txt{position:absolute;inset:0;overflow:hidden;z-index:2}
  .txt span{position:absolute;color:transparent;white-space:pre;cursor:text;transform-origin:0 0}
  .txt span::selection{background:rgba(122,162,247,.45);color:transparent}
  .hl{position:absolute;background:rgba(224,175,74,.30);border-radius:1px;pointer-events:none;z-index:1}
  .hl.resolved{background:rgba(158,206,106,.24)}
  .pin{position:absolute;width:17px;height:17px;border-radius:50%;background:var(--warn);
    border:2px solid #0b0d11;transform:translate(-50%,-50%);z-index:4;cursor:pointer;
    box-shadow:0 1px 4px rgba(0,0,0,.5)}
  .pin.resolved{background:var(--ok);opacity:.6}
  .pin.queued{background:var(--accent)}
  .pin.flash{animation:pf 1.1s ease-out 2}
  @keyframes pf{0%{box-shadow:0 0 0 0 rgba(224,175,104,.9)}70%{box-shadow:0 0 0 15px rgba(224,175,104,0)}}

  /* ---- anchor strip (tap → provenance + comment) ---- */
  #strip{position:fixed;left:0;right:0;bottom:0;z-index:30;background:var(--panel);
    border-top:1px solid var(--edge2);padding:9px 12px calc(9px + env(safe-area-inset-bottom));
    display:flex;gap:10px;align-items:center;transform:translateY(110%);
    transition:transform 200ms var(--ease)}
  #strip.up{transform:translateY(0)}
  #strip .prov{flex:1;min-width:0;font-size:12px}
  #strip .prov .sec{color:var(--accent);font-weight:600}
  #strip .prov .loc{font-family:var(--mono);font-size:10.5px;color:var(--dim)}
  #strip .prov .quote{color:var(--ink2);font-style:italic;overflow:hidden;text-overflow:ellipsis;
    white-space:nowrap;display:block;margin-top:1px}
  #strip .cbtn{flex:none;background:var(--accent);border:0;color:#0b0d11;font-weight:600;
    border-radius:8px;padding:9px 14px}
  #strip .xbtn{flex:none;background:none;border:0;color:var(--dim);font-size:18px;padding:2px 6px}

  /* ---- sheets / drawer ---- */
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:40;background:var(--panel);
    border-top:1px solid var(--edge2);border-radius:14px 14px 0 0;
    padding:14px 14px calc(14px + env(safe-area-inset-bottom));max-height:82vh;overflow-y:auto;
    transform:translateY(110%);transition:transform 220ms var(--ease);
    box-shadow:0 -6px 30px rgba(0,0,0,.5)}
  .sheet.up{transform:translateY(0)}
  .sheet h3{margin:0 0 10px;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim)}
  /* a real drag handle: small visible bar, large transparent hit area, so it can be
     grabbed and pulled down to dismiss the sheet (his mobile catch, 2026-07-04) */
  .grip{height:5px;width:56px;border-radius:3px;background:var(--edge2);margin:0 auto 8px;
    box-sizing:content-box;padding:11px 60px;background-clip:content-box;cursor:grab;
    touch-action:none;-webkit-tap-highlight-color:transparent}
  .grip:active{cursor:grabbing}
  .pghl.pending{background:rgba(122,162,247,.30)}
  #compose select,#compose textarea{width:100%;background:var(--bg);color:var(--ink);
    border:1px solid var(--edge2);border-radius:9px;font:inherit;padding:10px 12px;margin-bottom:10px}
  #compose textarea{min-height:96px;resize:vertical;font-size:15px}
  #compose select:focus,#compose textarea:focus{outline:none;border-color:var(--accent)}
  #compose .chips{margin:-2px 0 10px}
  .chip{display:inline-block;font-family:var(--mono);font-size:11px;border:1px solid var(--edge2);
    border-radius:7px;padding:3px 9px;margin:3px 5px 0 0;color:var(--ink2)}
  .chip.sel{border-color:var(--accent);color:var(--accent)}
  #compose .quote{font-family:var(--mono);font-size:11.5px;border-left:2px solid var(--accent);
    padding:4px 9px;margin:0 0 10px;color:var(--dim);max-height:76px;overflow:auto;white-space:pre-wrap}
  #compose .row{display:flex;gap:10px;align-items:center}
  #compose .bank{flex:1;background:var(--accent);border:0;color:#0b0d11;font-weight:600;
    border-radius:9px;padding:12px}
  #compose .bank:disabled{opacity:.5}
  #compose .cancel{background:var(--panel2);border:1px solid var(--edge2);color:var(--ink);
    border-radius:9px;padding:12px 16px}
  #compose .msg{font-family:var(--mono);font-size:11px;color:var(--dim);margin-top:8px;min-height:15px}
  #compose .msg.bad{color:var(--bad)} #compose .msg.ok{color:var(--ok)}

  /* the drawer content (comments / spans / contents / settings) */
  #drawer .tabs{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
  #drawer .tab{background:var(--panel2);border:1px solid var(--edge2);color:var(--ink2);
    border-radius:8px;padding:6px 12px;font-size:12.5px}
  #drawer .tab.on{border-color:var(--accent);color:var(--accent)}
  .frow{padding:10px 12px;border:1px solid var(--edge);border-radius:9px;background:var(--panel2);
    margin-bottom:8px}
  .frow .fh{display:flex;gap:7px;align-items:center;margin-bottom:4px}
  .frow .fk{font-size:9px;font-weight:700;text-transform:uppercase;color:#0b0d11;background:var(--warn);
    border-radius:4px;padding:1px 6px}
  .frow.resolved .fk{background:var(--ok)} .frow.queued .fk{background:var(--accent)}
  .frow .fa{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--dim)}
  .frow .fb{font-size:13px;color:var(--ink)}
  .frow .fn{font-family:var(--mono);font-size:10.5px;color:var(--teal);margin-top:3px}
  .frow .facts{margin-top:7px;display:flex;gap:7px}
  .frow .facts button{background:var(--panel);border:1px solid var(--edge2);color:var(--ink2);
    border-radius:6px;padding:4px 12px;font-size:12px;cursor:pointer}
  .frow .facts button:hover{border-color:var(--accent);color:var(--accent)}
  .frow .facts button[data-del]:hover{border-color:var(--bad);color:var(--bad)}
  .srow{padding:8px 11px;border:1px solid var(--edge);border-radius:8px;background:var(--panel2);margin-bottom:6px}
  .srow .ss{font-weight:600;color:var(--accent);font-size:12.5px}
  .srow .sl{font-family:var(--mono);font-size:10px;color:var(--dim);margin-left:6px}
  .srow .snodes{margin-top:4px}
  .srow .nd{font-family:var(--mono);font-size:10.5px;color:var(--teal);display:inline-block;margin:2px 6px 0 0}
  .crow{padding:8px 11px;border:1px solid var(--edge);border-radius:8px;background:var(--panel2);margin-bottom:6px}
  .crow .ci{font-family:var(--mono);font-size:11px;color:var(--teal)}
  .crow .ce{font-size:12px;color:var(--ink2);margin-top:2px}
  #settings label{display:block;font-size:12.5px;color:var(--ink2);margin:12px 0 5px}
  #settings input{width:100%;background:var(--bg);border:1px solid var(--edge2);color:var(--ink);
    border-radius:8px;padding:10px 12px;font:inherit;font-size:13px}
  #settings .hint{font-size:11px;color:var(--dim);margin-top:5px;line-height:1.5}
  #settings .act{margin-top:14px;display:flex;gap:8px;flex-wrap:wrap}
  #settings .act button{background:var(--panel2);border:1px solid var(--edge2);color:var(--ink);
    border-radius:8px;padding:9px 13px;font-size:12.5px}
  #settings .act button.warn{border-color:var(--bad);color:var(--bad)}
  .kv{font-family:var(--mono);font-size:11px;color:var(--dim);margin:3px 0}
  .empty{color:var(--dim);font-size:12.5px;padding:16px;text-align:center;line-height:1.6}
  .backdrop{position:fixed;inset:0;z-index:35;background:rgba(0,0,0,.45);opacity:0;
    pointer-events:none;transition:opacity 200ms}
  .backdrop.on{opacity:1;pointer-events:auto}
  .spin{display:inline-block;width:12px;height:12px;border-radius:50%;border:2px solid var(--edge2);
    border-top-color:var(--accent);animation:sp .7s linear infinite;vertical-align:-2px;margin-right:6px}
  @keyframes sp{to{transform:rotate(360deg)}}

  /* ---- desktop: the drawer becomes a docked right panel ---- */
  @media (min-width:860px){
    #reader{padding:20px 20px 24px}
    /* docked side panel: it must be a FLEX COLUMN that fills the row height and scrolls
       internally — height:auto let it grow past the viewport so its lower buttons (save
       token, forget, close) sat off-screen and unclickable with a real mouse (his catch,
       2026-07-03: "settings buttons don't actually seem to work"). min-height:0 + a bounded
       height is what makes overflow-y:auto engage. */
    body.dock #drawer{position:static;transform:none!important;border-radius:0;
      border-top:0;border-left:1px solid var(--edge2);width:380px;flex:none;max-height:none;
      box-shadow:none;min-height:0;overflow-y:auto;align-self:stretch}
    body.dock #drawer .grip{display:none}
    body.dock #drawer .dclose{display:none}
    body.dock #body{display:flex}
    /* the docked panel occupies the right 380px; keep the anchor strip, the composer
       and the backdrop clear of it so the comment button is never hidden underneath
       (his desktop catch, 2026-07-03). Only when the panel is actually open. */
    body.dock.drawer-open #strip,
    body.dock.drawer-open #compose,
    body.dock.drawer-open #backdrop{right:380px}
  }
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:var(--edge2);border-radius:6px;border:2px solid transparent;background-clip:padding-box}
</style>
</head>
<body>

<div id="lock">
  <div class="glyph">&#128273;</div>
  <h1 id="lockttl">review bundle</h1>
  <div class="sub" id="lockstamp"></div>
  <form id="lockform">
    <input type="password" id="pw" placeholder="passphrase" autocomplete="current-password" autofocus>
    <label><input type="checkbox" id="remember" checked> remember on this device</label>
    <button type="submit">open</button>
    <div class="msg" id="lockmsg">nothing decrypts on the server — the bytes are scrambled under your passphrase</div>
  </form>
</div>

<div id="top" class="hidden">
  <span class="ttl">review</span>
  <span class="stamp" id="stamp"></span>
  <span class="pill" id="syncpill" style="display:none" role="button" tabindex="0"></span>
  <button class="tbtn" id="drawerbtn">panel<span class="badge" id="openbadge"></span></button>
</div>

<div id="body" class="hidden">
  <div id="reader"></div>
  <div class="backdrop" id="backdrop"></div>

  <div id="strip">
    <div class="prov" id="stripprov"></div>
    <button class="cbtn" id="stripcomment">comment</button>
    <button class="xbtn" id="stripclose">&times;</button>
  </div>

  <div class="sheet" id="compose">
    <div class="grip"></div>
    <h3 id="compose-h">comment</h3>
    <div class="quote hidden" id="compose-quote"></div>
    <div class="chips" id="compose-chips"></div>
    <select id="compose-kind"></select>
    <textarea id="compose-text" placeholder="the comment — banked verbatim"></textarea>
    <div class="row">
      <button class="bank" id="compose-bank">bank comment</button>
      <button class="cancel" id="compose-cancel">cancel</button>
    </div>
    <div class="msg" id="compose-msg"></div>
  </div>

  <div class="sheet" id="drawer">
    <div class="grip"></div>
    <div class="tabs">
      <button class="tab on" data-t="comments">comments</button>
      <button class="tab" data-t="spans">provenance</button>
      <button class="tab" data-t="contents">contents</button>
      <button class="tab" data-t="settings">settings</button>
    </div>
    <div id="d-comments"></div>
    <div id="d-spans" class="hidden"></div>
    <div id="d-contents" class="hidden"></div>
    <div id="d-settings" class="hidden">
      <div id="settings">
        <label>GitHub token (fine-grained, this repo, Contents: read & write)</label>
        <input type="password" id="pat" placeholder="github_pat_…" autocomplete="off">
        <div class="hint" id="patinfo"></div>
        <label>bundle</label>
        <div class="kv" id="bundleinfo"></div>
        <div class="act">
          <button id="flushnow">flush queued</button>
          <button id="savepat">save token</button>
          <button class="warn" id="forget">forget passphrase on this device</button>
        </div>
      </div>
    </div>
    <button class="cancel dclose" id="drawerclose" style="margin-top:12px;width:100%">close</button>
  </div>
</div>

<div id="zoom">
  <img id="zoomimg" alt="page">
  <span class="zhint" id="zoomhint"></span>
  <button class="zclose" id="zoomclose">&times; close</button>
  <div class="zbar"><button id="zoomout" aria-label="zoom out">&minus;</button>
    <button id="zoomreset">fit</button><button id="zoomin" aria-label="zoom in">+</button></div>
</div>

<script>window.CFG = {"corpus": "subset-sum-itqde", "repo": "phujck/laplace", "inbox_path": "synthetics papers/subset-sum-itqde/manuscript/whitepaper/feedback/inbox", "git_head": "6e8dceb", "branch": "master"};</script>
<script>
(function(){
  "use strict";
  const CFG = window.CFG || {repo:"phujck/laplace", inbox_path:"", corpus:"", branch:"master", git_head:""};
  const $ = id => document.getElementById(id);
  const esc = s => String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const KINDS = ["note","off-voice","imprecise","missing-derivation","refute","figure-standard"];
  const IDB = "laplace-review", KEYSTORE = "keys";
  const LS_OUTBOX = "lr-outbox-"+CFG.corpus, LS_PAT = "lr-pat";

  // ---------- crypto (mirrors site_seal.UNLOCK_JS) ----------
  const ITER = 200000, MAGIC=[76,82,69,86,49,0];
  async function deriveKey(password, salt){
    const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(password),
                 "PBKDF2", false, ["deriveKey"]);
    return crypto.subtle.deriveKey({name:"PBKDF2", salt, iterations:ITER, hash:"SHA-256"},
                 km, {name:"AES-GCM", length:256}, false, ["decrypt"]);
  }
  async function decryptBlob(bytes, key){
    for(let i=0;i<MAGIC.length;i++) if(bytes[i]!==MAGIC[i]) throw new Error("not a review bundle");
    const body=bytes.subarray(MAGIC.length), salt=body.subarray(0,16),
      iv=body.subarray(16,28), ct=body.subarray(28);
    const pt=await crypto.subtle.decrypt({name:"AES-GCM", iv}, key, ct);
    return new Uint8Array(pt);
  }
  // remember the derived (non-extractable) key in IndexedDB — never the passphrase
  function idb(){return new Promise((res,rej)=>{const r=indexedDB.open(IDB,1);
    r.onupgradeneeded=()=>r.result.createObjectStore(KEYSTORE);
    r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
  async function idbSet(k,v){const db=await idb();return new Promise((res,rej)=>{
    const t=db.transaction(KEYSTORE,"readwrite");t.objectStore(KEYSTORE).put(v,k);
    t.oncomplete=()=>res();t.onerror=()=>rej(t.error);});}
  async function idbGet(k){const db=await idb();return new Promise((res)=>{
    const t=db.transaction(KEYSTORE,"readonly"),g=t.objectStore(KEYSTORE).get(k);
    g.onsuccess=()=>res(g.result);g.onerror=()=>res(null);});}
  async function idbDel(k){const db=await idb();return new Promise((res)=>{
    const t=db.transaction(KEYSTORE,"readwrite");t.objectStore(KEYSTORE).delete(k);
    t.oncomplete=()=>res();t.onerror=()=>res();});}

  let DATA=null, KEY=null;

  async function unlock(password, remember, auto){
    const msg=$("lockmsg"); msg.classList.remove("bad"); msg.innerHTML='<span class="spin"></span>deriving key…';
    let raw, salt;
    try{
      const r=await fetch("data.enc",{cache:"no-store"});
      if(!r.ok) throw new Error("data.enc "+r.status);
      raw=new Uint8Array(await r.arrayBuffer());
      for(let i=0;i<MAGIC.length;i++) if(raw[i]!==MAGIC[i]) throw new Error("bad bundle");
      salt=raw.subarray(MAGIC.length, MAGIC.length+16);
    }catch(e){ msg.textContent="could not load bundle ("+e.message+")"; msg.classList.add("bad"); return; }
    let key;
    try{
      key = (password instanceof CryptoKey) ? password : await deriveKey(password, salt);
      const pt = await decryptBlob(raw, key);
      DATA = JSON.parse(new TextDecoder().decode(pt));
      KEY = key;
    }catch(e){
      // a remembered key that no longer matches (the bundle was re-keyed): clear it and
      // fall back to the prompt silently, rather than crying "wrong passphrase" at a user
      // who typed nothing (his catch, 2026-07-03).
      if(auto){ try{ await idbDel("key-"+CFG.corpus); }catch(_){}
        msg.textContent="passphrase needed"; msg.classList.remove("bad"); return; }
      msg.textContent="wrong passphrase"; msg.classList.add("bad"); return;
    }
    if(remember){ try{ await idbSet("key-"+CFG.corpus, key); }catch(e){} }
    boot();
  }

  // ---------- boot the reader ----------
  function boot(){
    $("lock").classList.add("hidden");
    $("top").classList.remove("hidden");
    $("body").classList.remove("hidden");
    $("stamp").textContent = (CFG.git_head?("git "+CFG.git_head+" · "):"") +
      DATA.n_pages+" pp · "+(DATA.corpus||"");
    syncDock();
    loadOutbox();
    // queued comments persisted from a previous visit must reappear as pins + rows,
    // not silently sit invisible until pushed (his "don't disappear" fear, 2026-07-03)
    OUTBOX.forEach(rec=>{ if(!DATA.feedback.some(x=>x.id===rec.id)) DATA.feedback.unshift(rec); });
    renderPages();
    renderDrawer();
    updateBadge();
    window.addEventListener("online", ()=>flushOutbox());
    flushOutbox();
  }

  // ---------- pages (lazy from decrypted memory) ----------
  // Pages are ALREADY in memory (decrypted). Mount them in document order via a small
  // bounded queue — no IntersectionObserver (the codebase flags element-root IO as
  // unreliable; a blank page is exactly the failure the user can't diagnose). This
  // guarantees every page appears, a few decoding at a time so it never janks.
  function renderPages(){
    const R=$("reader"); R.innerHTML="";
    DATA.pages.forEach((uri,i)=>{
      const pg=document.createElement("div"); pg.className="pg"; pg.dataset.page=i+1;
      pg.innerHTML='<div class="ph">page '+(i+1)+'</div><div class="pgnum">'+(i+1)+' / '+DATA.n_pages+'</div>';
      R.appendChild(pg);
    });
    const shells=[...R.querySelectorAll('.pg')];
    let next=0, active=0; const CONC=4;
    const pump=()=>{ while(active<CONC && next<shells.length){
      active++; mountPage(shells[next++], ()=>{ active--; pump(); }); } };
    pump();
  }
  function mountPage(pg, done){
    const i=(+pg.dataset.page)-1;
    const img=new Image(); img.decoding="async"; img.alt="page "+(i+1);
    const finish=()=>{ if(done){const d=done;done=null;d();} };
    img.onload=()=>{ const ph=pg.querySelector(".ph"); if(ph) ph.remove();
      buildTextLayer(pg,i); paintPins(pg); finish(); };
    img.onerror=finish;
    img.src=DATA.pages[i];
    pg.insertBefore(img, pg.firstChild);
    const zb=document.createElement("button");
    zb.className="pgzoom"; zb.textContent="⛶"; zb.title="zoom this page";
    zb.setAttribute("aria-label","zoom page "+(i+1));
    zb.addEventListener("click", ev=>{ ev.stopPropagation(); openZoom(i); });
    pg.appendChild(zb);
    // events on the page wrapper
    pg.addEventListener("click", ev=>{
      if(!selCollapsed()) return;                 // a selection owns this
      if(ev.target.closest(".pin")) return;
      onTap(pg, ev);
    });
    pg.addEventListener("mouseup", ()=>onSelect(pg));
    pg.addEventListener("touchend", ()=>setTimeout(()=>onSelect(pg),10));
  }
  function buildTextLayer(pg,i){
    const tl=DATA.textlayer && DATA.textlayer[i];
    if(!tl || !tl.words || !tl.words.length || pg.querySelector(".txt")) return;
    const img=pg.querySelector("img"); const pxH=img.clientHeight||0;
    const layer=document.createElement("div"); layer.className="txt";
    const frag=document.createDocumentFragment();
    for(const w of tl.words){
      const s=document.createElement("span");
      s.textContent=w[4]+" ";
      s.style.left=(w[0]/tl.w*100)+"%"; s.style.top=(w[1]/tl.h*100)+"%";
      if(pxH) s.style.fontSize=((w[3]-w[1])/tl.h*pxH)+"px";
      frag.appendChild(s);
    }
    layer.appendChild(frag); pg.insertBefore(layer, img.nextSibling);
    paintHls(pg);
  }

  function selCollapsed(){const s=window.getSelection&&getSelection();return !s||s.isCollapsed;}

  // ---------- tap → anchor (client-side y-band resolve) ----------
  function pageBp(pg, ev){
    const img=pg.querySelector("img"); const r=img.getBoundingClientRect();
    const fy=(ev.clientY-r.top)/r.height, fx=(ev.clientX-r.left)/r.width;
    // bands are in PDF points; page natural height in px = img.naturalHeight, dpi known
    const yPt=fy*img.naturalHeight*72/DATA.dpi, xPt=fx*img.naturalWidth*72/DATA.dpi;
    return {yPt, xPt, fx, fy};
  }
  function resolveAnchor(pageIdx, yPt){
    const bands=(DATA.anchors && DATA.anchors[pageIdx]) || [];
    if(!bands.length) return {section:"", file:DATA.root, line:0, nodes:[]};
    let best=bands[0], bd=Infinity;
    for(const b of bands){
      const inside = yPt>=b.y0-2 && yPt<=b.y1+2;
      const d = inside?0:Math.min(Math.abs(yPt-b.y0),Math.abs(yPt-b.y1));
      if(d<bd){bd=d;best=b;}
    }
    return best;
  }

  let PENDING=null;     // {page, bp, anchor, quote, rects}
  function onTap(pg, ev){
    const i=(+pg.dataset.page)-1;
    const bp=pageBp(pg,ev);
    const a=resolveAnchor(i, bp.yPt);
    PENDING={page:i+1, bp, anchor:a, quote:null, rects:null};
    showStrip(a, null);
  }
  function onSelect(pg){
    const s=window.getSelection();
    if(!s||s.isCollapsed||!s.rangeCount) return;
    const text=s.toString().replace(/\s+/g," ").trim();
    if(!text) return;
    const inThis=n=>{const el=n&&(n.nodeType===1?n:n.parentElement);return el&&pg.contains(el)&&el.closest(".txt");};
    if(!inThis(s.anchorNode)||!inThis(s.focusNode)) return;
    const img=pg.querySelector("img"), ib=img.getBoundingClientRect();
    if(!ib.width) return;
    const rects=[...s.getRangeAt(0).getClientRects()].map(r=>({
      l:(r.left-ib.left)/ib.width*100, t:(r.top-ib.top)/ib.height*100,
      w:r.width/ib.width*100, h:r.height/ib.height*100})).filter(r=>r.w>0.15&&r.h>0.15);
    if(!rects.length) return;
    const i=(+pg.dataset.page)-1;
    const f=rects[0];
    const yPt=(f.t+f.h)/100*img.naturalHeight*72/DATA.dpi;
    const a=resolveAnchor(i, yPt);
    PENDING={page:i+1, bp:{yPt, xPt:f.l/100*img.naturalWidth*72/DATA.dpi}, anchor:a, quote:text, rects};
    showStrip(a, text);
    paintPending();
    // dismiss the native selection popup (copy / share / web-search) so it can't cover the
    // strip and composer — we've captured the text + rects and paint our own highlight.
    setTimeout(()=>{ try{ window.getSelection().removeAllRanges(); }catch(e){} }, 0);
  }

  // the in-progress selection highlight (our own, so we can drop the native selection UI)
  function clearPending(){ document.querySelectorAll(".pghl.pending").forEach(e=>e.remove()); }
  function paintPending(){ clearPending();
    if(!PENDING || !Array.isArray(PENDING.rects)) return;
    const w=pageEl(PENDING.page); if(!w) return;
    PENDING.rects.forEach(r=>{ const h=document.createElement("div"); h.className="pghl pending";
      h.style.left=r.l+"%"; h.style.top=r.t+"%"; h.style.width=r.w+"%"; h.style.height=r.h+"%";
      w.appendChild(h); }); }

  function showStrip(a, quote){
    const loc=(a.file?a.file.split("/").pop():"")+(a.line?":"+a.line:"");
    $("stripprov").innerHTML='<span class="sec">'+esc(a.section||"·")+'</span> '+
      '<span class="loc">'+esc(loc)+'</span>'+
      (a.nodes&&a.nodes.length?' <span class="loc">· '+esc(a.nodes.join(", "))+'</span>':'')+
      (quote?'<span class="quote">"'+esc(quote.slice(0,90))+(quote.length>90?'…':'')+'"</span>':'');
    $("strip").classList.add("up");
  }
  function hideStrip(){ $("strip").classList.remove("up"); }
  $("stripclose").addEventListener("click", ()=>{ hideStrip(); clearPending(); });
  $("stripcomment").addEventListener("click", openCompose);

  // ---------- composer ----------
  function openCompose(){
    if(!PENDING) return;
    hideStrip();
    const a=PENDING.anchor;
    $("compose-h").textContent="comment · p"+PENDING.page+" · "+(a.section||"?");
    const q=$("compose-quote");
    if(PENDING.quote){ q.textContent='"'+PENDING.quote+'"'; q.classList.remove("hidden"); }
    else q.classList.add("hidden");
    const chips=$("compose-chips"); chips.innerHTML="";
    (a.nodes||[]).forEach((n,i)=>{ const c=document.createElement("span");
      c.className="chip"+(i===0?" sel":""); c.textContent=n; c.dataset.n=n;
      c.addEventListener("click",()=>c.classList.toggle("sel")); chips.appendChild(c); });
    const sel=$("compose-kind"); sel.innerHTML=KINDS.map(k=>'<option>'+k+'</option>').join("");
    $("compose-text").value=""; $("compose-msg").textContent=""; $("compose-msg").className="msg";
    openSheet("compose");
    setTimeout(()=>$("compose-text").focus(),80);
  }
  $("compose-cancel").addEventListener("click",()=>closeSheet("compose"));
  $("compose-bank").addEventListener("click", bankComment);

  function bankComment(){
    const msg=$("compose-msg"); msg.className="msg";
    const comment=$("compose-text").value.trim();
    if(!comment){ msg.textContent="empty comment"; msg.className="msg bad"; return; }
    const a=PENDING.anchor;
    const sel=[...document.querySelectorAll("#compose-chips .chip.sel")].map(c=>c.dataset.n);
    const primary=sel[0] || (a.nodes&&a.nodes[0]) || ("sec:"+(a.section||"?"));
    const now=new Date();
    const pad=n=>String(n).padStart(2,"0");
    const id="FB-"+now.getFullYear()+pad(now.getMonth()+1)+pad(now.getDate())+"-"+
      pad(now.getHours())+pad(now.getMinutes())+pad(now.getSeconds())+"-"+
      String(primary).split("#").pop().split(":").pop()+"-"+Math.random().toString(36).slice(2,6);
    const rec={
      id, project:CFG.corpus, ts:now.toISOString().slice(0,19),
      node_id:primary, node_label:a.section||"",
      kind:$("compose-kind").value, comment, by:"gerard", status:"open",
      anchor:{ page:PENDING.page, x:+(PENDING.bp.xPt||0).toFixed(1), y:+(PENDING.bp.yPt||0).toFixed(1),
        file:a.file||"", line:a.line||0, section:a.section||"", nodes:sel.length?sel:(a.nodes||[]),
        text:PENDING.quote||undefined, rects:PENDING.rects||undefined },
      _state:"queued"
    };
    OUTBOX.push(rec); saveOutbox(); everBanked=true;
    DATA.feedback.unshift(rec);
    closeSheet("compose");
    renderDrawer(); repaintAll(); updateBadge();
    flushOutbox();
  }

  // ---------- outbox → GitHub Contents API ----------
  let OUTBOX=[];
  function loadOutbox(){ try{OUTBOX=JSON.parse(localStorage.getItem(LS_OUTBOX)||"[]");}catch(e){OUTBOX=[];}
    if(OUTBOX.length) everBanked=true; }
  function saveOutbox(){ try{localStorage.setItem(LS_OUTBOX, JSON.stringify(OUTBOX));}catch(e){} }
  function b64utf8(s){ return btoa(unescape(encodeURIComponent(s))); }
  function ghToken(){ return (localStorage.getItem(LS_PAT)||"").trim() || (DATA && DATA.github_token) || ""; }
  function apiUrlFor(id){ const path=CFG.inbox_path+"/"+id+".json";
    return "https://api.github.com/repos/"+CFG.repo+"/contents/"+path.split("/").map(encodeURIComponent).join("/"); }
  function ghHeaders(tok){ return {Authorization:"Bearer "+tok, Accept:"application/vnd.github+json",
    "Content-Type":"application/json"}; }

  // edit/delete a comment that is ALREADY in the repo (auto-push leaves almost no queued
  // window, so this is the real path). Each comment is one file: edit = re-PUT it, delete
  // = DELETE it. Needs the file's blob sha; we cache it from the push response and fetch
  // it on demand otherwise. Once you've pulled + drained a comment at your desk the inbox
  // file is gone, so the API returns 404/409 and we say so plainly.
  async function fileSha(rec, tok){
    if(rec._sha) return rec._sha;
    try{ const g=await fetch(apiUrlFor(rec.id),{headers:{Authorization:"Bearer "+tok,
           Accept:"application/vnd.github+json"}});
      if(g.ok){ const j=await g.json(); rec._sha=j.sha; return j.sha; }
      if(g.status===404) return "__GONE__";
    }catch(e){}
    return "";
  }
  async function editPushed(rec, newText){
    const tok=ghToken(); if(!tok){ alert("Add a token first to edit a pushed comment."); return; }
    const sha=await fileSha(rec, tok);
    if(sha==="__GONE__"){ alert("This comment was already pulled to your desk — edit it there."); return; }
    if(!sha){ alert("Couldn't reach GitHub to edit — try again."); return; }
    const clean={...rec}; delete clean._state; delete clean._sha; clean.comment=newText;
    const r=await fetch(apiUrlFor(rec.id),{method:"PUT",headers:ghHeaders(tok),
      body:JSON.stringify({message:"edit review comment "+rec.id, branch:CFG.branch,
        content:b64utf8(JSON.stringify(clean,null,2)), sha})});
    if(r.ok){ const j=await r.json().catch(()=>({})); rec.comment=newText;
      if(j&&j.content) rec._sha=j.content.sha; renderDrawer(); repaintAll(); }
    else if(r.status===409){ delete rec._sha; alert("Edit conflicted — reopen and try once more."); }
    else alert("Edit failed ("+r.status+") — the comment is unchanged in your repo.");
  }
  async function deletePushed(rec){
    const tok=ghToken(); if(!tok){ alert("Add a token first to delete a pushed comment."); return; }
    const sha=await fileSha(rec, tok);
    if(sha==="__GONE__"){ DATA.feedback=DATA.feedback.filter(x=>x.id!==rec.id);
      renderDrawer(); repaintAll(); alert("Already pulled to your desk — removed from this view; delete it there too."); return; }
    if(!sha){ alert("Couldn't reach GitHub to delete — try again."); return; }
    const r=await fetch(apiUrlFor(rec.id),{method:"DELETE",headers:ghHeaders(tok),
      body:JSON.stringify({message:"delete review comment "+rec.id, branch:CFG.branch, sha})});
    if(r.ok){ DATA.feedback=DATA.feedback.filter(x=>x.id!==rec.id); updateBadge(); renderDrawer(); repaintAll(); }
    else if(r.status===409){ delete rec._sha; alert("Delete conflicted — try once more."); }
    else alert("Delete failed ("+r.status+") — the comment is still in your repo.");
  }

  // manual=true means the user pressed a button and MUST see an outcome, even a no-op.
  // Silent no-ops were the whole "flush does nothing" bug (his catch, 2026-07-03).
  async function flushOutbox(manual){
    const pat=(localStorage.getItem(LS_PAT)||"").trim() || (DATA && DATA.github_token) || "";
    if(!OUTBOX.length){ if(manual) setDrawerNote("nothing to push — every comment is already in your repo ✓"); return; }
    if(!pat){ if(manual) setDrawerNote("no token yet — paste a GitHub token above and press “save token”, then push"); return; }
    if(!navigator.onLine){ if(manual) setDrawerNote("you’re offline — comments will push automatically when you reconnect"); return; }
    setDrawerNote("pushing "+OUTBOX.length+" comment"+(OUTBOX.length>1?"s":"")+"…");
    let pushed=0, stop="";
    for(const rec of [...OUTBOX]){
      const clean={...rec}; delete clean._state;
      const path=CFG.inbox_path+"/"+rec.id+".json";
      const url="https://api.github.com/repos/"+CFG.repo+"/contents/"+
        path.split("/").map(encodeURIComponent).join("/");
      let r;
      try{
        r=await fetch(url,{method:"PUT",
          headers:{Authorization:"Bearer "+pat, Accept:"application/vnd.github+json",
                   "Content-Type":"application/json"},
          body:JSON.stringify({message:"review comment "+rec.id, branch:CFG.branch,
            content:b64utf8(JSON.stringify(clean,null,2))})});
      }catch(e){ stop="network error — your comments are safe on this device; try again"; break; }
      if(r.status===201 || r.status===200 || r.status===422){
        // 422 = file already exists (a re-flush) → already in the repo, treat as pushed
        OUTBOX=OUTBOX.filter(x=>x.id!==rec.id);
        const live=DATA.feedback.find(x=>x.id===rec.id);
        if(live){ delete live._state;
          try{ const j=await r.json(); if(j&&j.content&&j.content.sha) live._sha=j.content.sha; }catch(_){} }
        saveOutbox(); pushed++;
      } else if(r.status===401 || r.status===403){
        stop="token rejected ("+r.status+") — it needs Contents: read & write on "+CFG.repo; break;
      } else if(r.status===404){
        stop="404 — the token can’t see "+CFG.repo+" (wrong repo scope, or repo access not granted)"; break;
      } else { stop="GitHub error "+r.status+" — comments kept on this device"; break; }
    }
    updateBadge(); repaintAll();
    // set the OUTCOME note LAST so renderDrawer's default note can't overwrite it
    renderDrawer();
    if(pushed && !OUTBOX.length) setDrawerNote("✓ pushed "+pushed+" — all comments now in your repo. `git pull` to see them.");
    else if(pushed) setDrawerNote("✓ pushed "+pushed+" · "+OUTBOX.length+" left — "+(stop||"press push again"));
    else if(stop) setDrawerNote("⚠ "+stop);
  }

  let everBanked=false;
  function updateBadge(){
    const q=OUTBOX.length;
    const hasPat=!!((localStorage.getItem(LS_PAT)||"").trim() || (DATA && DATA.github_token));
    $("openbadge").textContent = q?(" "+q+"⇡"):"";
    const pill=$("syncpill");
    if(q>0 && !hasPat){
      pill.style.display=""; pill.className="pill warn";
      pill.textContent="⚠ "+q+" comment"+(q>1?"s":"")+" on THIS DEVICE only — tap to add a token & push";
    } else if(q>0){
      pill.style.display=""; pill.className="pill push";
      pill.textContent="⇡ pushing "+q+"… (tap to retry)";
    } else if(everBanked){
      pill.style.display=""; pill.className="pill ok";
      pill.textContent="✓ all comments saved to your repo";
    } else { pill.style.display="none"; }
  }
  $("syncpill").addEventListener("click",()=>{
    if($("syncpill").classList.contains("ok")) return;
    if(localStorage.getItem(LS_PAT)) flushOutbox();
    else { openSheet("drawer"); drawerTab("settings"); }
  });
  function setDrawerNote(t){ const el=$("patinfo"); if(el){ el.textContent=t; } }

  // ---------- pins + highlights ----------
  function pageEl(p){ return document.querySelector('.pg[data-page="'+p+'"]'); }
  function paintPins(pg){
    pg.querySelectorAll(".pin").forEach(x=>x.remove());
    const p=+pg.dataset.page, img=pg.querySelector("img");
    if(!img||!img.naturalWidth) return;
    DATA.feedback.forEach(rec=>{
      const a=rec.anchor||{}; if(a.page!==p||a.x==null) return;
      const pin=document.createElement("div");
      pin.className="pin"+(rec._state==="queued"?" queued":(rec.status!=="open"?" resolved":""));
      pin.dataset.fb=rec.id;
      pin.style.left=(a.x/72*DATA.dpi/img.naturalWidth*100)+"%";
      pin.style.top=(a.y/72*DATA.dpi/img.naturalHeight*100)+"%";
      pin.title=rec.kind+" — "+(rec.comment||"").slice(0,80);
      pin.addEventListener("click",ev=>{ev.stopPropagation();
        openSheet("drawer"); drawerTab("comments");
        const row=document.querySelector('.frow[data-fb="'+rec.id+'"]');
        if(row) row.scrollIntoView({block:"center"});});
      pg.appendChild(pin);
    });
  }
  function paintHls(pg){
    pg.querySelectorAll(".hl").forEach(x=>x.remove());
    const p=+pg.dataset.page;
    DATA.feedback.forEach(rec=>{
      const a=rec.anchor||{}; if(a.page!==p||!Array.isArray(a.rects)) return;
      a.rects.forEach(r=>{ const h=document.createElement("div");
        h.className="hl"+(rec.status!=="open"&&rec._state!=="queued"?" resolved":"");
        h.style.left=r.l+"%"; h.style.top=r.t+"%"; h.style.width=r.w+"%"; h.style.height=r.h+"%";
        pg.appendChild(h); });
    });
  }
  function repaintAll(){ document.querySelectorAll(".pg").forEach(pg=>{
    if(pg.querySelector("img")){ paintPins(pg); paintHls(pg);} }); }

  // ---------- drawer ----------
  let curTab="comments";
  function drawerTab(t){
    curTab=t;
    document.querySelectorAll("#drawer .tab").forEach(x=>x.classList.toggle("on",x.dataset.t===t));
    ["comments","spans","contents","settings"].forEach(k=>$("d-"+k).classList.toggle("hidden",k!==t));
  }
  document.querySelectorAll("#drawer .tab").forEach(t=>t.addEventListener("click",()=>drawerTab(t.dataset.t)));

  function renderDrawer(){
    // comments
    const C=$("d-comments");
    if(!DATA.feedback.length){ C.innerHTML='<div class="empty">no comments yet — tap the page and hit comment</div>'; }
    else{ C.innerHTML=""; DATA.feedback.forEach(rec=>{
      const a=rec.anchor||{};
      const row=document.createElement("div");
      row.className="frow"+(rec._state==="queued"?" queued":(rec.status!=="open"?" resolved":""));
      row.dataset.fb=rec.id;
      const queued = rec._state==="queued";
      row.innerHTML='<div class="fh"><span class="fk">'+esc(rec.kind)+'</span>'+
        '<span class="fa">p'+esc(a.page||"?")+(a.line?" · :"+a.line:"")+
        (queued?" · queued⇡":" · in repo")+'</span></div>'+
        '<div class="fb">'+esc(rec.comment)+'</div>'+
        '<div class="fn">'+esc(rec.node_id||"")+'</div>'+
        '<div class="facts"><button data-edit="1">edit</button>'+
        '<button data-del="1">delete</button></div>';
      // edit/delete work whether the comment is still queued (local) or already pushed
      // (rewrite/remove the repo file). Symmetric across every device.
      row.querySelector("[data-edit]").addEventListener("click",async e=>{ e.stopPropagation();
        const nv=prompt("Edit comment:", rec.comment);
        if(nv==null) return; const t=nv.trim(); if(!t) return;
        if(queued){ rec.comment=t; const ob=OUTBOX.find(x=>x.id===rec.id); if(ob) ob.comment=t;
          saveOutbox(); renderDrawer(); }
        else { await editPushed(rec, t); } });
      row.querySelector("[data-del]").addEventListener("click",async e=>{ e.stopPropagation();
        if(!confirm(queued?"Delete this queued comment (not yet pushed)?":"Delete this comment from your repo?")) return;
        if(queued){ OUTBOX=OUTBOX.filter(x=>x.id!==rec.id); saveOutbox();
          DATA.feedback=DATA.feedback.filter(x=>x.id!==rec.id);
          updateBadge(); renderDrawer(); repaintAll(); }
        else { await deletePushed(rec); } });
      row.addEventListener("click",()=>{ if(a.page){ closeSheet("drawer");
        const pg=pageEl(a.page); if(pg){ pg.scrollIntoView({block:"center"});
          setTimeout(()=>{const pin=document.querySelector('.pin[data-fb="'+rec.id+'"]');
            if(pin){pin.classList.remove("flash");void pin.offsetWidth;pin.classList.add("flash");}},250);}}});
      C.appendChild(row);
    }); }
    // spans
    const S=$("d-spans");
    if(!DATA.spans||!DATA.spans.length){ S.innerHTML='<div class="empty">no provenance markers</div>'; }
    else{ S.innerHTML=""; DATA.spans.forEach(s=>{ const el=document.createElement("div");
      el.className="srow";
      el.innerHTML='<span class="ss">'+esc(s.section||"·")+'</span>'+
        '<span class="sl">'+esc((s.file||"").split("/").pop())+' L'+s.start_line+'–'+s.end_line+'</span>'+
        '<div class="snodes">'+(s.nodes||[]).map(n=>'<span class="nd">'+esc(n)+'</span>').join("")+'</div>';
      S.appendChild(el); }); }
    // contents
    const K=$("d-contents");
    const secs={}; (DATA.spans||[]).forEach(s=>{ if(s.section&&!(s.section in secs)) secs[s.section]=s; });
    const keys=Object.keys(secs);
    if(!keys.length){ K.innerHTML='<div class="empty">no sections</div>'; }
    else{ K.innerHTML=""; keys.forEach(sec=>{ const el=document.createElement("div");
      el.className="crow";
      el.innerHTML='<div class="ci">'+esc(sec)+'</div>'+
        '<div class="ce">'+esc((DATA.sec_titles&&DATA.sec_titles[sec])||"")+'</div>';
      el.addEventListener("click",()=>{ closeSheet("drawer");
        const first=DATA.spans.find(s=>s.section===sec);
        // jump to the page whose anchors mention this section
        let pageNo=1;
        (DATA.anchors||[]).forEach((bands,pi)=>{ if(bands.some(b=>b.section===sec)&&pageNo===1) pageNo=pi+1; });
        const pg=pageEl(pageNo); if(pg) pg.scrollIntoView({block:"start"}); });
      K.appendChild(el); }); }
    // settings info
    $("bundleinfo").innerHTML='corpus: '+esc(DATA.corpus)+'<br>'+
      (CFG.git_head?'git '+esc(CFG.git_head)+' · ':'')+DATA.n_pages+' pages · '+
      Object.keys(DATA.nodes||{}).length+' nodes';
    const pat=localStorage.getItem(LS_PAT);
    if(pat) setDrawerNote("token saved on this device ("+pat.slice(0,10)+"…) — writes go to "+CFG.repo);
    else if(DATA && DATA.github_token) setDrawerNote("a token is baked into this bundle — comments push automatically to "+CFG.repo+". Paste your own below only to override.");
    else setDrawerNote("no token yet — comments queue on this device until you add one. Writes go to "+CFG.repo+".");
    $("pat").value = pat || "";
  }

  $("savepat").addEventListener("click",()=>{ const v=$("pat").value.trim();
    if(v){ localStorage.setItem(LS_PAT,v); renderDrawer();
           setDrawerNote("token saved ✓ — pushing your queued comments…"); flushOutbox(true); }
    else { localStorage.removeItem(LS_PAT); renderDrawer(); setDrawerNote("token cleared"); } });
  $("flushnow").addEventListener("click", ()=>flushOutbox(true));
  $("forget").addEventListener("click", async ()=>{ await idbDel("key-"+CFG.corpus);
    setDrawerNote("passphrase forgotten — you'll be asked again next open"); });

  // ---------- sheets / backdrop ----------
  function openSheet(id){ $(id).classList.add("up"); if(!document.body.classList.contains("dock")||id==="compose") $("backdrop").classList.add("on"); }
  function closeSheet(id){ $(id).classList.remove("up"); $(id).style.transform=""; $("backdrop").classList.remove("on"); if(id==="compose") clearPending(); }
  $("backdrop").addEventListener("click",()=>{ closeSheet("compose"); if(!document.body.classList.contains("dock")) closeSheet("drawer"); });
  // grip = a real drag handle: pull the sheet down past a threshold to dismiss, else snap back.
  function makeSheetDraggable(id){
    const sheet=$(id), grip=sheet.querySelector(".grip");
    if(!grip) return;
    let sy=0, dy=0, on=false;
    grip.addEventListener("pointerdown", e=>{ on=true; sy=e.clientY; dy=0;
      sheet.style.transition="none"; try{ grip.setPointerCapture(e.pointerId); }catch(_){}} );
    grip.addEventListener("pointermove", e=>{ if(!on) return;
      dy=Math.max(0, e.clientY-sy); sheet.style.transform="translateY("+dy+"px)"; });
    const end=()=>{ if(!on) return; on=false; sheet.style.transition="";
      sheet.style.transform=""; if(dy>80) closeSheet(id); };
    grip.addEventListener("pointerup", end);
    grip.addEventListener("pointercancel", end);
  }
  makeSheetDraggable("compose"); makeSheetDraggable("drawer");
  function syncDock(){
    const dock = window.matchMedia("(min-width:860px)").matches;
    document.body.classList.toggle("dock", dock);
    const open = dock && !$("drawer").classList.contains("hidden");
    document.body.classList.toggle("drawer-open", open);   // strip/composer clear the panel
    $("drawerbtn").classList.toggle("on", dock ? open : false);
  }
  $("drawerbtn").addEventListener("click",()=>{
    if(document.body.classList.contains("dock")){
      $("drawer").classList.toggle("hidden");              // docked side-panel: show/hide
      syncDock();
    } else openSheet("drawer");
  });
  $("drawerclose").addEventListener("click",()=>closeSheet("drawer"));

  // reposition pins/text on resize (percentage geometry → pure relayout)
  let rz=null; window.addEventListener("resize",()=>{ clearTimeout(rz); rz=setTimeout(()=>{
    syncDock();
    repaintAll();
  },150); });

  // ---------- the pdf zoom lightbox: ONE page, contained transform pinch/pan/double-tap ----
  // Entirely self-contained (its own fixed overlay), so zooming the pdf never scales or
  // moves the reading UI. Buttons + double-tap are the always-works path; pinch on top.
  (function(){
    const zbox=$("zoom"), zimg=$("zoomimg");
    let scale=1, fit=1, tx=0, ty=0, natW=0, natH=0;
    const pts=new Map(); let panStart=null, pinch=null, lastTap=0;
    const apply=()=>{ zimg.style.transform="translate("+tx+"px,"+ty+"px) scale("+scale+")"; };
    const fitScale=()=> natW&&natH ? Math.min(window.innerWidth/natW, window.innerHeight/natH) : 1;
    const recenter=()=>{ tx=(window.innerWidth-natW*scale)/2; ty=(window.innerHeight-natH*scale)/2; };
    const reset=()=>{ scale=fit=fitScale(); recenter(); apply(); };
    const clamp=s=> Math.max(fit*0.9, Math.min(fit*8, s));
    const zoomAround=(factor,cx,cy)=>{ const ns=clamp(scale*factor), k=ns/scale;
      tx=cx-(cx-tx)*k; ty=cy-(cy-ty)*k; scale=ns; apply(); };

    window.openZoom=function(i){
      zimg.onload=()=>{ natW=zimg.naturalWidth; natH=zimg.naturalHeight; reset();
        $("zoomhint").textContent="page "+(i+1)+" · pinch or +/− · double-tap"; };
      if(zimg.src===DATA.pages[i] && natW){ reset(); } else { zimg.src=DATA.pages[i]; }
      zbox.classList.add("on");
    };
    const close=()=>{ zbox.classList.remove("on"); pts.clear(); panStart=pinch=null; };
    $("zoomclose").addEventListener("click", close);
    $("zoomin").addEventListener("click",()=>zoomAround(1.4, innerWidth/2, innerHeight/2));
    $("zoomout").addEventListener("click",()=>zoomAround(1/1.4, innerWidth/2, innerHeight/2));
    $("zoomreset").addEventListener("click", reset);
    document.addEventListener("keydown",e=>{ if(zbox.classList.contains("on")&&e.key==="Escape") close(); });

    zbox.addEventListener("pointerdown", e=>{
      try{ zbox.setPointerCapture(e.pointerId); }catch(_){}   // never abort the gesture
      pts.set(e.pointerId,{x:e.clientX,y:e.clientY});
      if(pts.size===1){
        panStart={x:e.clientX,y:e.clientY,tx,ty};
        const now=Date.now();
        if(now-lastTap<350){ zoomAround(scale>fit*1.6?fit/scale:2.5, e.clientX, e.clientY); lastTap=0; }
        else lastTap=now;
      } else if(pts.size===2){
        const p=[...pts.values()];
        pinch={d:Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y), s:scale,
               mx:(p[0].x+p[1].x)/2, my:(p[0].y+p[1].y)/2, tx, ty};
        panStart=null;
      }
    });
    zbox.addEventListener("pointermove", e=>{
      if(!pts.has(e.pointerId)) return;
      pts.set(e.pointerId,{x:e.clientX,y:e.clientY});
      if(pts.size===2 && pinch){
        const p=[...pts.values()];
        const d=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y);
        const ns=clamp(pinch.s*(d/pinch.d)), k=ns/pinch.s;
        tx=pinch.mx-(pinch.mx-pinch.tx)*k; ty=pinch.my-(pinch.my-pinch.ty)*k; scale=ns; apply();
      } else if(pts.size===1 && panStart){
        tx=panStart.tx+(e.clientX-panStart.x); ty=panStart.ty+(e.clientY-panStart.y); apply();
      }
    });
    const drop=e=>{ pts.delete(e.pointerId);
      if(pts.size===1){ const only=[...pts.values()][0]; panStart={x:only.x,y:only.y,tx,ty}; pinch=null; }
      else if(pts.size===0){ panStart=pinch=null; } };
    zbox.addEventListener("pointerup", drop);
    zbox.addEventListener("pointercancel", drop);
    window.addEventListener("resize",()=>{ if(zbox.classList.contains("on")) reset(); });
  })();

  // ---------- lock screen wiring ----------
  $("lockform").addEventListener("submit",e=>{ e.preventDefault();
    unlock($("pw").value, $("remember").checked); });

  // try a remembered key first
  (async function(){
    try{
      $("lockstamp").textContent = CFG.corpus ? "corpus: "+CFG.corpus : "";
      const k=await idbGet("key-"+CFG.corpus);
      if(k){ unlock(k, false, true); }
    }catch(e){}
  })();
})();
</script>
</body>
