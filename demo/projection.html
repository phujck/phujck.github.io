<!doctype html>
<html lang="en">
<head>
<script>

(function(){
  "use strict";
  var RAW=null, VISITOR="";
  try { RAW=sessionStorage.getItem("__demo_payload"); VISITOR=sessionStorage.getItem("__demo_visitor")||""; } catch(e){}
  if(!RAW || !VISITOR){ location.replace("index.html"); return; }
  var DB; try { DB=JSON.parse(RAW); } catch(e){ location.replace("index.html"); return; }
  window.__DEMO_DB=DB; window.__VISITOR=VISITOR;

  var CORPORA=DB.corpora||{};
  var DEFAULT=(DB.config && DB.config.default)||Object.keys(CORPORA)[0];
  var params=new URLSearchParams(location.search);
  var ACTIVE=(params.get("corpus") && CORPORA[params.get("corpus")]) ? params.get("corpus") : DEFAULT;
  var PROJ_FOCUS=null;

  function esc(s){ return String(s==null?"":s).replace(/[&<>\"']/g,function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]; }); }

  // ── per-corpus graph index (the inspector opens node chips via /corpus/*) ──
  var IDX={};
  function push(m,k,v){ (m[k]=m[k]||[]).push(v); }
  function buildIndex(name){
    var C=CORPORA[name]; if(!C) return null;
    var I={C:C, NODES:{}, DRAWS_FROM:{}, DRAWN_BY:{}, SHARES:{}, CONTAINS:{}, REACH:{}, SPINE_BY_ID:{}};
    (C.graph.nodes||[]).forEach(function(n){ I.NODES[n.id]=n; });
    (C.graph.edges||[]).forEach(function(e){
      if(e.rel==="draws"){ push(I.DRAWS_FROM,e.src,e.dst); push(I.DRAWN_BY,e.dst,e.src); }
      else if(e.rel==="shares"){ push(I.SHARES,e.src,e.dst); push(I.SHARES,e.dst,e.src); }
      else if(e.rel==="contains"){ push(I.CONTAINS,e.src,e.dst); }
    });
    Object.keys(I.NODES).forEach(function(id){ I.REACH[id]=(I.CONTAINS[id]||[]).length; });
    (C.spine||[]).forEach(function(s){ I.SPINE_BY_ID[s.id]=s; });
    return I;
  }
  function idx(name){ name=name||ACTIVE; if(!IDX[name]) IDX[name]=buildIndex(name); return IDX[name]; }
  function gradeOf(I,id){ var n=I.NODES[id]; if(!n) return 0;
    if(n.kind==="domain") return 0; return ((n.meta||{}).scale==="coarse")?0:1; }
  function essOf(I,id){ var n=I.NODES[id]||{}, m=n.meta||{}; return m.summary||m.intent||n.label||id; }
  function enrich(I,id,prov){ var n=I.NODES[id]||{};
    return {id:id, kind:n.kind, essence:essOf(I,id), grade:gradeOf(I,id), prov:prov||"explicit"}; }
  function content(I,id){ var n=I.NODES[id]; if(!n) return {id:id, error:"unknown node"};
    var draws=I.DRAWS_FROM[id]||[];
    var cites=draws.filter(function(x){return I.NODES[x]&&I.NODES[x].kind==="result";}).map(function(x){return {id:x, essence:essOf(I,x)};});
    var deps={explicit:draws.filter(function(x){return I.NODES[x]&&I.NODES[x].kind==="def";}), confirmed:[]};
    return {id:id, kind:n.kind, grade:gradeOf(I,id), essence:essOf(I,id), keywords:null, postulate:false,
            spine:(I.SPINE_BY_ID[id]||null), ctx:"", cites:cites, deps:deps, projection:{}, retired:false}; }
  function neighborhood(I,id){
    var below=(I.DRAWS_FROM[id]||[]).map(function(x){return enrich(I,x);});
    var above=(I.DRAWN_BY[id]||[]).map(function(x){return enrich(I,x);});
    var lateral=(I.SHARES[id]||[]).map(function(x){ var e=enrich(I,x,"lateral");
      var mine=I.DRAWS_FROM[id]||[], theirs=I.DRAWS_FROM[x]||[];
      e.shared=mine.filter(function(d){return theirs.indexOf(d)>=0;}); return e; });
    return {id:id, node:{id:id, kind:(I.NODES[id]||{}).kind, grade:gradeOf(I,id), n_below:below.length, n_above:above.length},
            below:below, above:above, lateral:lateral, truncated:{}}; }
  function search(I,q){ q=(q||"").trim().toLowerCase(); if(!q) return {results:[]};
    var toks=q.split(/\W+/).filter(Boolean), out=[];
    Object.keys(I.NODES).forEach(function(id){ var n=I.NODES[id];
      var hay=(id+" "+essOf(I,id)+" "+(n.kind||"")).toLowerCase(), s=0;
      if(hay.indexOf(q)>=0) s+=6; toks.forEach(function(t){ if(hay.indexOf(t)>=0) s+=2; });
      if(s) out.push({id:id, kind:n.kind, essence:essOf(I,id), grade:gradeOf(I,id), score:s}); });
    out.sort(function(a,b){return b.score-a.score;}); return {results:out.slice(0,24)}; }
  function gradeView(I,g){ var ids=Object.keys(I.NODES).filter(function(id){return gradeOf(I,id)===g;});
    ids.sort(function(a,b){return (I.REACH[b]||0)-(I.REACH[a]||0);});
    return {grade:g, lens:null, nodes:ids.map(function(id){ var n=I.NODES[id];
      return {id:id, label:(n.label||id), essence:essOf(I,id), n_below:(I.CONTAINS[id]||[]).length, substrate_size:(I.REACH[id]||0), lenses:[]};}),
      edges:[], n_total_at_grade:ids.length, capped:false}; }

  // ── the bankable write — SAME actor law, per-corpus outbox (mirrors app.html) ──
  var LS_PAT="demo_gh_pat", LS_OUTBOX, OUTBOX=[];
  function loadOutbox(){ LS_OUTBOX="demo_outbox_"+ACTIVE;
    try{ OUTBOX=JSON.parse(localStorage.getItem(LS_OUTBOX)||"[]"); }catch(e){ OUTBOX=[]; }
    window.__demo_feed=OUTBOX; }
  function saveOutbox(){ try{ localStorage.setItem(LS_OUTBOX, JSON.stringify(OUTBOX)); }catch(e){} }
  function b64utf8(s){ return btoa(unescape(encodeURIComponent(s))); }
  function pad(n){ return String(n).padStart(2,"0"); }
  function ghToken(){ try{ return (localStorage.getItem(LS_PAT)||"").trim() || (DB.github_token||""); }catch(e){ return DB.github_token||""; } }
  function activeCfg(){ return (CORPORA[ACTIVE]||{}).config||{}; }
  function repo(){ return (DB.config&&DB.config.repo)||activeCfg().repo||""; }
  function branch(){ return (DB.config&&DB.config.branch)||activeCfg().branch||"master"; }
  function projTitle(sid){ var P=(CORPORA[ACTIVE]||{}).projection||{}; return ((P.prose||{})[sid]||{}).title || sid; }
  function curFocus(){ return PROJ_FOCUS; }
  function mintRecord(comment, kind){ var now=new Date(); var focus=curFocus()||"unknown";
    var nodePart=String(focus).split("#").pop().split(":").pop();
    var id="FB-"+now.getFullYear()+pad(now.getMonth()+1)+pad(now.getDate())+"-"+
      pad(now.getHours())+pad(now.getMinutes())+pad(now.getSeconds())+"-"+nodePart+"-"+Math.random().toString(36).slice(2,6);
    return {id:id, project:ACTIVE, ts:now.toISOString().slice(0,19), node_id:focus,
      node_label:String(projTitle(focus)||essOf(idx(),focus)||"").slice(0,80),
      kind:kind||"comment", comment:comment, by:"visitor:"+VISITOR, status:"open", anchor:{}, _state:"queued"}; }
  function apiUrlFor(recId){ var path=activeCfg().inbox_path+"/"+recId+".json";
    return "https://api.github.com/repos/"+repo()+"/contents/"+path.split("/").map(encodeURIComponent).join("/"); }
  function setStatus(msg, cls){ var el=document.getElementById("demo-status"); if(el){ el.textContent=msg; el.className="demo-status "+(cls||""); } }
  async function flushOutbox(manual){ var tok=ghToken();
    if(!OUTBOX.length){ if(manual) setStatus("nothing queued — every comment is pushed ✓","ok"); return; }
    if(!tok){ setStatus(OUTBOX.length+" comment(s) queued locally — no push token in this dev bundle (needs-token)","warn"); return; }
    if(!navigator.onLine){ setStatus("offline — your comments are safe on this device","warn"); return; }
    setStatus("pushing "+OUTBOX.length+" comment(s)…",""); var pushed=0; var list=OUTBOX.slice();
    for(var i=0;i<list.length;i++){ var rec=list[i]; var clean={}; for(var k in rec){ if(k!=="_state") clean[k]=rec[k]; } var r;
      try{ r=await fetch(apiUrlFor(rec.id),{method:"PUT",
        headers:{Authorization:"Bearer "+tok, Accept:"application/vnd.github+json","Content-Type":"application/json"},
        body:JSON.stringify({message:"visitor comment "+rec.id, branch:branch(), content:b64utf8(JSON.stringify(clean,null,2))})});
      }catch(e){ setStatus("network error — comments are safe on this device; try again","bad"); break; }
      if(r.status===201||r.status===200||r.status===422){ OUTBOX=OUTBOX.filter(function(x){return x.id!==rec.id;}); saveOutbox(); pushed++;
        var live=(window.__demo_feed||[]).find(function(x){return x.id===rec.id;}); if(live) live._state="pushed"; }
      else if(r.status===401||r.status===403){ setStatus("token rejected ("+r.status+") — needs a contents-write PAT","bad"); break; }
      else { setStatus("push failed ("+r.status+")","bad"); break; } }
    if(pushed) setStatus(pushed+" comment(s) pushed ✓"+(OUTBOX.length?(" · "+OUTBOX.length+" still queued"):""),"ok"); renderDock(); }
  loadOutbox();
  function queueComment(){ var ta=document.getElementById("demo-comment"); var kindSel=document.getElementById("demo-kind");
    var txt=(ta.value||"").trim(); if(!txt){ setStatus("empty comment","bad"); return; }
    if(!curFocus()){ setStatus("open a section or a node first, then comment","warn"); return; }
    var rec=mintRecord(txt, kindSel?kindSel.value:"comment"); OUTBOX.push(rec); saveOutbox(); ta.value="";
    setStatus("queued "+rec.id+" · by "+rec.by,"ok"); renderDock(); flushOutbox(false); }

  // ── fetch shim: baked storyboard plan + /corpus/* views, author POSTs REFUSED ──
  var _fetch=window.fetch.bind(window);
  function J(obj,status){ return new Response(JSON.stringify(obj),{status:status||200, headers:{"Content-Type":"application/json"}}); }
  window.fetch=function(input, init){
    var url=(typeof input==="string")?input:(input&&input.url)||"";
    var method=((init&&init.method)||(input&&input.method)||"GET").toUpperCase();
    var abs=/^https?:\/\//i.test(url);
    if(abs){ if(url.indexOf("https://api.github.com/")===0) return _fetch(input, init);
      return J({error:"external requests are not in this demo bundle"}, 403); }
    var path=url.split("?")[0]; var qs={};
    (url.split("?")[1]||"").split("&").forEach(function(kv){ if(!kv) return; var p=kv.split("=");
      qs[decodeURIComponent(p[0])]=decodeURIComponent((p[1]||"").replace(/\+/g," ")); });
    // author verbs (any write, or the plan/spine/dispatch/rebuild POSTs) — REFUSED honestly
    if(method!=="GET" || path==="/corpus/rewire"){
      return J({error:"author verbs are not in this bundle", ok:false, applied:false}, 403); }
    if(path.indexOf("/shared/")===0) return J(null, 404);
    var cname=(qs.corpus && CORPORA[qs.corpus]) ? qs.corpus : ACTIVE;
    var C=CORPORA[cname]||{}; var PROJ=C.projection||{}; var I=idx(cname);
    switch(path){
      // the storyboard's own reads
      case "/storyboard/plan":   return PROJ.plan ? J(PROJ.plan) : J({error:"no plan for "+cname}, 404);
      case "/storyboard/dirty":  return J({});                       // read-only: no staleness map
      case "/storyboard/refs":   return J({keys:[]});
      case "/storyboard/derive": return J({sections:[], note:"derive is an author verb — not in this bundle"});
      // shared corpus reads (the inspector + the header picker)
      case "/corpus/list":       return J({corpora:Object.keys(CORPORA), "default":DEFAULT});
      case "/corpus/meta":       return J(C.meta);
      case "/corpus/macros":     return J({macros:C.macros});
      case "/corpus/spine":      return J({spine:C.spine});
      case "/corpus/techniques": return J({techniques:C.techniques});
      case "/corpus/gaps":       return J({gaps:C.gaps});
      case "/corpus/friction":   return J(C.friction);
      case "/corpus/feedback":   return J({records:(window.__demo_feed||[]).slice(), n:(window.__demo_feed||[]).length});
      case "/corpus/grade":      return J(gradeView(I, parseInt(qs.g||"1",10)));
      case "/corpus/content":    return J(content(I, qs.id||""));
      case "/corpus/neighborhood": return J(neighborhood(I, qs.id||""));
      case "/corpus/search":     return J(search(I, qs.q||""));
      case "/corpus/asset":      return J({error:"assets are not in this demo bundle"}, 404);
      case "/review/learned":    return J(C.learned);
      case "/review/substrate":  return J(C.fork);
    }
    if(path.indexOf("/storyboard/")===0) return J({error:"not in this bundle", ok:false}, 403);
    if(path.indexOf("/corpus/")===0 || path.indexOf("/review/")===0 || path.indexOf("/manuscript/")===0)
      return J({error:"not in this demo bundle", records:[], nodes:[], results:[]}, 404);
    return _fetch(input, init);
  };

  // ── KaTeX (vendored) + a light LaTeX→readable pass for the prose drawer ──
  function ensureKatex(cb){ if(window.renderMathInElement) return cb();
    function inject(src, on){ var sc=document.createElement("script"); sc.src=src; sc.onload=on; sc.onerror=on; document.head.appendChild(sc); }
    if(!window.katex) inject("shared/katex/katex.min.js", function(){ inject("shared/katex/auto-render.min.js", cb); });
    else inject("shared/katex/auto-render.min.js", cb); }
  function renderMath(el){ if(!window.renderMathInElement) return;
    try{ window.renderMathInElement(el, {throwOnError:false, delimiters:[
      {left:"$$",right:"$$",display:true},{left:"\\[",right:"\\]",display:true},
      {left:"$",right:"$",display:false},{left:"\\(",right:"\\)",display:false}]}); }catch(e){} }
  function latexToReadable(tex){
    var s=esc(tex);
    // drop LaTeX PREAMBLE commands (optional [..] arg, one nested-brace level for graphicspath)
    s=s.replace(/\\(?:documentclass|usepackage|graphicspath|pagestyle|setlength|newcommand|renewcommand)\b\*?(?:\[[^\]]*\])?(?:\{(?:[^{}]|\{[^{}]*\})*\})?/g,"");
    // drop title/spacing/structure macros that carry no reading content
    s=s.replace(/\\twocolumn\[/g,"");
    s=s.replace(/\\(?:maketitleeigen|vspace|hspace|vskip|hskip|bigskip|medskip|smallskip|noindent|clearpage|newpage)\*?(?:\[[^\]]*\])?(?:\{[^}]*\})?/g,"");
    s=s.replace(/\\begin\{[^}]*\}/g,"").replace(/\\end\{[^}]*\}/g,"").replace(/\\label\{[^}]*\}/g,"");
    s=s.replace(/\\eigentitle\{([^}]*)\}/g,"<h3 class='pj-h'>$1</h3>")
       .replace(/\\(?:sub)?section\*?\{([^}]*)\}/g,"<h4 class='pj-h'>$1</h4>");
    s=s.replace(/\\cite[tp]?\*?(?:\[[^\]]*\])?\{([^}]*)\}/g,function(m,k){ return "["+k.replace(/,\s*/g,", ")+"]"; });
    s=s.replace(/\\texttt\{([^}]*)\}/g,"<code>$1</code>").replace(/\\emph\{([^}]*)\}/g,"<em>$1</em>")
       .replace(/\\textit\{([^}]*)\}/g,"<em>$1</em>").replace(/\\textbf\{([^}]*)\}/g,"<strong>$1</strong>");
    // number-kerning braces, escaped chars, tildes; strip a stray twocolumn-close bracket line
    s=s.replace(/\{,\}/g,",").replace(/\{\.\}/g,".")
       .replace(/\\_/g,"_").replace(/\\&/g,"&amp;").replace(/\\#/g,"#").replace(/\\%/g,"%")
       .replace(/\\,/g," ").replace(/~/g," ").replace(/^\s*\]\s*$/gm,"");
    return s;
  }

  // ── the prose drawer + the neutral/voiced register toggle ──
  var DRAWER_SID=null, DRAWER_REG="neutral";
  function drawerEl(){ var d=document.getElementById("pj-drawer"); if(d) return d;
    d=document.createElement("div"); d.id="pj-drawer";
    d.innerHTML="<div id='pj-hd'><select id='pj-sec'></select>"+
      "<span id='pj-voice'></span><span style='flex:1'></span><a id='pj-x'>close</a></div>"+
      "<div id='pj-note'></div><div id='pj-body'></div>";
    document.body.appendChild(d);
    document.getElementById("pj-x").onclick=closeDrawer;
    document.getElementById("pj-sec").onchange=function(){ openDrawer(this.value); };
    document.addEventListener("keydown",function(ev){ if(ev.key==="Escape" && d.classList.contains("open")) closeDrawer(); });
    return d; }
  function renderVoiceControl(sec){
    var host=document.getElementById("pj-voice"); if(!host) return;
    var hasVoiced=sec && sec.voiced && (Array.isArray(sec.voiced)?sec.voiced.length:true);
    if(hasVoiced){
      host.innerHTML="<span class='pj-reg'>register</span>"+
        "<a data-r='neutral' class='pj-rbtn"+(DRAWER_REG==="neutral"?" on":"")+"'>neutral</a>"+
        "<a data-r='voiced' class='pj-rbtn"+(DRAWER_REG==="voiced"?" on":"")+"'>voiced</a>";
      host.querySelectorAll(".pj-rbtn").forEach(function(a){ a.onclick=function(){ DRAWER_REG=a.getAttribute("data-r"); openDrawer(DRAWER_SID); }; });
    } else {
      DRAWER_REG="neutral";
      host.innerHTML="<span class='pj-quiet'>register: neutral — the voiced pass awaits the sealed prose store</span>";
    }
  }
  function openDrawer(sid){
    var P=(CORPORA[ACTIVE]||{}).projection||{}; var pr=P.prose||{}; var order=P.order||Object.keys(pr);
    if(!sid || !pr[sid]) sid=order[0]; if(!sid) return;
    DRAWER_SID=sid; PROJ_FOCUS=sid;
    var d=drawerEl(); d.classList.add("open");
    // dock below the banner so the banner (corpus switch, tour, back) stays reachable
    var bn=document.getElementById("demo-banner"); var bh=bn?bn.offsetHeight:0;
    d.style.top=bh+"px"; d.style.height="calc(100% - "+bh+"px)";
    var sec=pr[sid];
    var selHost=document.getElementById("pj-sec"); selHost.innerHTML="";
    order.forEach(function(s){ var o=document.createElement("option"); o.value=s;
      o.textContent=((pr[s]||{}).title)||s; if(s===sid) o.selected=true; selHost.appendChild(o); });
    renderVoiceControl(sec);
    var note=document.getElementById("pj-note");
    note.innerHTML = (P.kind==="reading" && P.note) ? "<b>reading view</b> — "+esc(P.note) : "";
    note.style.display = note.innerHTML ? "block" : "none";
    var body=document.getElementById("pj-body");
    var paras=(DRAWER_REG==="voiced" && Array.isArray(sec.voiced)) ? sec.voiced : (sec.neutral||[]);
    if(!paras.length){ body.innerHTML="<div class='pj-empty'>no projected prose for this section yet</div>"; }
    else { body.innerHTML=paras.map(function(p){
      return "<div class='pj-para'>"+(p.beat?"<span class='pj-beat'>"+esc(p.beat)+"</span>":"")+
        "<div class='pj-txt'>"+latexToReadable(p.text||"")+"</div></div>"; }).join(""); }
    var doRender=function(){ renderMath(body); };
    if(window.renderMathInElement) doRender(); else ensureKatex(doRender);
    var el=document.getElementById("demo-focus"); if(el) el.textContent=sid;
  }
  function closeDrawer(){ var d=document.getElementById("pj-drawer"); if(d) d.classList.remove("open"); }

  // ── DEMO banner + comment dock (the same dock the graph view carries) ──
  function renderDock(){ var q=(window.__demo_feed||[]);
    var qhtml=q.length ? q.slice().reverse().map(function(r){
      return "<div class='demo-row'><b>"+esc(r._state||"queued")+"</b> "+esc(r.kind)+" · "+esc(r.node_id)+
        "<br><span class='demo-dim'>"+esc((r.comment||"").slice(0,90))+"</span> <span class='demo-dim'>— "+esc(r.by)+"</span></div>"; }).join("")
      : "<div class='demo-dim'>no comments yet — open a section (or a node) and comment as visitor:"+esc(VISITOR)+"</div>";
    var body=document.getElementById("demo-dock-body"); if(!body) return;
    body.innerHTML="<div class='demo-sub'>commenting as <b>visitor:"+esc(VISITOR)+"</b> · on <span id='demo-focus'>"+esc(curFocus()||"(open a section)")+"</span></div>"+
      "<select id='demo-kind'><option value='comment'>comment</option><option value='question'>question</option>"+
      "<option value='correction'>correction</option><option value='praise'>praise</option></select>"+
      "<textarea id='demo-comment' placeholder='your comment on this section…'></textarea>"+
      "<button id='demo-send'>queue comment</button><div id='demo-status' class='demo-status'></div>"+
      "<div class='demo-subh'>your comments on <b>"+esc(ACTIVE)+"</b> ("+q.length+")</div>"+qhtml;
    var b=document.getElementById("demo-send"); if(b) b.onclick=queueComment; }
  function buildDock(){ var dock=document.createElement("div"); dock.id="demo-dock";
    dock.innerHTML="<div id='demo-dock-hd'><b>comments</b><span id='demo-min'>–</span></div><div id='demo-dock-body'></div>";
    document.body.appendChild(dock);
    document.getElementById("demo-min").onclick=function(){ dock.classList.toggle("min");
      document.getElementById("demo-min").textContent=dock.classList.contains("min")?"+":"–"; };
    if(window.innerWidth<=700){ dock.classList.add("min"); document.getElementById("demo-min").textContent="+"; }
    renderDock(); }
  function corpusSwitch(){ var names=Object.keys(CORPORA);
    return names.map(function(n){ return "<a class='pj-corp"+(n===ACTIVE?" on":"")+"' data-c='"+esc(n)+"'>"+esc(n)+"</a>"; }).join(" · "); }
  function buildBanner(){ var b=document.createElement("div"); b.id="demo-banner";
    document.body.insertBefore(b, document.body.firstChild); renderBanner(); }
  function renderBanner(){ var b=document.getElementById("demo-banner"); if(!b) return;
    var P=(CORPORA[ACTIVE]||{}).projection||{};
    b.innerHTML="Projection editor — "+corpusSwitch()+" · "+
      (P.kind==="reading"?"<b>reading view</b> (staged projection not yet run)":"<b>staged</b> plan + prose")+
      " · <a id='pj-read'>read the projected prose</a> · <a id='demo-tour-open'>what am I looking at?</a>"+
      " · <a id='pj-back' href='app.html'>← graph view</a>";
    b.querySelectorAll(".pj-corp").forEach(function(a){ a.onclick=function(){
      var n=a.getAttribute("data-c"); if(n && CORPORA[n] && n!==ACTIVE){ params.set("corpus",n);
        location.href="projection.html?corpus="+encodeURIComponent(n); } }; });
    var rp=document.getElementById("pj-read"); if(rp) rp.onclick=function(){ openDrawer(DRAWER_SID); };
    var t=document.getElementById("demo-tour-open"); if(t) t.onclick=function(){ startTour(0); }; }

  // ── the guided tour (this surface's own; the app tour points here) ──
  var TOUR=[
    {sel:"#demo-banner", title:"The projection editor",
     body:"The same corpus as the graph view, one altitude up. This is the engine's own "+
      "storyboard — the plan over the concept graph — running read-only over the baked "+
      "projection. Switch corpus at the top; return to the graph at the right."},
    {sel:"#sb-rail", title:"The spine",
     body:"The argument in order: each beat is a claim the manuscript makes, threaded into "+
      "the narrative spine. Click the label to explode or fold the rail."},
    {sel:"#sb-board", title:"The plan",
     body:"One column per section. Each column carries the section's job and the concept "+
      "nodes it projects, coloured by kind — this is the section→node correspondence, the "+
      "map from the graph to the prose."},
    {sel:"#pj-read", title:"The prose, and its register",
     body:"Open the projected prose: the real converged text each section emitted, per beat. "+
      "The neutral/voiced control switches register — today every section reads neutral; the "+
      "voiced pass turns live when the sealed prose store fills it."},
    {sel:"#demo-dock", title:"Comments",
     body:"Open a section, write. Your comment is minted to the name you gave at the door and "+
      "tied to the section you're on — the same typed intake the graph view feeds."},
    {sel:null, title:"That's the altitude",

<meta charset="utf-8">

<title>storyboard · laplace</title>
<!-- shared hymn sheet + shell + node inspector (graceful no-op if /shared/ absent) -->
<link rel="stylesheet" href="shared/hymn.css">
<style>
/* local :root fallback — the shared hymn.css wins when it loads (injected after) */
:root{
  --bg:#0e1116; --panel:#141a23; --panel2:#1a212c; --edge:#222a36; --edge2:#2d3744;
  --ink:#d7dee8; --ink2:#9aa5b4; --dim:#6b7689;

*{box-sizing:border-box}
html,body{margin:0;height:100%}
/* body is a flex column; the shell (shell.js) injects a fixed header and reserves
   its height as body padding-top (box-sizing:border-box), so #sb fills exactly the
   space below the shell whether or not /shared/ is present. */
body{background:var(--bg);color:var(--ink);display:flex;flex-direction:column;
  font:13px/1.5 -apple-system,"Segoe UI",Roboto,sans-serif;overflow:hidden}

#sb{flex:1;min-height:0;display:flex;flex-direction:column}

/* ─── the spine rail + coverage meter ─── */
#sb-top{flex:none;display:flex;align-items:stretch;gap:0;border-bottom:1px solid var(--edge2);
  background:var(--panel2)}

  flex-wrap:wrap}

  color:var(--dim);font-weight:700;margin-right:4px;cursor:pointer;user-select:none}

.beat{flex:none;display:inline-flex;align-items:center;gap:6px;max-width:340px;
  background:var(--bg);border:1px solid var(--edge);border-left:3px solid var(--keystone);
  border-radius:6px;padding:3px 9px;font-size:11px;color:var(--ink2);cursor:pointer}
.beat:hover{border-color:var(--accent);color:var(--ink)}
.beat .bord{font-family:var(--mono);font-size:9px;color:var(--keystone);font-weight:700}
.beat .bt{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.beat.draggable{cursor:grab}
.beat.dragging{opacity:.35}
.beat.drop-before{box-shadow:-2px 0 0 var(--accent)}
.beat.drop-after{box-shadow:2px 0 0 var(--accent)}
.beat .bnar{flex:none;color:var(--dim);cursor:pointer;font-size:10px;padding:0 1px}
.beat .bnar:hover{color:var(--accent)}
.beat .bnar-input{background:var(--bg);color:var(--ink);border:1px solid var(--accent);
  border-radius:4px;font:inherit;font-size:11px;padding:1px 5px;min-width:160px}
.beat .bnar-input:focus{outline:none}
#sb-meter{flex:none;display:flex;align-items:center;gap:14px;padding:7px 16px;
  border-left:1px solid var(--edge2);background:var(--panel);font-size:11px}
#sb-meter .m{display:flex;flex-direction:column;line-height:1.2}
#sb-meter .m b{font-size:15px;color:var(--ink);font-weight:600;font-family:var(--mono)}
#sb-meter .m span{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--dim)}
#sb-meter .m.warn b{color:var(--warn)}

/* ─── the board + the side rail ─── */
#sb-main{flex:1;min-height:0;display:flex}

  padding:14px;overflow-x:auto;overflow-y:auto;scrollbar-width:thin}
#sb-board .adiv{flex:none;align-self:stretch;width:1px;background:var(--edge2);margin:0 2px}

/* a column is as tall as its content - the BOARD is the one scrolling canvas;
   no per-column scroll panels */
.sb-col{flex:none;width:250px;display:flex;flex-direction:column;
  background:var(--panel);border:1px solid var(--edge);border-radius:10px;overflow:hidden}
.sb-col.appendix{border-style:dashed}

  text-transform:uppercase;letter-spacing:.06em}
.sb-col-h .refs-toggle{cursor:pointer}
.sb-col-h .refs-toggle:hover{color:var(--accent)}

#sb-side{flex:none;width:340px;border-left:1px solid var(--edge2);background:var(--panel);

  border-radius:6px;margin-bottom:4px;cursor:pointer;background:var(--bg)}

#residue .ritem .re{font-size:10.5px;color:var(--ink2);margin-top:2px;

.editpen{font-size:9px;color:var(--dim);cursor:pointer;margin-left:4px}
.editpen:hover{color:var(--accent)}
#sb-status .undo{color:var(--accent);cursor:pointer;border:1px solid var(--edge);
  border-radius:5px;padding:2px 10px;background:var(--panel);font:inherit;font-size:10.5px}
#sb-status .undo:disabled{color:var(--dim);cursor:default;opacity:.45}
#sb-status .grow{margin-left:auto}
#sb-status .rc{padding:1px 8px;border-radius:4px;font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
#sb-status .rc.cheap{background:rgba(158,206,106,.18);color:var(--ok)}
#sb-status .rc.expensive{background:rgba(224,175,104,.18);color:var(--warn)}

/* ─── the rebuild pane ─── */
.rb-head{font-size:12px;font-weight:600;color:var(--ink);margin-bottom:8px}
.rb-list{margin-bottom:10px}
.rb-row{display:flex;align-items:center;gap:7px;padding:5px 8px;border:1px solid var(--edge);
  border-left:3px solid var(--warn);border-radius:6px;margin-bottom:4px;background:var(--bg);font-size:11px}
.rb-row b{font-family:var(--mono);font-size:10.5px;color:var(--ink)}
.rb-row .add{color:var(--ok);font-family:var(--mono);font-size:10px}
.rb-row .rem{color:var(--bad);font-family:var(--mono);font-size:10px}
.rb-actions{display:flex;gap:7px;margin:10px 0}
.rb-actions button{flex:1;font:inherit;font-size:11px;border:1px solid var(--edge);
  background:var(--panel2);color:var(--ink);border-radius:6px;padding:7px;cursor:pointer}
.rb-actions button:hover{border-color:var(--accent)}
.rb-actions button.pri{background:var(--accent);color:#0b0d11;border-color:var(--accent);font-weight:600}
.rb-actions button:disabled{opacity:.5;cursor:default}
.rb-out{margin-top:6px}
.rb-res{font-size:11px;color:var(--ink2);background:var(--bg);border:1px solid var(--edge);
  border-radius:6px;padding:8px 10px;line-height:1.5}
.rb-res.bad{border-color:var(--bad);color:var(--bad)}
.rb-res code{font-family:var(--mono);font-size:10px;color:var(--teal)}

/* ─── the graph (node-graph friction) pane ─── */
#graph .gh{font-size:11px;color:var(--ink2);margin-bottom:8px}
.grow-item{display:flex;align-items:baseline;gap:7px;padding:5px 8px;border:1px solid var(--edge);
  border-left:3px solid var(--teal);border-radius:6px;margin-bottom:4px;background:var(--bg);font-size:10.5px}
.grow-item .gk{font-family:var(--mono);font-size:9px;font-weight:700;color:var(--teal);flex:none;text-transform:uppercase}
.grow-item .gn{font-family:var(--mono);font-size:9.5px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;cursor:pointer}
.grow-item .gn:hover{color:var(--accent)}
.grow-item .gv{font-family:var(--mono);font-size:9px;color:var(--dim);flex:none;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.grow-item.spine{border-left-color:var(--keystone)}.grow-item.spine .gk{color:var(--keystone)}

/* ─── collapse/explode: every column and rail rests as a one-line chip ─── */
.caret{flex:none;cursor:pointer;color:var(--dim);font-size:9px;user-select:none;
  width:13px;text-align:center}
.caret:hover{color:var(--accent)}
.heat{width:7px;height:7px;border-radius:50%;background:var(--ok);flex:none}
.heat.stale{background:var(--warn)}
.heat.unknown{background:var(--dim)}
.sb-col .csum{display:none;margin-left:auto;align-items:center;gap:6px;flex:none;
  font-family:var(--mono);font-size:10px;color:var(--ink2)}
.sb-col.collapsed{width:180px}
.sb-col.collapsed .csum{display:inline-flex}
.sb-col.collapsed .sb-col-h{border-bottom:0;cursor:pointer;padding:7px 9px}
.sb-col.collapsed .job,.sb-col.collapsed .meta,.sb-col.collapsed .sb-refs,
.sb-col.collapsed .sb-col-body{display:none}
.sb-col.collapsed .title{font-size:11.5px;overflow:hidden;text-overflow:ellipsis;
  white-space:nowrap;flex:1;min-width:0}
#sb-rail .rail-chip{flex:none;display:inline-flex;align-items:center;gap:7px;
  background:var(--bg);border:1px solid var(--edge);border-left:3px solid var(--keystone);
  border-radius:6px;padding:3px 10px;font-size:11px;color:var(--ink2);cursor:pointer}
#sb-rail .rail-chip:hover{border-color:var(--accent);color:var(--ink)}
#sb-rail .rail-chip b{font-family:var(--mono);color:var(--keystone)}

/* the side rail folds to a slim strip */
#sb-side.collapsed{width:28px;cursor:pointer}
#sb-side.collapsed #sb-tabs,#sb-side.collapsed #sb-side-body{display:none}
#sb-side-chip{display:none;flex:1;writing-mode:vertical-rl;padding:12px 6px;
  color:var(--dim);font-size:10px;letter-spacing:.1em;text-transform:uppercase;
  user-select:none}
#sb-side.collapsed #sb-side-chip{display:block}
#sb-side:hover #sb-side-chip{color:var(--accent)}
#sb-tabs .side-collapse{flex:none;width:24px;color:var(--dim);font-size:10px}
#sb-tabs .side-collapse:hover{color:var(--accent)}

/* residue kind-groups fold to their header line */
#residue .rgh{cursor:pointer;user-select:none}
#residue .rgh:hover{color:var(--ink2)}
#residue .rgroup.closed .ritem,#residue .rgroup.closed .note{display:none}

/* ─── beat<->section anchoring (plan beats[] + substrate section_ref) ─── */
.sb-col.anchored{border-color:var(--keystone);box-shadow:0 0 0 1px var(--keystone)}
.beat.anchored{border-color:var(--keystone);color:var(--ink);
  background:rgba(187,154,247,.12)}
.chip.anchored{border-color:var(--keystone)}

/* ─── per-section ref include/exclude chips + the global-bib picker ─── */
.ref-chip{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);
  font-size:9px;color:var(--ink2);background:var(--bg);border:1px solid var(--edge);
  border-radius:4px;padding:1px 5px;cursor:pointer}
.ref-chip .x{color:var(--dim);font-size:8px}
.ref-chip:hover{border-color:var(--bad);color:var(--ink)}
.ref-chip:hover .x{color:var(--bad)}
.ref-add{display:inline-flex;align-items:center;font-family:var(--mono);font-size:9px;
  color:var(--dim);border:1px dashed var(--edge2);border-radius:4px;padding:1px 6px;
  cursor:pointer}
.ref-add:hover{color:var(--accent);border-color:var(--accent)}
.ref-add-input{background:var(--bg);color:var(--ink);border:1px solid var(--accent);
  border-radius:4px;font:inherit;font-family:var(--mono);font-size:9.5px;
  padding:1px 5px;width:150px}
.ref-add-input:focus{outline:none}

/* ─── the upper-half staleness strip: plan→prose is a materialised projection ─── */
#sb-stale{flex:none;display:flex;align-items:center;gap:8px;padding:7px 14px;
  border-left:1px solid var(--edge2);background:var(--panel);font-size:11px;
  color:var(--ink2);white-space:nowrap}
#sb-stale .slab{font-size:9px;text-transform:uppercase;letter-spacing:.08em;
  color:var(--dim);font-weight:700}
#sb-stale .stale-n{font-family:var(--mono);font-weight:600;color:var(--warn)}
#sb-stale .stale-n.clean{color:var(--ok)}
#sb-stale button{font:inherit;font-size:10.5px;border:1px solid var(--edge);
  background:var(--panel2);color:var(--ink);border-radius:5px;padding:2px 10px;
  cursor:pointer}
#sb-stale button:hover{border-color:var(--accent)}
#sb-stale button:disabled{opacity:.5;cursor:default}
#sb-stale .disp-out{font-size:10px;color:var(--dim);max-width:340px;overflow:hidden;
  text-overflow:ellipsis}
#sb-stale .disp-out code{font-family:var(--mono);font-size:9.5px;color:var(--teal)}
</style>
</head>
<body>
<div id="sb">
  <div id="sb-top">
    <div id="sb-rail"><span class="rlabel" title="collapse / explode the spine rail">spine</span><span class="rl-body" style="display:contents"></span></div>
    <div id="sb-stale"></div>
    <div id="sb-meter"></div>
  </div>
  <div id="sb-main">
    <div id="sb-board"><div class="center">loading the board…</div></div>
    <div id="sb-side">
      <div id="sb-side-chip" title="explode the side rail">tools · residue / inspector / rebuild / graph</div>
      <div id="sb-tabs">
        <button data-pane="residue" class="on">residue</button>
        <button data-pane="inspector">inspector</button>
        <button data-pane="rebuild">rebuild</button>
        <button data-pane="graph">graph</button>
        <button class="side-collapse" id="sb-side-collapse" title="collapse the side rail">⟩</button>
      </div>
      <div id="sb-side-body">
        <div id="residue" class="sb-pane on"><div class="note">the un-projected pool loads with the board.</div></div>
        <div id="inspector" class="sb-pane"><div class="note">click a node chip to inspect it here.</div></div>
        <div id="rebuild" class="sb-pane"><div class="note">edit the plan, then rebuild here.</div></div>
        <div id="graph" class="sb-pane"><div class="note">the node-graph edits the board makes.</div></div>
      </div>
    </div>
  </div>
  <div id="sb-status"><span class="dot"></span><span id="sb-msg">—</span>
    <span class="grow"></span><span id="sb-rc"></span>
    <button class="undo" id="sb-undo" disabled>undo</button></div>
</div>
<datalist id="sb-bib-keys"></datalist>

<script defer src="shared/shell.js"></script>
<script defer src="shared/inspector.js"></script>
<script>
"use strict";
(function(){
  const $  = s => document.querySelector(s);
  const ec = encodeURIComponent;
  const esc = s => String(s==null?"":s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

  // one corpus, carried by the shell across views
  const params = new URLSearchParams(location.search);
  let CORPUS = params.get("corpus") || "";
  let PLAN = null;
  let DIRTY = null;    // sid -> dirty_report row (the plan→prose staleness map)
  let BIB = null;      // the global bib key list, fetched lazily for the refs picker

  // ── collapse/explode state, persisted per corpus ────────────────────────
  // every column and rail rests as a one-line summary chip; the working set
  // stays exploded across reloads. Defaults: rail + columns collapsed (the
  // board reads as a heat dashboard at rest), side rail exploded.
  let COLLAPSE = {rail:true, side:false, cols:{}};
  const lsKey = () => "sb.collapse." + CORPUS;
  function loadCollapse(){
    try{ const j = JSON.parse(localStorage.getItem(lsKey()) || "{}");
      COLLAPSE = {rail: j.rail !== false, side: !!j.side, cols: j.cols || {}}; }
    catch(e){ COLLAPSE = {rail:true, side:false, cols:{}}; }
  }
  function saveCollapse(){
    try{ localStorage.setItem(lsKey(), JSON.stringify(COLLAPSE)); }catch(e){}
  }
  const colCollapsed = sid => COLLAPSE.cols[sid] !== false;   // default: collapsed
  function setColCollapsed(sid, v){ COLLAPSE.cols[sid] = !!v; saveCollapse(); }

  // kind → chip accent (mirrors hymn.css .hy-kbadge families)
  const KC = {
    definition:"--accent", def:"--accent", result:"--ok", res:"--ok",
    theorem:"--keystone", thm:"--keystone", equation:"--keystone",
    lemma:"--teal", lem:"--teal", "intermediate-result":"--teal", ires:"--teal",
    "derivation-step":"--dim", step:"--dim", ds:"--dim",
    postulate:"--ok", pos:"--ok", technique:"--warn", tech:"--warn",
    figure:"--warn", fig:"--warn", support:"--ink2", sup:"--ink2",
    citation:"--teal", ref:"--teal", goal:"--keystone", portal:"--accent"
  };
  const kindOf = id => (id.split(":")[0] || "").toLowerCase();
  const kcVar  = (kind,id) => KC[kind] || KC[kindOf(id)] || "--ink2";

  // a fetch that never hangs the UI (bounded, surfaces its own failure);
  // ms widens the bound for the long legs (dispatch runs the brief build)
  async function safeFetch(url, opts, ms){
    const ctl = new AbortController();
    const t = setTimeout(() => ctl.abort(), ms || 20000);
    try{ return await fetch(url, {...(opts||{}), signal: ctl.signal}); }
    finally{ clearTimeout(t); }
  }
  function status(msg, cls){
    $("#sb-msg").textContent = msg;
    const d = $("#sb-status .dot"); d.className = "dot" + (cls ? " "+cls : "");
  }

  // ── beat<->section anchoring ────────────────────────────────────────────
  // the mapping is the plan's beats[] (beat -> owning section) plus the
  // substrate's section_ref (node -> anchor beat, from node_meta): hovering a
  // beat lights its owning column and the chips anchored to it, and vice versa.
  function beatOwners(){
    const m = {};
    (PLAN.sections||[]).concat(PLAN.appendices||[]).forEach(s =>
      (s.beats||[]).forEach(b => { if(!(b in m)) m[b] = s.id; }));
    return m;
  }
  function clearAnchored(){
    document.querySelectorAll(".anchored").forEach(e => e.classList.remove("anchored"));
  }
  function anchorFromBeat(beatId){
    clearAnchored();
    const owner = beatOwners()[beatId];
    if(owner){
      const col = document.querySelector(".sb-col[data-id='"+CSS.escape(owner)+"']");
      if(col) col.classList.add("anchored");
    }
    document.querySelectorAll(".chip").forEach(c => {
      const m = (PLAN.node_meta||{})[c.dataset.id];
      if((m && m.section_ref === beatId) || c.dataset.id === beatId) c.classList.add("anchored");
    });
  }
  function anchorFromSection(sec){
    clearAnchored();
    (sec.beats||[]).forEach(b => {
      const el = document.querySelector(".beat[data-id='"+CSS.escape(b)+"']");
      if(el) el.classList.add("anchored");
    });
  }
  function revealSection(sid){
    const col = document.querySelector(".sb-col[data-id='"+CSS.escape(sid)+"']");
    if(col) col.scrollIntoView({behavior:"smooth", inline:"center", block:"nearest"});
  }

  // ── inbound focus (?focus=<node> / ?section=<id>): the tower joins upward, so a
  // review-surface node chip lands here scroll-flashed. Additive: absent params → no-op.
  function focusFromParams(){
    const fnode = params.get("focus") || "", fsec = params.get("section") || "";
    let sid = fsec;
    let chipEl = fnode ? document.querySelector(".chip[data-id='"+CSS.escape(fnode)+"']") : null;
    if(chipEl && !sid) sid = chipEl.dataset.section || "";
    // reveal a collapsed column so the chip is visible to scroll/flash (one-shot,
    // DOM-only — the persisted collapse state is untouched)
    const col = sid ? document.querySelector(".sb-col[data-id='"+CSS.escape(sid)+"']") : null;
    if(col) col.classList.remove("collapsed");
    if(sid) revealSection(sid);
    if(fnode && !chipEl && col)
      chipEl = col.querySelector(".chip[data-id='"+CSS.escape(fnode)+"']");
    if(chipEl){
      chipEl.scrollIntoView({behavior:"smooth", block:"center", inline:"center"});
      chipEl.classList.add("flash-focus");
      setTimeout(() => chipEl.classList.remove("flash-focus"), 1400);
      openNode(fnode);
    }else if(col){
      col.classList.add("flash-focus");
      setTimeout(() => col.classList.remove("flash-focus"), 1400);
    }
  }

  // ── render: the spine rail (collapses to a one-line summary chip) ───────
  function renderRail(spine){
    const rail = $("#sb-rail");
    // keep the label, replace the rest
    rail.querySelectorAll(".beat,.rl-empty,.rail-chip").forEach(n => n.remove());
    rail.classList.toggle("collapsed", !!COLLAPSE.rail);
    $("#sb-rail .rlabel").onclick = () => {
      COLLAPSE.rail = !COLLAPSE.rail; saveCollapse(); renderRail(PLAN.spine); };
    if(!spine || !spine.length){
      const e = document.createElement("span");
      e.className = "rl-empty"; e.style.cssText = "color:var(--dim);font-size:10.5px;font-style:italic";
      e.textContent = "no spine set on this conceptric yet";
      rail.appendChild(e); return;
    }
    if(COLLAPSE.rail){
      const chip = document.createElement("span");
      chip.className = "rail-chip";
      chip.title = "click to explode the spine rail";
      chip.innerHTML = "<b>"+spine.length+"</b> beats · "+
        esc((spine[0].term || spine[0].id))+" → "+
        esc((spine[spine.length-1].term || spine[spine.length-1].id));
      chip.onclick = () => { COLLAPSE.rail = false; saveCollapse(); renderRail(PLAN.spine); };
      rail.appendChild(chip); return;
    }
    spine.forEach(b => {
      const el = document.createElement("span");
      el.className = "beat draggable"; el.dataset.id = b.id;
      el.innerHTML = "<span class='bord'>"+esc(b.ord)+"</span>"+
        "<span class='bt'>"+esc(b.term || b.id)+"</span>"+
        "<span class='bnar no-drag' title='edit the connective narrative'>✎</span>";
      // full text on hover: id + term, then the connective narrative
      el.title = b.id + (b.term ? " · " + b.term : "") +
        (b.narrative ? "\n— " + b.narrative : "");
      el.querySelector(".bnar").onclick = e => { e.stopPropagation(); editNarrative(el, b); };
      el.addEventListener("mouseenter", () => anchorFromBeat(b.id));
      el.addEventListener("mouseleave", clearAnchored);
      registerDrag(el, () => ({type:"spine", id:b.id, label:(b.term||b.id)}),
        () => { const o = beatOwners()[b.id]; if(o) revealSection(o); openNode(b.id); });
      rail.appendChild(el);
    });
  }
  // inline-edit a beat's connective narrative (no prompt()) -> set-spine {narrative}
  function editNarrative(el, b){
    const cur = b.narrative || "";
    const inp = document.createElement("input");
    inp.className = "bnar-input no-drag"; inp.value = cur;
    inp.placeholder = "connective to the next beat…";
    el.innerHTML = ""; el.appendChild(inp); inp.focus(); inp.select();
    let done = false;
    const commit = () => { if(done) return; done = true;
      const v = inp.value.trim();
      if(v !== cur.trim()) spineApply({kind:"set-narrative", node:b.id, ord:b.ord, narrative:v});
      else renderRail(PLAN.spine); };
    inp.onkeydown = e => {
      if(e.key === "Enter"){ e.preventDefault(); inp.blur(); }
      if(e.key === "Escape"){ done = true; renderRail(PLAN.spine); } };
    inp.onblur = commit;
  }
  // spine writes go to /corpus/rewire (node graph), NOT the plan ledger - so the
  // plan undo does not cover them; the rail reflects the node-side spine directly.
  async function spineApply(op){
    if(BUSY) return; BUSY = true; status("saving spine…", "busy");
    op = {...op, corpus: CORPUS};
    let r, j = {};
    try{ r = await safeFetch("/storyboard/spine", {method:"POST",
      headers:{"Content-Type":"application/json"}, body: JSON.stringify(op)}); }
    catch(e){ status("offline — spine edit not saved", "bad"); BUSY = false; return; }
    try{ j = await r.json(); }catch(e){}
    BUSY = false;
    if(!r.ok || !j.ok){ status("spine edit failed", "bad"); return; }
    PLAN = j.plan; render(PLAN); status("spine saved · " + CORPUS, "");
  }
  window.__sbSpineOp = spineApply;   // test hook

  // ── render: the coverage meter ──────────────────────────────────────────
  function renderMeter(p){
    const c = p.coverage || {};
    const nSec = (p.sections||[]).length, nApp = (p.appendices||[]).length;
    const cells = [
      ["sections", nSec + (nApp ? "+"+nApp : ""), false],
      ["planned nodes", c.planned!=null ? c.planned : "—", false],
      ["in residue", c.n_residue!=null ? c.n_residue : "—", c.n_residue>0],
      ["live nodes", c.n_live!=null ? c.n_live : "—", false],
    ];
    $("#sb-meter").innerHTML = cells.map(([lab,val,warn]) =>
      "<div class='m"+(warn?" warn":"")+"'><b>"+esc(val)+"</b><span>"+esc(lab)+"</span></div>").join("");
  }

  // one drag at a time — a plain object beats reading dataTransfer mid-dragover
  // (which browsers restrict); {type:'node'|'section', id, from} where from is the
  // owning section id (null when dragged out of the residue tray).
  let DRAG = null;

  // ── render: one node chip ───────────────────────────────────────────────
  function chip(id, sec){
    const beats = (sec && sec.beats) || [];
    const secId = sec && sec.id;
    const isFig = !!(sec && sec.fig);
    const m = (PLAN.node_meta||{})[id] || {id:id, missing:true};
    const isBeat = beats.indexOf(id) >= 0;
    const cls = ["chip", isBeat?"is-beat":"", m.missing?"missing":"", m.retired?"retired":""]
      .filter(Boolean).join(" ");
    const el = document.createElement("div");
    el.className = cls; el.dataset.id = id; if(secId) el.dataset.section = secId;
    el.style.setProperty("--kc", "var("+kcVar(m.kind,id)+")");
    // figures live in section.figures (managed separately), so they are not
    // node-draggable and carry no beat toggle
    const canDrag = !!secId && !isFig;
    if(canDrag) el.classList.add("draggable");
    el.innerHTML =
      (canDrag ? "<span class='bt-toggle' title='toggle beat'>"+(isBeat?"★":"☆")+"</span>" : "")+
      "<span class='lbl'>"+esc(m.term || (m.missing ? id+" · MISSING" : id.split(":").slice(1).join(":") || id))+"</span>";
    el.title = id + (m.kind ? " · "+m.kind : "") + (m.grade!=null ? " · g"+m.grade : "");
    const bt = el.querySelector(".bt-toggle");
    if(bt) bt.onclick = e => { e.stopPropagation();
      applyOp({kind:"toggle-beat", section:secId, node:id, on:!isBeat}); };
    if(canDrag) registerDrag(el, () => ({type:"node", id:id, from:secId, label:(m.term||id)}), () => openNode(id));
    else el.addEventListener("click", () => openNode(id));
    return el;
  }

  // ── per-section refs: include/exclude chips + the global-bib picker ─────
  // membership in the plan's refs[] IS inclusion; a chip click excludes, the
  // picker includes - both through the ONE set-refs plan op (validated,
  // ledgered, undoable). The picker's list is /storyboard/refs (global bib).
  async function bibKeys(){
    if(BIB) return BIB;
    try{
      const r = await safeFetch("/storyboard/refs?corpus="+ec(CORPUS));
      if(r.ok){ BIB = (await r.json()).keys || [];
        $("#sb-bib-keys").innerHTML = BIB.map(k=>"<option value='"+esc(k)+"'>").join(""); }
    }catch(e){ BIB = []; }
    return BIB || [];
  }
  function refsStrip(sec){
    const wrap = document.createElement("div");
    wrap.className = "sb-refs";
    (sec.refs||[]).forEach(r => {
      const c = document.createElement("span");
      c.className = "ref-chip"; c.title = "click to exclude "+r+" from this section";
      c.innerHTML = esc(r)+"<span class='x'>✕</span>";
      c.onclick = () => applyOp({kind:"set-refs", section:sec.id,
        refs:(sec.refs||[]).filter(x => x !== r)});
      wrap.appendChild(c);
    });
    const add = document.createElement("span");
    add.className = "ref-add"; add.textContent = "+ ref";
    add.title = "include a reference from the global bib";
    add.onclick = async () => {
      await bibKeys();
      const inp = document.createElement("input");
      inp.className = "ref-add-input"; inp.setAttribute("list", "sb-bib-keys");
      inp.placeholder = "bib key…";
      add.replaceWith(inp); inp.focus();
      let done = false;
      const commit = () => { if(done) return; done = true;
        const k = inp.value.trim();
        if(k && (sec.refs||[]).indexOf(k) < 0)
          applyOp({kind:"set-refs", section:sec.id, refs:(sec.refs||[]).concat([k])});
        else inp.replaceWith(add); };
      inp.onkeydown = e => {
        if(e.key === "Enter"){ e.preventDefault(); commit(); }
        if(e.key === "Escape"){ done = true; inp.replaceWith(add); } };
      inp.onchange = commit;   // datalist pick
      inp.onblur = () => setTimeout(commit, 120);
    };
    wrap.appendChild(add);
    return wrap;
  }

  // ── render: one section column (collapses to a one-line chip) ───────────
  function column(sec, ord, isApp){
    const col = document.createElement("div");
    const closed = colCollapsed(sec.id);
    col.className = "sb-col" + (isApp ? " appendix" : "") + (closed ? " collapsed" : "");
    col.dataset.id = sec.id; col.dataset.app = isApp ? "1" : "";
    const nodes = sec.nodes_in_order || [];
    const d = DIRTY && DIRTY[sec.id];
    const heat = d ? (d.dirty ? "stale" : "") : "unknown";
    col.innerHTML =
      "<div class='sb-col-h'>"+
        "<div class='row1'><span class='caret' title='"+(closed?"explode":"collapse")+"'>"+
          (closed?"▸":"▾")+"</span>"+
        "<span class='drag-h' draggable='true' title='drag to reorder'>⠿</span>"+
        "<span class='ord'>"+esc(isApp?sec.id:ord)+"</span>"+
        "<span class='title' spellcheck='false'>"+esc(sec.title)+"</span>"+
        "<span class='csum'><span>"+nodes.length+"</span>"+
          "<span class='heat "+heat+"' title='"+(d&&d.dirty?"prose is stale for this section":"prose matches the plan")+"'></span></span>"+
        "</div>"+
        "<div class='job' spellcheck='false' title='click to edit the section job'>"+esc(sec.job)+"</div>"+
        "<div class='meta'><span>"+nodes.length+" nodes</span>"+
        (sec.beats&&sec.beats.length?"<span>"+sec.beats.length+" beats</span>":"")+
        "<span>"+(sec.refs||[]).length+" refs</span>"+
        (sec.figures&&sec.figures.length?"<span>"+sec.figures.length+" figs</span>":"")+
        // the tower joins downward: review this manuscript's compiled artefact
        (CORPUS?"<a class='sb-review' href='/review?corpus="+ec(CORPUS)+"' target='_blank' "+
          "title='review the compiled artefact on the review surface'>review ↗</a>":"")+
        "</div>"+
      "</div>"+
      "<div class='sb-col-body'></div>";
    const head = col.querySelector(".sb-col-h");
    // refs as include/exclude toggle chips, rendered in the explode view
    head.appendChild(refsStrip(sec));

    // collapse/explode: the caret in both states, the whole header when closed
    col.querySelector(".caret").onclick = e => {
      e.stopPropagation(); setColCollapsed(sec.id, !closed); render(PLAN); };
    if(closed) head.addEventListener("click", e => {
      if(e.target.closest(".drag-h,.caret")) return;
      setColCollapsed(sec.id, false); render(PLAN); });

    // hovering a section lights its beats on the rail (the reverse anchoring)
    col.addEventListener("mouseenter", () => anchorFromSection(sec));
    col.addEventListener("mouseleave", clearAnchored);

    // inline edit: title + job (contenteditable, commit on blur/Enter — no
    // prompt()); exploded only - a collapsed header click means explode
    if(!closed){
      wireInlineEdit(col.querySelector(".title"), sec.id, "retitle", "title", sec.title);
      wireInlineEdit(col.querySelector(".job"),   sec.id, "edit-job", "job", sec.job);
    }

    // section reorder (drag handle) — pointer drag, drags the whole column
    const dh = col.querySelector(".drag-h");
    registerDrag(dh, () => ({type:"section", id:sec.id, app:isApp, label:sec.title, col:col}), null);

    const bodyEl = col.querySelector(".sb-col-body");
    if(!nodes.length) bodyEl.innerHTML = "<div class='empty'>no nodes pinned — drop one here</div>";
    else nodes.forEach(id => bodyEl.appendChild(chip(id, sec)));
    if(sec.figures && sec.figures.length){
      const f = document.createElement("div"); f.className = "sb-figs";
      f.innerHTML = "<div class='fh'>figures</div>";
      sec.figures.forEach(id => f.appendChild(chip(id, {id:sec.id, beats:[], fig:true})));
      bodyEl.appendChild(f);
    }
    return col;
  }

  // ── the pointer-drag engine ─────────────────────────────────────────────
  // native HTML5 DnD is finicky (headless, touch, cross-browser); a small
  // pointer-drag is reliable, testable, and touch-friendly. registerDrag ties an
  // element to a drag payload + an optional click action (drag beats click once
  // the pointer moves past a threshold). The board reads DRAG during the move.
  let PEND = null;   // {el, x, y, dataFn, onClick, dragging, ghost}

  function registerDrag(el, dataFn, onClick){
    el.addEventListener("mousedown", e => {
      if(e.button !== 0) return;
      if(e.target.classList.contains("bt-toggle") || e.target.closest(".no-drag")) return;
      if(el.getAttribute("contenteditable") === "true") return;
      PEND = {el, x:e.clientX, y:e.clientY, dataFn, onClick, dragging:false, ghost:null};
      e.preventDefault();   // stop text selection / native image drag
    });
  }
  function clearDropMarks(){
    document.querySelectorAll(".drop-before,.drop-after,.drop-active")
      .forEach(e => e.classList.remove("drop-before","drop-after","drop-active"));
  }
  function nodeInsertIndex(bodyEl, y){
    const chips = [...bodyEl.querySelectorAll(".chip")].filter(c => !c.closest(".sb-figs"));
    for(let i=0;i<chips.length;i++){
      const r = chips[i].getBoundingClientRect();
      if(y < r.top + r.height/2) return i;
    }
    return chips.length;
  }
  function findSec(sid){
    return (PLAN.sections||[]).concat(PLAN.appendices||[]).find(s => s.id === sid) || null;
  }
  function elAt(x, y, sel){
    const e = document.elementFromPoint(x, y);
    return e ? e.closest(sel) : null;
  }
  function hitTest(x, y){
    clearDropMarks();
    if(!DRAG) return;
    if(DRAG.type === "node"){
      const body = elAt(x, y, ".sb-col-body");
      if(body) body.classList.add("drop-active");
      else{
        const col = elAt(x, y, ".sb-col.collapsed");   // a folded column takes the drop whole
        if(col) col.classList.add("drop-active");
      }
    } else if(DRAG.type === "section"){
      const col = elAt(x, y, ".sb-col");
      if(col && col.dataset.id !== DRAG.id && !!col.dataset.app === !!DRAG.app){
        const r = col.getBoundingClientRect();
        col.classList.add(x > r.left + r.width/2 ? "drop-after" : "drop-before");
      }
    } else if(DRAG.type === "spine"){
      const beat = elAt(x, y, ".beat");
      if(beat && beat.dataset.id !== DRAG.id){
        const r = beat.getBoundingClientRect();
        beat.classList.add(x > r.left + r.width/2 ? "drop-after" : "drop-before");
      }
    }
  }
  function resolveDrop(x, y){
    if(!DRAG) return;
    if(DRAG.type === "node"){
      let body = elAt(x, y, ".sb-col-body");
      let col = body ? body.closest(".sb-col") : elAt(x, y, ".sb-col.collapsed");
      if(!col) return;
      const sid = col.dataset.id;
      const sec = findSec(sid); if(!sec) return;
      // a collapsed column appends at the end; an open body drops at the pointer
      const idx = body ? nodeInsertIndex(body, y) : (sec.nodes_in_order||[]).length;
      if(DRAG.from === sid){
        const order = (sec.nodes_in_order||[]).filter(n => n !== DRAG.id);
        order.splice(idx, 0, DRAG.id);
        applyOp({kind:"reorder-nodes", section:sid, order});
      } else if(DRAG.from == null){
        applyOp({kind:"add-node", section:sid, node:DRAG.id, index:idx});
      } else {
        applyOp({kind:"move-node", node:DRAG.id, from:DRAG.from, to:sid, index:idx});
      }
    } else if(DRAG.type === "section"){
      const col = elAt(x, y, ".sb-col");
      if(!col || col.dataset.id === DRAG.id || !!col.dataset.app !== !!DRAG.app) return;
      const r = col.getBoundingClientRect();
      const after = x > r.left + r.width/2;
      const key = DRAG.app ? "appendices" : "sections";
      const cur = (PLAN[key]||[]).map(s => s.id).filter(id => id !== DRAG.id);
      let at = cur.indexOf(col.dataset.id); if(after) at += 1;
      cur.splice(at, 0, DRAG.id);
      applyOp({kind: DRAG.app ? "reorder-appendices" : "reorder-sections", order:cur});
    } else if(DRAG.type === "spine"){
      const beat = elAt(x, y, ".beat");
      if(!beat || beat.dataset.id === DRAG.id) return;
      const r = beat.getBoundingClientRect();
      const after = x > r.left + r.width/2;
      const cur = (PLAN.spine||[]).map(b => b.id).filter(id => id !== DRAG.id);
      let at = cur.indexOf(beat.dataset.id); if(after) at += 1;
      cur.splice(at, 0, DRAG.id);
      spineApply({kind:"reorder-spine", order:cur});
    }
  }
  document.addEventListener("mousemove", e => {
    if(!PEND) return;
    if(!PEND.dragging){
      if(Math.hypot(e.clientX - PEND.x, e.clientY - PEND.y) < 5) return;
      PEND.dragging = true;
      DRAG = PEND.dataFn();
      (DRAG.col || PEND.el).classList.add("dragging");
      const g = document.createElement("div"); g.className = "drag-ghost";
      g.textContent = DRAG.label || DRAG.id; document.body.appendChild(g);
      PEND.ghost = g; document.body.style.userSelect = "none";
    }
    PEND.ghost.style.left = (e.clientX + 10) + "px";
    PEND.ghost.style.top  = (e.clientY + 10) + "px";
    hitTest(e.clientX, e.clientY);
  });
  document.addEventListener("mouseup", e => {
    if(!PEND) return;
    const p = PEND; PEND = null;
    if(!p.dragging){ if(p.onClick) p.onClick(); return; }
    (DRAG && DRAG.col || p.el).classList.remove("dragging");
    if(p.ghost) p.ghost.remove();
    document.body.style.userSelect = "";
    resolveDrop(e.clientX, e.clientY);
    DRAG = null; clearDropMarks();
  });

  // ── inline edit (no native prompt) ──────────────────────────────────────
  function wireInlineEdit(el, secId, kind, field, original){
    if(!el) return;
    el.addEventListener("click", () => {
      if(el.getAttribute("contenteditable") === "true") return;
      el.setAttribute("contenteditable", "true"); el.focus();
      const rng = document.createRange(); rng.selectNodeContents(el);
      const sel = getSelection(); sel.removeAllRanges(); sel.addRange(rng);
    });
    el.addEventListener("keydown", e => {
      if(e.key === "Enter" && field === "title"){ e.preventDefault(); el.blur(); }
      if(e.key === "Escape"){ el.textContent = original; el.blur(); }
    });
    el.addEventListener("blur", () => {
      el.removeAttribute("contenteditable");
      const val = el.textContent.trim();
      if(val !== (original||"").trim()) applyOp({kind, section:secId, [field]:val});
    });
  }

  // ── render: the board ───────────────────────────────────────────────────
  function renderBoard(p){
    const board = $("#sb-board");
    board.innerHTML = "";
    (p.sections||[]).forEach((s,i) => board.appendChild(column(s, i+1, false)));
    if((p.appendices||[]).length){
      const d = document.createElement("div"); d.className = "adiv"; board.appendChild(d);
      (p.appendices||[]).forEach(a => board.appendChild(column(a, null, true)));
    }
    if(!(p.sections||[]).length && !(p.appendices||[]).length)
      board.innerHTML = "<div class='center'>this plan has no sections yet</div>";
  }

  // ── render: the residue tray ────────────────────────────────────────────
  function renderResidue(res){
    const el = $("#residue");
    if(!res){ el.innerHTML = "<div class='note'>residue unavailable — the paper may not be compiled yet, "+
      "so the un-projected pool cannot be computed.</div>"; return; }
    const byKind = res.by_kind || {};
    const kinds = Object.keys(byKind);
    if(!kinds.length){ el.innerHTML = "<div class='note'>nothing in residue — every live node is projected.</div>"; return; }
    el.innerHTML = "<div class='note' style='margin-bottom:8px'>"+esc(res.n_residue)+
      " of "+esc(res.n_live)+" live nodes are not pinned by any section.</div>"+
      kinds.map(k => {
        const rows = byKind[k];
        const CAP = 40;                              // bound the render; never silently truncate
        const shown = rows.slice(0, CAP);
        // groups rest folded to their header chip (count) - no long scroll
        return "<div class='rgroup closed'><div class='rgh' title='collapse / explode'>"+
          "<span>▸ "+esc(k)+"</span><span class='rc'>"+rows.length+"</span></div>"+
          shown.map(n => "<div class='ritem' data-id='"+esc(n.id)+"' style='--kc:var("+kcVar(k,n.id)+")'>"+
            "<div class='rid'>"+esc(n.id)+(n.grade!=null?" · g"+esc(n.grade):"")+"</div>"+
            (n.essence?"<div class='re'>"+esc(n.essence)+"</div>":"")+"</div>").join("")+
          (rows.length>CAP?"<div class='note' style='padding:2px 6px'>+"+(rows.length-CAP)+" more "+esc(k)+" (search to reach them)</div>":"")+
          "</div>";
      }).join("");
    el.querySelectorAll(".rgh").forEach(h => h.addEventListener("click", () => {
      const g = h.closest(".rgroup");
      const open = !g.classList.toggle("closed");
      h.querySelector("span").textContent = (open ? "▾ " : "▸ ") + h.querySelector("span").textContent.slice(2);
    }));
    el.querySelectorAll(".ritem").forEach(it => {
      const id = it.dataset.id;
      it.classList.add("draggable");
      registerDrag(it, () => ({type:"node", id:id, from:null, label:id}), () => openNode(id));
    });
    if(window.renderMath) window.renderMath(el);     // KaTeX over residue essences
  }

  // ── the inspector (shared HymnInspector) ────────────────────────────────
  function openNode(id){
    // switch to the inspector tab and mount the shared node card
    $("#sb-tabs button[data-pane='inspector']").click();
    const host = $("#inspector");
    if(window.HymnInspector){ host.innerHTML = ""; window.HymnInspector.mount(host, {corpus:CORPUS, id:id, compact:true}); }
    else host.innerHTML = "<div class='note'>node "+esc(id)+" — inspector unavailable (/shared/ absent)</div>";
  }
  // let the shell's node search focus in-board instead of navigating away
  window.__hymnOpenNode = openNode;

  // ── the write path: one op → POST /storyboard/plan → re-render from the plan ──
  let BUSY = false;
  async function applyOp(op){
    if(BUSY) return;                       // one write in flight at a time
    BUSY = true; status("saving…", "busy");
    op = {...op, corpus: CORPUS};
    let r, j = {};
    try{ r = await safeFetch("/storyboard/plan", {method:"POST",
      headers:{"Content-Type":"application/json"}, body: JSON.stringify(op)}); }
    catch(e){ status("offline — edit not saved", "bad"); BUSY = false; return; }
    try{ j = await r.json(); }catch(e){}
    BUSY = false;
    if(!r.ok || !j.ok){
      const v = j.validation || {};
      const probs = (v.missing_nodes||[]).concat(v.retired_used||[]).concat(v.missing_refs||[]);
      status("rejected — " + (j.error || (probs.length ? probs.length+" structural problem(s)" : "invalid edit")), "bad");
      flashBad(op);
      return;
    }
    PLAN = j.plan;
    render(PLAN);
    setRebuildClass(j.rebuild_class);
    refreshDirty();                         // the upper half re-reads its staleness
    $("#sb-undo").disabled = false;
    const advisory = (j.validation||{}).unplanned_claims;
    status("saved · " + CORPUS + (advisory && advisory.length ? " · "+advisory.length+" unplanned claim(s)" : ""), "");
  }
  window.__sbApplyOp = applyOp;            // test hook

  function setRebuildClass(cls){
    const el = $("#sb-rc");
    el.innerHTML = cls ? "<span class='rc "+esc(cls)+"'>"+esc(cls)+" rebuild</span>" : "";
  }
  function flashBad(op){
    const id = op.node;
    document.querySelectorAll(".chip").forEach(c => {
      if(c.dataset.id === id){ c.classList.add("flash-bad"); setTimeout(()=>c.classList.remove("flash-bad"), 900); }
    });
  }

  // undo = drop the last ledger op, server re-reduces
  $("#sb-undo").onclick = async () => {
    if(BUSY) return; BUSY = true; status("undoing…", "busy");
    let r, j = {};
    try{ r = await safeFetch("/storyboard/plan/undo", {method:"POST",
      headers:{"Content-Type":"application/json"}, body: JSON.stringify({corpus:CORPUS})}); }
    catch(e){ status("offline", "bad"); BUSY = false; return; }
    try{ j = await r.json(); }catch(e){}
    BUSY = false;
    if(!j.ok){ status(j.error || "nothing to undo", ""); $("#sb-undo").disabled = true; return; }
    PLAN = j.plan; render(PLAN); setRebuildClass(""); refreshDirty();
    $("#sb-undo").disabled = (j.remaining_ops||0) === 0;
    status("undone · " + (j.remaining_ops||0) + " edit(s) remain", "");
  };

  // ── one render pass ─────────────────────────────────────────────────────
  function render(p){
    const board = $("#sb-board"), sc = board.scrollLeft;   // preserve scroll on re-render
    renderRail(p.spine); renderMeter(p); renderBoard(p); renderResidue(p.residue);
    board.scrollLeft = sc;
  }

  // ── the upper half: plan→prose staleness (a materialised projection) ────
  // the strip + per-column heat read the ONE dirty_report (%NODES diff): the
  // prose never pretends to re-flow live; stale sections say so until a
  // rebuild/dispatch refreshes them.
  function paintHeat(){
    document.querySelectorAll(".sb-col").forEach(col => {
      const d = DIRTY && DIRTY[col.dataset.id];
      const h = col.querySelector(".heat");
      if(!h) return;
      h.className = "heat " + (d ? (d.dirty ? "stale" : "") : "unknown");
      h.title = d && d.dirty ? "prose is stale for this section" : "prose matches the plan";
    });
  }
  function renderStale(){
    const el = $("#sb-stale");
    if(!DIRTY){
      el.innerHTML = "<span class='slab'>plan→prose</span>"+
        "<span style='color:var(--dim)'>staleness unknown</span>";
      return;
    }
    const stale = Object.values(DIRTY).filter(d => d.dirty);
    el.innerHTML = "<span class='slab'>plan→prose</span>"+
      (stale.length
        ? "<span class='stale-n'>"+stale.length+" stale</span><span>— rebuild to refresh</span>"
        : "<span class='stale-n clean'>0 stale</span><span>— prose matches the plan</span>")+
      "<button id='sb-dispatch' title='ensure briefs + cut the dispatch manifest and compiled dispatches for the worklist'>dispatch</button>"+
      "<span class='disp-out' id='sb-disp-out'></span>";
    $("#sb-dispatch").onclick = doDispatch;
  }
  async function refreshDirty(){
    try{
      const r = await safeFetch("/storyboard/dirty?corpus="+ec(CORPUS));
      const j = await r.json();
      DIRTY = {}; (j.report||[]).forEach(d => { DIRTY[d.id] = d; });
    }catch(e){ DIRTY = null; }
    renderStale(); paintHeat();
  }
  async function doDispatch(){
    const btn = $("#sb-dispatch"), out = $("#sb-disp-out");
    btn.disabled = true; out.textContent = "dispatching…";
    status("dispatch: briefs + manifest…", "busy");
    let r, j = {};
    try{ r = await safeFetch("/storyboard/dispatch", {method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({corpus:CORPUS})}, 180000); }
    catch(e){ out.textContent = "offline"; btn.disabled = false;
      status("dispatch failed — offline", "bad"); return; }
    try{ j = await r.json(); }catch(e){}
    btn.disabled = false;
    if(!r.ok || !j.ok){
      out.textContent = "gate failed — see the rebuild pane";
      status("dispatch gate failed", "bad"); return;
    }
    const nP = (j.items||[]).filter(i => i.dispatch_available).length;
    out.innerHTML = (j.rebuilt ? "rebuilt · " : "")+(j.n_items||0)+" work item(s) · "+
      nP+" prose dispatch(es)"+
      (j.invocation ? " · <code>"+esc(j.invocation)+"</code>" : "");
    out.title = j.invocation || "";
    status("dispatch manifest ready · "+CORPUS, "");
  }

  // ── the rebuild pane ────────────────────────────────────────────────────
  async function renderRebuild(){
    const el = $("#rebuild");
    el.innerHTML = "<div class='note'>checking what changed…</div>";
    let r; try{ r = await safeFetch("/storyboard/dirty?corpus="+ec(CORPUS)); }
    catch(e){ el.innerHTML = "<div class='note'>offline</div>"; return; }
    const rep = (await r.json()).report || [];
    const dirty = rep.filter(d => d.dirty);
    el.innerHTML =
      "<div class='rb-head'>"+dirty.length+" of "+rep.length+" sections changed</div>"+
      (dirty.length
        ? "<div class='rb-list'>"+dirty.map(d =>
            "<div class='rb-row'><b>"+esc(d.id)+"</b>"+
            (d.added.length ? "<span class='add'>+"+d.added.length+"</span>" : "")+
            (d.removed.length ? "<span class='rem'>−"+d.removed.length+"</span>" : "")+
            (!d.has_markers ? "<span class='rem'>no markers</span>" : "")+"</div>").join("")+"</div>"
        : "<div class='note'>nothing changed — the paper matches the plan.</div>")+
      "<div class='rb-actions'>"+
        "<button id='rb-cheap' title='reorder \\input + recompile only, no token spend'>cheap recompile</button>"+
        "<button id='rb-full' class='pri'"+(dirty.length?"":" disabled")+">full rebuild ("+dirty.length+")</button>"+
      "</div><div id='rb-out' class='rb-out'></div>";
    $("#rb-cheap").onclick = () => doRebuild("cheap");
    if(dirty.length) $("#rb-full").onclick = () => doRebuild("expensive");
  }
  async function doRebuild(mode){
    const out = $("#rb-out");
    out.innerHTML = "<div class='note'>"+(mode==="cheap"?"reordering + recompiling…":"preparing briefs + dispatch manifest…")+"</div>";
    let r; try{ r = await safeFetch("/storyboard/rebuild", {method:"POST",
      headers:{"Content-Type":"application/json"}, body: JSON.stringify({corpus:CORPUS, mode})}); }
    catch(e){ out.innerHTML = "<div class='note'>offline</div>"; return; }
    const j = await r.json().catch(()=>({}));
    if(mode === "cheap"){
      const c = j.compile || {};
      out.innerHTML = "<div class='rb-res'>"+
        (j.reordered ? "main.tex <code>\\input</code> reordered · " : "order already matched · ")+
        (c.ok ? "compiled ✓" : "compile: "+esc((c.error||c.log||"unavailable")).slice(0,140))+"</div>";
    } else if(!j.ok){
      out.innerHTML = "<div class='rb-res bad'>validation gate failed — fix the flagged nodes before rebuilding.</div>";
    } else {
      const m = j.manifest || {};
      out.innerHTML = "<div class='rb-res'>dispatch manifest ready · <b>"+(m.sections||[]).length+"</b> section(s) · ~"+
        (m.estimated_tokens ? Math.round(m.estimated_tokens/1000)+"k tokens" : "?")+" · gate ✓"+
        (j.manifest_path ? " · <code>"+esc(j.manifest_path)+"</code>" : "")+"</div>"+
        (j.invocation ?
          "<div class='rb-res' style='margin-top:6px'>run the LLM leg in a Claude session:"+
          " <code id='rb-invoke'>"+esc(j.invocation)+"</code>"+
          " <button id='rb-copy' style='margin-left:6px'>copy</button></div>" : "")+
        "<div class='note' style='margin-top:6px'>"+esc(j.note||"")+"</div>";
      const cp = $("#rb-copy");
      if(cp) cp.addEventListener("click", () => {
        navigator.clipboard.writeText(j.invocation).then(
          () => { cp.textContent = "copied ✓"; setTimeout(() => cp.textContent = "copy", 1600); },
          () => { cp.textContent = "copy failed"; });
      });
    }
  }

  // ── the node-graph pane (consolidation step 1: conceptric2's friction view,
  // folded in read-only - the node-graph edits the board makes land here) ──────
  // the whole conceptric, by kind - the board otherwise shows only the projected
  // slice (columns) and the un-projected pool (residue); this is the full substrate.
  async function renderGraph(){
    const el = $("#graph");
    el.innerHTML = "<div class='note'>reading the conceptric…</div>";
    let r; try{ r = await safeFetch("/corpus/friction?corpus="+ec(CORPUS)); }
    catch(e){ el.innerHTML = "<div class='note'>offline</div>"; return; }
    const recs = ((await r.json()).records || []);
    const byKind = {};
    recs.forEach(x => { const k = x.node_kind || "?"; (byKind[k] = byKind[k] || []).push(x); });
    const kinds = Object.keys(byKind).sort((a, b) => byKind[b].length - byKind[a].length);
    const nPlanned = (PLAN.coverage||{}).planned;
    el.innerHTML = "<div class='gh'>"+recs.length+" nodes in the conceptric"+
      (nPlanned!=null ? " · "+nPlanned+" projected" : "")+
      " <span id='g-derive' class='editpen' title='derive each section pool from the node graph'>· derive pool ↑</span></div>" +
      "<div id='g-derive-out'></div>" +
      kinds.map(k => {
        const CAP = 40, rows = byKind[k];
        return "<div class='rgroup'><div class='rgh'>"+esc(k)+"<span class='rc'>"+rows.length+"</span></div>"+
          rows.slice(0, CAP).map(x =>
            "<div class='grow-item' style='border-left-color:var("+kcVar(k, x.node)+")'>"+
            "<span class='gn' data-id='"+esc(x.node)+"'>"+esc(x.node)+"</span></div>").join("")+
          (rows.length > CAP ? "<div class='note' style='padding:2px 6px'>+"+(rows.length-CAP)+" more (search to reach them)</div>" : "")+
        "</div>";
      }).join("");
    el.querySelectorAll(".gn").forEach(n => n.onclick = () => openNode(n.dataset.id));
    const dbtn = $("#g-derive"); if(dbtn) dbtn.onclick = derivePreview;
  }
  // C - the hinge: preview each section's pool derived from the node graph, then
  // apply (reversibly, through the plan ledger). The plan becomes a view of the graph.
  async function derivePreview(){
    const out = $("#g-derive-out");
    out.innerHTML = "<div class='note'>deriving pools from the graph…</div>";
    let r; try{ r = await safeFetch("/storyboard/derive?corpus="+ec(CORPUS)); }
    catch(e){ out.innerHTML = "<div class='note'>offline</div>"; return; }
    const d = await r.json();
    const changed = (d.sections||[]).filter(s => !s.beatless && (s.added?.length || s.removed?.length));
    out.innerHTML =
      "<div class='rb-res'>"+d.n_changed+" section pool(s) would change · "+
      (d.n_beatless? d.n_beatless+" beatless kept as-authored · ":"")+
      "<b>plan becomes a projection of the graph</b></div>"+
      (changed.length ? "<div class='rb-list' style='margin-top:6px'>"+changed.map(s =>
        "<div class='rb-row'><b>"+esc(s.id)+"</b>"+
        (s.added.length?"<span class='add'>+"+s.added.length+"</span>":"")+
        (s.removed.length?"<span class='rem'>−"+s.removed.length+"</span>":"")+"</div>").join("")+"</div>"
        : "<div class='note'>nothing would change — the plan already matches the graph.</div>")+
      (changed.length ? "<div class='rb-actions'><button id='g-derive-apply' class='pri'>apply derive ("+d.n_changed+")</button></div>" : "")+
      "<div id='g-derive-res'></div>";
    const ab = $("#g-derive-apply"); if(ab) ab.onclick = doDerive;
  }
  async function doDerive(){
    const res = $("#g-derive-res");
    res.innerHTML = "<div class='note'>applying (reversible via undo)…</div>";
    let r; try{ r = await safeFetch("/storyboard/derive/apply", {method:"POST",
      headers:{"Content-Type":"application/json"}, body: JSON.stringify({corpus:CORPUS})}); }
    catch(e){ res.innerHTML = "<div class='note'>offline</div>"; return; }
    const j = await r.json();
    if(!j.ok){ res.innerHTML = "<div class='rb-res bad'>derive failed</div>"; return; }
    PLAN = j.plan; render(PLAN); $("#sb-undo").disabled = false;
    res.innerHTML = "<div class='rb-res'>applied to "+(j.applied||[]).length+" section(s)"+
      (j.rejected?.length? " · "+j.rejected.length+" rejected":"")+" · the board now shows the derived plan (undo to revert)</div>";
    status("plan derived from the graph · "+CORPUS, "");
  }

  // ── tabs ────────────────────────────────────────────────────────────────
  document.querySelectorAll("#sb-tabs button[data-pane]").forEach(b => b.onclick = () => {
    document.querySelectorAll("#sb-tabs button[data-pane]").forEach(x => x.classList.toggle("on", x===b));
    document.querySelectorAll(".sb-pane").forEach(p => p.classList.toggle("on", p.id===b.dataset.pane));
    if(b.dataset.pane === "rebuild") renderRebuild();
    if(b.dataset.pane === "graph") renderGraph();
  });

  // ── the side rail's collapse (a slim strip when folded) ────────────────
  function applySide(){
    $("#sb-side").classList.toggle("collapsed", !!COLLAPSE.side);
  }
  $("#sb-side-collapse").onclick = () => { COLLAPSE.side = true; saveCollapse(); applySide(); };
  $("#sb-side-chip").onclick = () => { COLLAPSE.side = false; saveCollapse(); applySide(); };

  // ── boot ────────────────────────────────────────────────────────────────
  async function pickCorpus(){
    if(CORPUS) return CORPUS;
    try{
      const r = await safeFetch("/corpus/list");
      if(r.ok){ const j = await r.json(); CORPUS = j.default || (j.corpora||[])[0] || ""; }
    }catch(e){}
    return CORPUS;
  }

  async function load(){
    await pickCorpus();
    if(!CORPUS){ $("#sb-board").innerHTML = "<div class='center'>no corpus — pick one from the header</div>";
      status("no corpus", "bad"); return; }
    loadCollapse(); applySide();
    status("loading "+CORPUS+"…", "busy");
    let r;
    try{ r = await safeFetch("/storyboard/plan?corpus="+ec(CORPUS)); }
    catch(e){ $("#sb-board").innerHTML = "<div class='center'>could not reach the server</div>"; status("offline","bad"); return; }
    if(!r.ok){
      const j = await r.json().catch(()=>({}));
      $("#sb-board").innerHTML = "<div class='center'>"+esc(j.error || ("no plan for "+CORPUS))+"</div>";
      status(j.error || "no plan", "bad"); return;
    }
    PLAN = await r.json();
    render(PLAN);
    refreshDirty();                          // the staleness strip + column heat
    focusFromParams();                       // honour an inbound ?focus= / ?section=
    const nSec = (PLAN.sections||[]).length, nApp = (PLAN.appendices||[]).length;
    status(CORPUS+" · "+nSec+" sections"+(nApp?"+"+nApp+" appendices":"")+" · drag to respine", "");
  }

  load();
})();
</script>
</body>
</html>
