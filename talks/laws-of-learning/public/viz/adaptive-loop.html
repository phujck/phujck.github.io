<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Adaptive Loop</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: #0a0d12; color: #c8cad0;
    font-family: 'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex; flex-direction: column;
  }
  /* thin control strip - the only chrome; the slide carries the title + caption */
  .bar {
    flex: 0 0 auto;
    display: flex; align-items: center; justify-content: center; flex-wrap: nowrap;
    gap: 0.9rem; padding: 0.5rem 0.7rem;
    background: rgba(255,255,255,0.04);
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }
  .seg { display: inline-flex; border: 1px solid rgba(255,255,255,0.14); border-radius: 6px; overflow: hidden; }
  .seg button {
    background: transparent; border: 0; color: #aeb4c2;
    padding: 0.34rem 0.85rem; font-size: 0.82rem; cursor: pointer; white-space: nowrap;
    font-family: inherit;
  }
  .seg button + button { border-left: 1px solid rgba(255,255,255,0.14); }
  .seg button:hover { background: rgba(255,255,255,0.07); }
  .seg button.active { background: rgba(107,138,175,0.22); color: #eef1f6; }
  .bar label { display: flex; align-items: center; gap: 0.5rem; font-size: 0.8rem; white-space: nowrap; color: #aeb4c2; }
  .bar input[type="range"] { width: 120px; accent-color: #6b8aaf; }
  .bar .val { min-width: 2.5em; text-align: right; color: #cdd2dc; font-variant-numeric: tabular-nums; }
  .stage { position: relative; flex: 1 1 auto; min-height: 0; }
  canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
</style>
</head>
<body>

<div class="bar">
  <div class="seg">
    <button id="drivenBtn" class="active">Driven</button>
    <button id="adaptiveBtn">Adaptive</button>
  </div>
  <label>delay
    <input type="range" id="sep" min="1" max="6" step="0.5" value="3">
    <span class="val" id="sepVal">3.0&times;</span>
  </label>
</div>

<div class="stage" id="stage">
  <canvas id="cv"></canvas>
</div>

<script>
// ── palette (shared loop legs) ───────────────────────────────────────────
const BG   = '#0a0d12';
const PANEL = 'rgba(255,255,255,0.10)';   // panel stroke
const TITLE = '#e6e8ee';
const MUTED = '#8b92a1';
const C_CTRL  = '#e8a84c';   // control θ - gold (slow)
const C_ENV   = '#d4826a';   // field / environment - vermilion (the endogeneity leg)
const C_STATE = '#7ec4a5';   // fast microstate - green
const C_MEAS  = '#5cacee';   // measurement - blue

// ── canvas + HiDPI ───────────────────────────────────────────────────────
const stage = document.getElementById('stage');
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
let W = 0, H = 0, DPR = 1;
function resize(){
  DPR = Math.max(1, window.devicePixelRatio || 1);
  const r = stage.getBoundingClientRect();
  W = Math.max(1, Math.round(r.width));
  H = Math.max(1, Math.round(r.height));
  cv.width  = Math.round(W * DPR);
  cv.height = Math.round(H * DPR);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);
// The applet is embedded in an iframe whose box can change AFTER load (lazy
// reveal, slide layout settle, presenter zoom). An iframe's content window gets
// no resize event for that, so observe the stage element directly and always
// re-fit the canvas to its true box.
if (window.ResizeObserver) new ResizeObserver(resize).observe(stage);

// ── deterministic rng (no flicker across reloads) ────────────────────────
function mb32(a){ return function(){ a|=0; a=(a+0x6D2B79F5)|0; let t=Math.imul(a^(a>>>15),1|a);
  t=(t+Math.imul(t^(t>>>7),61|t))^t; return ((t^(t>>>14))>>>0)/4294967296; }; }
const rng = mb32(424242);

// ── model state ──────────────────────────────────────────────────────────
let mode = 'driven';     // 'driven' | 'adaptive'
let sep = 3.0;           // feedback delay / timescale separation
let theta = 0.0;         // slow control θ
let thetaTarget = 0.0;   // external setpoint (driven)
let m = 0.0;             // coarse, delayed measurement of ⟨O⟩
let mDelay = [];         // delay line
let clock = 0;
let thetaHist = [], mHist = [];
const HIST = 240;

// fast agents settling in the field well centred at h(θ)
const NA = 60;
const agents = [];
for (let i=0;i<NA;i++) agents.push({ x:(rng()*2-1)*0.5, v:0, j:rng() });
const fieldCentre = () => Math.tanh(1.5*theta);   // h = Π(θ), bounded

// ── dynamics (paced slowly so settle vs ring is followable) ──────────────
function step(dt){
  // dt in "model ticks"; tuned so the slow control evolves over seconds, not frames
  clock += dt;
  const hc = fieldCentre();
  // fast microstate relaxes toward the field centre (fast timescale) + small noise
  let mean = 0;
  for (const a of agents){
    const force = hc - a.x;
    a.v = 0.72*a.v + 0.16*force + (rng()*2-1)*0.010;
    a.x += a.v; mean += a.x;
  }
  mean /= NA;
  // coarse + DELAYED read of the order parameter ⟨O⟩
  mDelay.push(mean + (rng()*2-1)*0.015);
  // staleness of the read grows with the slider - this is what drives the loop
  // past threshold. A LONGER delay => the control acts on older news => more
  // overshoot => a stronger ring. (Independent of the control's own rate.)
  const delaySteps = Math.round(6*sep*sep/3 + 4);
  while (mDelay.length > delaySteps) m = mDelay.shift();

  // The control is the SLOW leg - a fixed rate, not tied to the delay, so the
  // delay slider changes only how STALE the read is, never the control's speed.
  const slow = 0.10;
  if (mode === 'driven'){
    // OPEN loop: an external command sets θ; control ignores its own measurement
    thetaTarget = 0.62*Math.sin(clock*0.5);
    theta += (thetaTarget - theta) * Math.min(1, slow*dt*4.0);
  } else {
    // CLOSED loop: control chases a goal m* through its OWN stale read of m.
    // With a fixed gain, the lag from `delaySteps` sets whether it rings - a
    // bigger delay tips it further past threshold. The endogenous instability:
    // a stable thing destabilised by listening to a lagged image of itself.
    const mStar = 0.40;
    const gain  = 5.4;
    theta += slow * gain * (mStar - m) * dt;
  }
  // soft saturation: ease into the bound so the ring stays rounded, not clipped
  theta = 1.2*Math.tanh(theta/1.2);

  thetaHist.push(theta); if (thetaHist.length>HIST) thetaHist.shift();
  mHist.push(m);         if (mHist.length>HIST)     mHist.shift();
}

// ── drawing helpers ──────────────────────────────────────────────────────
function rr(x,y,w,h,r){ r=Math.min(r,w/2,h/2); ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function hexA(hex,a){ const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return `rgba(${r},${g},${b},${a})`; }
function panel(x,y,w,h,label,col){
  ctx.strokeStyle=PANEL; ctx.lineWidth=1; rr(x,y,w,h,7); ctx.stroke();
  ctx.fillStyle=col||TITLE; ctx.font='600 13px "Segoe UI",system-ui,sans-serif';
  ctx.textAlign='left'; ctx.textBaseline='top';
  ctx.fillText(label, x+12, y+10);
}

// ── main draw ─────────────────────────────────────────────────────────────
let lastT = performance.now();
function draw(now){
  const realDt = Math.min(0.05, (now-lastT)/1000); lastT = now;
  // advance the model a fixed amount per real second (frame-rate independent, slow)
  step(realDt * 11);

  ctx.clearRect(0,0,W,H); ctx.fillStyle=BG; ctx.fillRect(0,0,W,H);

  const pad = 12, gap = 12;
  const colSplit = Math.round(W*0.46);
  // LEFT: the physical picture (full height)
  const Lx=pad, Ly=pad, Lw=colSplit-pad-gap/2, Lh=H-2*pad;
  drawField(Lx,Ly,Lw,Lh);
  // RIGHT: stacked - loop (top) + traces (bottom)
  const Rx=colSplit+gap/2, Rw=W-pad-Rx;
  const topH = Math.round((H-2*pad-gap)*0.56);
  drawLoop(Rx, Ly, Rw, topH);
  drawTraces(Rx, Ly+topH+gap, Rw, H-pad-(Ly+topH+gap));

  requestAnimationFrame(draw);
}

// LEFT panel: field well + settling/ringing swarm + order parameter
function drawField(x,y,w,h){
  panel(x,y,w,h,'The field, and the parts in it', TITLE);
  const ax=x+22, ay=y+40, aw=w-44, ah=h-66;
  const X0=-1.35, X1=1.35;
  const sx=u=>ax + (u-X0)/(X1-X0)*aw;
  const hc=fieldCentre();
  const VMAX=1.0;
  const floor = ay+ah*0.78;                       // base of the well
  const sy=v=>floor - v/VMAX*(ah*0.66);
  // potential well V(x)=0.5(x-hc)^2
  ctx.beginPath(); let pen=false;
  for(let i=0;i<=120;i++){ const u=X0+(i/120)*(X1-X0); const V=0.5*(u-hc)*(u-hc);
    if(V>VMAX){pen=false;continue;} const Y=sy(V);
    pen?ctx.lineTo(sx(u),Y):(ctx.moveTo(sx(u),Y),pen=true); }
  ctx.strokeStyle=hexA(C_ENV,0.85); ctx.lineWidth=2; ctx.stroke();
  // field-centre marker h = Π(θ), set by the control - label sits ABOVE, clear of the swarm
  const hx=sx(hc);
  ctx.fillStyle=C_ENV; ctx.beginPath(); ctx.arc(hx, sy(0), 5, 0, 7); ctx.fill();
  ctx.fillStyle=hexA(C_ENV,0.95); ctx.font='italic 12px "Segoe UI",system-ui,sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='bottom';
  ctx.fillText('h = Π(θ)', hx, ay+12);
  // agents settling in the well (stacked above the curve so the swarm reads)
  let mean=0; for(const a of agents) mean+=a.x; mean/=NA;
  for(const a of agents){ const V=0.5*(a.x-hc)*(a.x-hc); if(V>VMAX) continue;
    ctx.fillStyle=hexA(C_STATE,0.8);
    ctx.beginPath(); ctx.arc(sx(a.x), sy(V)-4-a.j*7, 2.5, 0, 7); ctx.fill(); }
  // order parameter ⟨O⟩ = mean position, a blue tick UNDER the floor with label below
  const baseY=floor+6;
  ctx.strokeStyle=C_MEAS; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(sx(mean), baseY); ctx.lineTo(sx(mean), baseY+12); ctx.stroke();
  ctx.fillStyle=C_MEAS; ctx.font='12px "Segoe UI",system-ui,sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.fillText('⟨O⟩', sx(mean), baseY+15);
  // control readout, bottom-left, clear of the ⟨O⟩ tick
  ctx.fillStyle=MUTED; ctx.font='12px "Segoe UI",system-ui,sans-serif';
  ctx.textAlign='left'; ctx.textBaseline='bottom';
  ctx.fillText('θ = '+theta.toFixed(2)+'  (slow control)', x+12, y+h-10);
}

// RIGHT-TOP: the four-node loop; feedback leg open (driven) / closed+red (adaptive)
function drawLoop(x,y,w,h){
  const open = (mode==='driven');
  // short title - the toggle already shows Driven/Adaptive; keep canvas text minimal
  panel(x,y,w,h, open ? 'the loop - open' : 'the loop - closed', TITLE);
  // push the ring down so the top node label always clears the panel title,
  // and cap the radius so the four labels stay inside even at narrow widths
  const cx=x+w/2, cy=y+h*0.60, R=Math.min(w*0.30, (h-58)*0.42);
  // node angles: control top, field right, state bottom, measure left
  const nodes=[
    {a:-Math.PI/2, t:'θ control', c:C_CTRL},
    {a: 0,         t:'h field',        c:C_ENV},
    {a: Math.PI/2, t:'ρ state',   c:C_STATE},
    {a: Math.PI,   t:'m measure',      c:C_MEAS},
  ];
  const pos=nodes.map(n=>({ x:cx+R*Math.cos(n.a), y:cy+R*Math.sin(n.a), ...n }));
  const pulse=(clock*0.22)%1;
  for(let i=0;i<4;i++){
    const a0=nodes[i].a; let a1=nodes[(i+1)%4].a; if(a1<a0) a1+=2*Math.PI;
    const isFeedback=(i===3);                  // m -> control closes the loop
    const legOpen=(open && isFeedback);
    const legRed =(!open && isFeedback);       // light the endogeneity leg red when closed
    ctx.strokeStyle= legOpen ? 'rgba(255,255,255,0.12)' : (legRed ? C_ENV : 'rgba(255,255,255,0.22)');
    ctx.lineWidth= legRed?2.6:2; ctx.setLineDash(legOpen?[4,5]:[]);
    ctx.beginPath(); ctx.arc(cx,cy,R,a0,a1); ctx.stroke(); ctx.setLineDash([]);
    // arrowhead at a1
    const tx=cx+R*Math.cos(a1), ty=cy+R*Math.sin(a1), tg=a1+Math.PI/2;
    ctx.fillStyle= legOpen ? 'rgba(255,255,255,0.22)' : (legRed?C_ENV:'rgba(255,255,255,0.5)');
    ctx.beginPath(); ctx.moveTo(tx,ty);
    ctx.lineTo(tx-7*Math.cos(tg-0.4), ty-7*Math.sin(tg-0.4));
    ctx.lineTo(tx-7*Math.cos(tg+0.4), ty-7*Math.sin(tg+0.4)); ctx.closePath(); ctx.fill();
    // travelling pulse on closed legs (slow)
    if(!legOpen){ const sp=(pulse*4)-i;
      if(sp>=0&&sp<1){ const ad=a0+(a1-a0)*sp, px=cx+R*Math.cos(ad), py=cy+R*Math.sin(ad);
        ctx.fillStyle=legRed?C_ENV:nodes[i].c; ctx.shadowColor=ctx.fillStyle; ctx.shadowBlur=8;
        ctx.beginPath(); ctx.arc(px,py,3.6,0,7); ctx.fill(); ctx.shadowBlur=0; } }
  }
  // nodes + labels - labels pushed clear, anchored so they never cross the ring
  for(const n of pos){
    ctx.fillStyle=BG; ctx.strokeStyle=n.c; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(n.x,n.y,6.5,0,7); ctx.fill(); ctx.stroke();
    ctx.fillStyle=TITLE; ctx.font='600 11px "Segoe UI",system-ui,sans-serif';
    const co=Math.cos(n.a), si=Math.sin(n.a);
    const lx=n.x+co*16, ly=n.y+si*16;
    ctx.textBaseline = si<-0.5?'bottom':(si>0.5?'top':'middle');
    ctx.textAlign    = co<-0.5?'right':(co>0.5?'left':'center');
    ctx.fillText(n.t, lx, ly);
  }
  // endogeneity annotation - only when the loop is CLOSED (that is when the
  // control makes its own field). Centred INSIDE the ring so it fits at any
  // width and never clips or crosses a node.
  if(!open){
    ctx.fillStyle=hexA(C_ENV,0.95); ctx.font='italic 11px "Segoe UI",system-ui,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('makes its own field', cx, cy);
  }
}

// RIGHT-BOTTOM: θ (slow) and m (coarse) traces - the calm-vs-ring payoff
function drawTraces(x,y,w,h){
  panel(x,y,w,h,'θ and m over time', TITLE);
  const ax=x+12, ay=y+30, aw=w-24, ah=h-42;
  const sy=v=>ay+ah/2 - v*(ah*0.42);
  ctx.strokeStyle='rgba(255,255,255,0.12)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(ax,sy(0)); ctx.lineTo(ax+aw,sy(0)); ctx.stroke();
  series(mHist, ax, aw, sy, C_MEAS, 1.6);
  series(thetaHist, ax, aw, sy, C_CTRL, 2.2);
  // compact colour key, right-aligned in the title row - just the glyphs (the
  // loop panel already names them), so it never crowds the title at any width
  ctx.font='600 12px "Segoe UI",system-ui,sans-serif'; ctx.textBaseline='top';
  ctx.textAlign='right';
  ctx.fillStyle=C_MEAS; ctx.fillText('m', x+w-14, y+10);
  ctx.fillStyle=C_CTRL; ctx.fillText('θ', x+w-34, y+10);
}
function series(arr, ax, aw, sy, col, lw){
  if(arr.length<2) return; ctx.beginPath();
  for(let i=0;i<arr.length;i++){ const X=ax+(i/(arr.length-1))*aw, Y=sy(arr[i]); i?ctx.lineTo(X,Y):ctx.moveTo(X,Y); }
  ctx.strokeStyle=col; ctx.lineWidth=lw; ctx.stroke();
}

// ── controls ───────────────────────────────────────────────────────────────
const dB=document.getElementById('drivenBtn'), aB=document.getElementById('adaptiveBtn');
function setMode(md){ mode=md; dB.classList.toggle('active',md==='driven'); aB.classList.toggle('active',md==='adaptive');
  thetaHist.length=0; mHist.length=0; mDelay.length=0; clock=0; }
dB.addEventListener('click',()=>setMode('driven'));
aB.addEventListener('click',()=>setMode('adaptive'));
const sepEl=document.getElementById('sep'), sepVal=document.getElementById('sepVal');
sepEl.addEventListener('input',e=>{ sep=parseFloat(e.target.value); sepVal.innerHTML=sep.toFixed(1)+'&times;'; });

// ── go ───────────────────────────────────────────────────────────────────
resize();
requestAnimationFrame(draw);
</script>
</body>
</html>
