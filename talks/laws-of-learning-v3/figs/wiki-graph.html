<style>
  :root { --bg:#0e1116; --panel:#161b22; --line:#283041; --ink:#e6edf3; --dim:#7d8794; --accent:#4A90D9; }
  * { box-sizing: border-box; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--ink);
    font:14px/1.5 ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif; overflow:hidden; }
  #top { display:flex; gap:12px; align-items:center; padding:8px 14px; border-bottom:1px solid var(--line); background:var(--panel); }
  #top b { letter-spacing:.3px; }
  #top .src,#top .stat { color:var(--dim); font-size:12px; }
  .seg { display:inline-flex; border:1px solid var(--line); border-radius:7px; overflow:hidden; }
  .seg button { background:transparent; color:var(--dim); border:0; padding:4px 10px; cursor:pointer; font-size:12px; }
  .seg button.on { background:var(--accent); color:#fff; }
  .crumbs { color:var(--dim); font-size:12px; }
  .crumbs a { color:var(--accent); cursor:pointer; }
  .crumbs a:hover { text-decoration:underline; }
  .btn { background:transparent; color:var(--dim); border:1px solid var(--line); border-radius:7px; padding:4px 10px; cursor:pointer; }
  .spacer { flex:1; }
  #wrap { display:flex; height:calc(100% - 45px); }
  #macroWrap { flex:0 0 54%; width:54%; height:100%; position:relative; }
  #macroLabel,#microLabel { position:absolute; top:8px; left:12px; font-size:11px; color:var(--dim); text-transform:uppercase; letter-spacing:.6px; pointer-events:none; }
  #macro { width:100%; height:100%; display:block; cursor:grab; }
  #macro:active { cursor:grabbing; }
  #right { flex:1; min-width:0; display:flex; flex-direction:column; border-left:1px solid var(--line); }
  #microWrap { height:42%; position:relative; border-bottom:1px solid var(--line); background:var(--panel); }
  #micro { width:100%; height:100%; display:block; }
  #panel { flex:1; overflow-y:auto; padding:14px 16px; background:var(--panel); }
  #panel h2 { margin:2px 0 4px; font-size:16px; }
  #panel .kind { color:var(--dim); font-size:11px; text-transform:uppercase; letter-spacing:.5px; }
  .badge { display:inline-block; padding:1px 8px; border-radius:10px; font-size:11px; margin:6px 6px 0 0; }
  .row { margin:9px 0; padding-top:9px; border-top:1px solid var(--line); }
  .row .k { color:var(--dim); font-size:11px; text-transform:uppercase; letter-spacing:.5px; margin-bottom:3px; }
  .math { font:14px/1.5 ui-monospace,SFMono-Regular,Consolas,monospace; background:#0b0f14; border:1px solid var(--line);
    border-left:3px solid #9B5DE5; border-radius:5px; padding:7px 10px; margin:5px 0; overflow-x:auto; white-space:pre-wrap; }
  .figcard { border:1px solid var(--line); border-left:3px solid #16A085; border-radius:5px; padding:8px 10px; margin:5px 0;
    background:#0b0f14; font-size:13px; }
  .figcard .fl { color:#16A085; font-size:10px; text-transform:uppercase; letter-spacing:.5px; }
  .figimg { display:block; max-width:100%; border:1px solid var(--line); border-radius:5px; margin:5px 0; background:#fff; }
  .figimg .fl { color:#16A085; font-size:10px; text-transform:uppercase; letter-spacing:.5px; padding:2px 0; }
  .figimg img { display:block; max-width:100%; height:auto; border-radius:0 0 4px 4px; }
  .figimg .cap { font-size:12px; color:var(--dim); padding:4px 6px; }
  .chip { display:inline-flex; align-items:center; gap:6px; border:1px solid var(--line); border-radius:13px; padding:2px 9px;
    margin:3px 5px 3px 0; cursor:pointer; font-size:12px; color:var(--ink); }
  .chip:hover { background:#10243a; }
  .chip .dot { width:8px; height:8px; border-radius:50%; }
  textarea { width:100%; background:#0b0f14; color:var(--ink); border:1px solid var(--line); border-radius:6px; padding:8px;
    font:13px ui-monospace,monospace; resize:vertical; min-height:90px; }
  .send { margin-top:6px; background:var(--accent); color:#fff; border:0; border-radius:6px; padding:7px 14px; cursor:pointer; }
  .cmt { background:#0b0f14; border:1px solid var(--line); border-radius:6px; padding:7px 9px; margin:6px 0; font-size:13px; }
  .cmt .t { color:var(--dim); font-size:11px; }
  .hint { color:var(--dim); }
  .math .katex { font-size:1.05em; }
</style>

  citation:"#7F8C8D", missing:"#C0392B",

  aesthetics:"#EC4899", operations:"#4A90D9", structure:"#84CC16", workflow:"#F39C12",
  templates:"#95A5A6", author:"#2ECC71", voice_corpus:"#1ABC9C", domains:"#E67E22",

// Projections per source: each names a top-level slice (the macro level's

const PROJECTIONS = {
  substrate: [
    {p:"substrate", test:n=>n.kind==="cluster"},
    {p:"theory",    test:n=>n.kind==="result"},
    {p:"artefact",  test:n=>n.kind==="artefact"||n.kind==="goal"},
  ],
  canon: [
    {p:"map",    test:n=>n.kind==="domain"||n.kind==="wiki"},
    {p:"skills", test:n=>n.kind==="skill"},
    {p:"agents", test:n=>n.kind==="agent"},
  ],
  manuscript: [
    {p:"sections", test:n=>n.kind==="section"},
    {p:"claims",   test:n=>n.kind==="claim"},
    {p:"figures",  test:n=>n.kind==="figure"||n.kind==="equation"},
  ],
  blueprint: [
    {p:"sections", test:n=>n.kind==="section"||n.kind==="domain"},
    {p:"claims",   test:n=>n.kind==="claim"},
    {p:"figures",  test:n=>n.kind==="figure"||n.kind==="equation"},
  ],
};
const STATUS_COLOR = { established:"#2ECC71", partial:"#F39C12", "open-gap":"#E74C3C", stub:"#C0392B",
  loose:"#E67E22", linked:"#4A90D9", closed:"#2ECC71" };
const VERT = new Set(["contains","draws"]);
const LAT = ["shares","supports","contradicts","draws"];   // shown as the within-level network
const LATERAL = ["shares","supports","contradicts"];        // interaction edges (not draws) -> neighbours
function fitLabel(ctx,s,maxpx){ s=String(s==null?"":s); if(ctx.measureText(s).width<=maxpx) return s;
  while(s.length>1 && ctx.measureText(s+"…").width>maxpx) s=s.slice(0,-1); return s+"…"; }
function symbolOf(n){
  if(!n) return "";
  if(n.kind==="result")   return n.id;
  if(n.kind==="cluster")  return String(n.group||"").slice(0,3).toUpperCase();
  if(n.kind==="artefact") return n.id==="talk"?"talk":"manu";
  if(n.kind==="goal")     return "goal";
  // canon/manuscript kinds: the label tail is the readable handle (skill names,
  // page leaves, section titles), short-symbol with the full label on hover.
  if(["wiki","skill","domain","agent","section","claim","citation"].includes(n.kind)){
    const s=String(n.label||n.id);
    return s.length<=14 ? s : s.slice(0,13)+"…";
  }
  return (n.id||"").length<=8 ? n.id : n.id.slice(0,7)+"…";
}

let G={nodes:[],edges:[]}, comments={}, meta={source:"canon",path:null}, health={};
let proj="substrate", path=[], sel=null, hoverId=null;
let mpanx=0, mpany=0, mscale=1, dragging=false, moved=false, dx0=0, dy0=0, ox=0, oy=0;
let macroPos={}, flowPos={};
const mcv=document.getElementById("macro"), mctx=mcv.getContext("2d");
const ucv=document.getElementById("micro"), uctx=ucv.getContext("2d");

const node = id => G.nodes.find(x=>x.id===id);
function resize(){ for(const cv of [mcv,ucv]){ const r=devicePixelRatio||1; cv.width=cv.clientWidth*r; cv.height=cv.clientHeight*r;

window.addEventListener("resize", resize);

function projList(){ return PROJECTIONS[meta.source] || PROJECTIONS.substrate; }
function projTest(){ const pl=projList(); return (pl.find(x=>x.p===proj)||pl[0]).test; }
// A node is "contained" when a coarse node holds it via a contains edge - it is
// interior to a subgraph and reached by descending, never shown at the top level.
function containedSet(){ const s=new Set(); for(const e of G.edges){ if(e.rel==="contains") s.add(e.dst); } return s; }
function projTop(){
  const test=projTest(), held=containedSet();
  let top=G.nodes.filter(n=>n.kind!=="missing" && !held.has(n.id) && test(n));
  // Fallback: never render an empty macro level. If the active projection
  // selects nothing (e.g. a source with no node of that kind), show every
  // top-level real node so the graph is always navigable.
  if(!top.length) top=G.nodes.filter(n=>n.kind!=="missing" && !held.has(n.id));
  return top;
}
function interiorOf(id){ const seen=new Set(),out=[];
  for(const e of G.edges){ if(VERT.has(e.rel) && e.src===id){ const n=node(e.dst); if(n&&!seen.has(n.id)){seen.add(n.id);out.push(n);} } }
  return out; }
function aboveOf(id){ const seen=new Set(),out=[];
  for(const e of G.edges){ if(VERT.has(e.rel) && e.dst===id){ const n=node(e.src); if(n&&!seen.has(n.id)){seen.add(n.id);out.push(n);} } }
  return out; }
// The strict hierarchy parent: the coarse node that holds this one via a
// contains edge (draws is lineage, not nesting). Used to walk a node up to its
// ancestor chain so the left pane can be moved to the level the node lives in.
function parentOf(id){ for(const e of G.edges){ if(e.rel==="contains" && e.dst===id) return e.src; } return null; }
// The contains-ancestor chain root..parent for a node (excluding the node
// itself). This is exactly the path stack the left pane needs so the node sits
// inside the rendered level. Guarded against cycles by a visited set.
function ancestorPath(id){ const chain=[], seen=new Set(); let cur=parentOf(id);
  while(cur && !seen.has(cur)){ seen.add(cur); chain.unshift(cur); cur=parentOf(cur); } return chain; }
function levelNodes(){ return path.length? interiorOf(path[path.length-1]) : projTop(); }
function edgesAmong(ids){ const s=new Set(ids); return G.edges.filter(e=>s.has(e.src)&&s.has(e.dst)&&LAT.includes(e.rel)); }
function hasInterior(id){ return interiorOf(id).length>0; }

function rad(n){
  if(["cluster","artefact","domain"].includes(n.kind)) return 20;
  if(n.kind==="result") return 17;
  if(n.kind==="goal") return 15;
  // a coarse wiki node (one that stands in for an interior) reads larger than a leaf
  if(n.kind==="wiki") return (n.meta&&n.meta.coarse)?17:13;
  if(n.kind==="skill") return 13;
  if(n.kind==="section") return 16;
  return 11;
}
function col(n){ return GROUP_COLOR[n.group] || GROUP_COLOR[n.kind] || "#7F8C8D"; }
function edgeStroke(rel){ return rel==="contradicts"?"#E74C3C" : rel==="supports"?"#2ECC71" : rel==="draws"?"#3a455c" : "#4A90D9"; }

// A single ring for small levels; concentric rings for a dense interior so a
// crowded node-set stays legible (the radial layout no longer overlaps when an
// interior is large). Deterministic throughout: ring and slot come from node
// order, never randomness. Up to RING_CAP nodes per ring, rings grow outward.
const RING_CAP=10;
function layoutCircle(nodes, cx, cy, R){ const pos={}, n=nodes.length;
  if(n===0) return pos;
  if(n===1){ pos[nodes[0].id]={x:cx,y:cy}; return pos; }
  if(n<=RING_CAP){
    nodes.forEach((nd,i)=>{ const a=2*Math.PI*i/n - Math.PI/2; pos[nd.id]={x:cx+R*Math.cos(a), y:cy+R*Math.sin(a)}; });
    return pos;
  }
  // Dense: spread across rings, each holding a near-equal share, capacity rising
  // with radius. Inner ring smallest so the centre is not crowded.
  const rings=Math.ceil(n/RING_CAP);
  const perRing=Math.ceil(n/rings);
  nodes.forEach((nd,i)=>{
    const ri=Math.floor(i/perRing), slotN=Math.min(perRing,n-ri*perRing), slot=i-ri*perRing;
    const rr=R*(0.5+0.5*(ri+1)/rings)*1.35;   // rings 0..rings-1 grow outward
    const a=2*Math.PI*slot/slotN - Math.PI/2 + (ri*Math.PI/perRing);  // stagger rings
    pos[nd.id]={x:cx+rr*Math.cos(a), y:cy+rr*Math.sin(a)};
  });
  return pos; }

function drawTip(ctx,w,sx,sy,text){
  text=String(text==null?"":text); if(!text) return;
  ctx.font="12px sans-serif";
  const tw=ctx.measureText(text).width, padx=7, pady=4, bh=18;
  const bw=tw+2*padx;
  let bx=sx+10, by=sy-bh-4;
  if(bx+bw>w-4) bx=w-4-bw; if(bx<4) bx=4; if(by<4) by=sy+8;
  ctx.fillStyle="#1b2230"; ctx.strokeStyle="#3a455c"; ctx.lineWidth=1;
  ctx.beginPath(); ctx.rect(bx,by,bw,bh); ctx.fill(); ctx.stroke();
  ctx.fillStyle="#e6edf3"; ctx.textAlign="left";
  ctx.fillText(text, bx+padx, by+pady+9);
}
function drawNet(ctx, cv, nodes, edges, pos, opts){
  const w=cv.clientWidth, h=cv.clientHeight; ctx.clearRect(0,0,w,h);
  ctx.save();
  if(opts.transform){ ctx.translate(w/2+mpanx, h/2+mpany); ctx.scale(mscale,mscale); }
  for(const e of edges){ const A=pos[e.src], B=pos[e.dst]; if(!A||!B) continue;
    ctx.strokeStyle=edgeStroke(e.rel); ctx.globalAlpha=e.rel==="draws"?0.5:0.85; ctx.lineWidth=Math.min(6, 1+(e.count||1));
    ctx.beginPath(); ctx.moveTo(A.x,A.y); ctx.lineTo(B.x,B.y); ctx.stroke(); ctx.globalAlpha=1;
    if((e.count||1)>1){ ctx.fillStyle="#9aa6b2"; ctx.font="10px sans-serif"; ctx.fillText(String(e.count),(A.x+B.x)/2+3,(A.y+B.y)/2-2); } }
  for(const n of nodes){ const p=pos[n.id]; if(!p) continue; const r=rad(n);
    ctx.beginPath(); ctx.arc(p.x,p.y,r,0,2*Math.PI); ctx.fillStyle=col(n); ctx.fill();
    if(n.link==="loose"){ ctx.save(); ctx.setLineDash([3,3]); ctx.lineWidth=2; ctx.strokeStyle="#E67E22"; ctx.beginPath(); ctx.arc(p.x,p.y,r+3,0,2*Math.PI); ctx.stroke(); ctx.restore(); }
    if(n.id===sel){ ctx.lineWidth=2.5; ctx.strokeStyle="#fff"; ctx.beginPath(); ctx.arc(p.x,p.y,r,0,2*Math.PI); ctx.stroke(); }
    if(hasInterior(n.id)){ ctx.lineWidth=1.5; ctx.strokeStyle=col(n); ctx.beginPath(); ctx.arc(p.x,p.y,r+3.5,0,2*Math.PI); ctx.stroke(); }
    ctx.fillStyle="#9fb0c3"; ctx.font=(["cluster","artefact"].includes(n.kind)?"600 11px":"10px")+" sans-serif"; ctx.textAlign="left";
    ctx.fillText(symbolOf(n), p.x+r+6, p.y+4); }
  ctx.restore();
}
function drawMacro(){ const w=mcv.clientWidth,h=mcv.clientHeight; const nodes=levelNodes(); const ids=nodes.map(n=>n.id);
  macroPos=layoutCircle(nodes,0,0,Math.min(w,h)*0.30);
  drawNet(mctx,mcv,nodes,edgesAmong(ids),macroPos,{transform:true,labelpx:150});
  const tipId=hoverId||sel, tn=tipId&&node(tipId), p=tn&&macroPos[tipId];
  if(tn&&p){ const sx=w/2+mpanx+p.x*mscale, sy=h/2+mpany+p.y*mscale; drawTip(mctx,w,sx,sy,tn.label||tn.id); } }
// The orthogonal (flow) view around the selected node: its inputs fan up into it
// AND its neighbours (shared inputs ARE the interaction, drawn), the node and its
// interacting neighbours stack in the middle, and the coarse concepts they feed
// into sit on the far side. Rotated 90 degrees from the flat within-level network.
function flowSets(){
  const N=sel&&node(sel); if(!N) return null;
  const lvl=new Set(levelNodes().map(n=>n.id));
  const nb=new Set();
  for(const e of G.edges){ if(!LATERAL.includes(e.rel)) continue;
    if(e.src===sel&&lvl.has(e.dst)) nb.add(e.dst);
    if(e.dst===sel&&lvl.has(e.src)) nb.add(e.src); }
  const mid=[N, ...[...nb].map(node).filter(Boolean)].slice(0,7);
  const midIds=new Set(mid.map(n=>n.id));
  const ins=new Map(), outs=new Map();
  for(const m of mid){
    for(const b of interiorOf(m.id)) if(!midIds.has(b.id)) ins.set(b.id,b);
    for(const a of aboveOf(m.id))   if(!midIds.has(a.id)) outs.set(a.id,a);
  }
  return {mid, inputs:[...ins.values()], outputs:[...outs.values()]};
}
function placeColumn(nodes,x,h,pos){ const n=nodes.length; if(!n) return;
  const pad=26, span=Math.max(0,h-2*pad);
  nodes.forEach((nd,i)=>{ pos[nd.id]={x, y:(n===1)?h/2:pad+span*i/(n-1)}; }); }
function drawFlow(){ const w=ucv.clientWidth,h=ucv.clientHeight; uctx.clearRect(0,0,w,h); flowPos={};
  const fs=flowSets();
  if(!fs){ uctx.fillStyle="#7d8794"; uctx.font="12px sans-serif"; uctx.fillText("select a node to see its local flow", 14, h/2); return; }
  placeColumn(fs.inputs, w*0.15, h, flowPos); placeColumn(fs.mid, w*0.5, h, flowPos); placeColumn(fs.outputs, w*0.85, h, flowPos);
  for(const m of fs.mid){
    for(const b of interiorOf(m.id)){ const A=flowPos[b.id],B=flowPos[m.id]; if(A&&B){ uctx.strokeStyle="#3a455c"; uctx.lineWidth=1; uctx.beginPath(); uctx.moveTo(A.x,A.y); uctx.lineTo(B.x,B.y); uctx.stroke(); } }
    for(const a of aboveOf(m.id)){ const A=flowPos[m.id],B=flowPos[a.id]; if(A&&B){ uctx.strokeStyle="#46506a"; uctx.lineWidth=1; uctx.beginPath(); uctx.moveTo(A.x,A.y); uctx.lineTo(B.x,B.y); uctx.stroke(); } }
  }
  const drawDot=(nd,emph,side)=>{ const p=flowPos[nd.id]; if(!p) return; const r=emph?12:8;
    uctx.beginPath(); uctx.arc(p.x,p.y,r,0,2*Math.PI); uctx.fillStyle=col(nd); uctx.fill();
    if(nd.link==="loose"){ uctx.save(); uctx.setLineDash([3,3]); uctx.lineWidth=2; uctx.strokeStyle="#E67E22"; uctx.beginPath(); uctx.arc(p.x,p.y,r+3,0,2*Math.PI); uctx.stroke(); uctx.restore(); }
    if(nd.id===sel){ uctx.lineWidth=2.5; uctx.strokeStyle="#fff"; uctx.beginPath(); uctx.arc(p.x,p.y,r,0,2*Math.PI); uctx.stroke(); }
    uctx.fillStyle="#9fb0c3"; uctx.font="10px sans-serif";
    if(side==="L"){ uctx.textAlign="left"; uctx.fillText(symbolOf(nd), p.x+r+5, p.y+4); }
    else if(side==="R"){ uctx.textAlign="right"; uctx.fillText(symbolOf(nd), p.x-r-5, p.y+4); }
    else { uctx.textAlign="center"; uctx.fillText(symbolOf(nd), p.x, p.y-r-6); }
    uctx.textAlign="left"; };
  for(const nd of fs.inputs) drawDot(nd,false,"L");
  for(const nd of fs.outputs) drawDot(nd,false,"R");
  for(const nd of fs.mid) drawDot(nd,true,"M");
  const tipId=hoverId||sel, tn=tipId&&node(tipId), p=tn&&flowPos[tipId];
  if(tn&&p) drawTip(uctx,w,p.x,p.y,tn.label||tn.id);
}
function drawAll(){ drawMacro(); drawFlow(); }

// Drill-down with a deterministic zoom: tween the macro pan/scale toward the
// target node, then swap to its interior level and reset the transform. Purely
// additive - the destination state is identical to the old instant descent, the
// motion is a fixed-duration ease with no randomness (the no-wiggle rule holds).
let animating=false;
function zoomInto(id, then){
  const p=macroPos[id];
  if(!p||animating){ then(); return; }
  animating=true;
  const Z=2.6, dur=260, t0=performance.now();
  const sx=mpanx, sy=mpany, ss=mscale, tx=-p.x*Z, ty=-p.y*Z;
  const ease=u=>1-Math.pow(1-u,3);  // cubic ease-out, deterministic
  function step(now){
    const u=Math.min(1,(now-t0)/dur), k=ease(u);
    mpanx=sx+(tx-sx)*k; mpany=sy+(ty-sy)*k; mscale=ss+(Z-ss)*k;
    drawMacro();
    if(u<1){ requestAnimationFrame(step); }
    else { animating=false; mpanx=mpany=0; mscale=1; then(); }
  }
  requestAnimationFrame(step);
}

// Move the LEFT (macro) pane's focus onto a node: descend the level stack to the
// node's contains-ancestor chain so it sits inside the rendered level, then
// select it (centred, its interior ringed). This is how a pick in the RIGHT pane
// propagates to the left - the flow view routinely shows nodes from other levels
// (inputs/outputs), so we cannot just push the id; we route the left pane to the
// level the node actually lives in. If the node is itself coarse, descend one
// further so its sub-graph fills the pane. Reset the pan/scale transform so the
// new level is centred (deterministic, no wiggle).
function focusLeftOn(id){
  const n=node(id); if(!n) return;
  let p=ancestorPath(id);
  if(hasInterior(id)) p=[...p, id];   // a coarse node opens to show its interior
  path=p; sel=id; mpanx=mpany=0; mscale=1; render();
}

function worldM(mx,my){ const w=mcv.clientWidth,h=mcv.clientHeight; return {x:(mx-w/2-mpanx)/mscale, y:(my-h/2-mpany)/mscale}; }
function pickM(mx,my){ const wp=worldM(mx,my); let best=null,bd=1e9; for(const n of levelNodes()){ const p=macroPos[n.id]; if(!p)continue;
  const d=Math.hypot(p.x-wp.x,p.y-wp.y); if(d<Math.max(16,rad(n)+8)&&d<bd){bd=d;best=n;} } return best; }
function pickU(mx,my){ let best=null,bd=1e9; for(const id in flowPos){ const p=flowPos[id]; const d=Math.hypot(p.x-mx,p.y-my);
  if(d<16&&d<bd){bd=d;best=node(id);} } return best; }

mcv.addEventListener("mousedown", e=>{ dragging=true; moved=false; dx0=e.offsetX; dy0=e.offsetY; ox=e.offsetX-mpanx; oy=e.offsetY-mpany; });
mcv.addEventListener("mousemove", e=>{ if(!dragging) return; if(Math.abs(e.offsetX-dx0)+Math.abs(e.offsetY-dy0)>4) moved=true;
  if(moved){ mpanx=e.offsetX-ox; mpany=e.offsetY-oy; drawMacro(); } });
mcv.addEventListener("mousemove", e=>{ if(dragging) return; const n=pickM(e.offsetX,e.offsetY); const id=n?n.id:null;
  if(id!==hoverId){ hoverId=id; drawMacro(); } });
mcv.addEventListener("mouseleave", ()=>{ if(hoverId!==null){ hoverId=null; drawMacro(); } });
mcv.addEventListener("mouseup", e=>{ if(dragging&&!moved){ const n=pickM(e.offsetX,e.offsetY); if(n){ sel=n.id; render(); } } dragging=false; });
mcv.addEventListener("dblclick", e=>{ const n=pickM(e.offsetX,e.offsetY); if(n&&hasInterior(n.id)){
  zoomInto(n.id, ()=>{ path.push(n.id); sel=n.id; mpanx=mpany=0; mscale=1; render(); }); } });
// Wheel = zoom ACROSS hierarchy levels, not just a canvas scale. Between two
// thresholds the wheel free-scales the current level (the old behaviour); push
// past the upper threshold over a coarse node and the left pane DESCENDS into it
// (zoom in to go down a scale); push below the lower threshold and it ASCENDS
// (zoom out to climb). Both reuse the existing path stack + deterministic ease,
// so the no-wiggle rule holds and the destination matches a dblclick / breadcrumb.
const ZOOM_IN=2.6, ZOOM_OUT=0.55;
// The coarse node to descend into on a zoom-in: the one under the cursor if it
// holds an interior, else the selected node when it is in this level, else the
// first coarse node of the level (so a plain scroll still descends sensibly).
function descendTarget(){
  if(hoverId && hasInterior(hoverId) && macroPos[hoverId]) return hoverId;
  if(sel && macroPos[sel] && hasInterior(sel)) return sel;
  const c=levelNodes().find(n=>hasInterior(n.id)); return c?c.id:null;
}
mcv.addEventListener("wheel", e=>{ e.preventDefault(); if(animating) return;
  const ns=mscale*(e.deltaY<0?1.1:0.9);
  if(e.deltaY<0 && ns>=ZOOM_IN){            // zoom in past threshold -> descend a level
    const t=descendTarget();
    if(t){ zoomInto(t, ()=>{ path.push(t); sel=t; mpanx=mpany=0; mscale=1; render(); }); return; }
    mscale=Math.min(3,ns); drawMacro(); return;   // nothing to descend into: clamp
  }
  if(e.deltaY>0 && ns<=ZOOM_OUT && path.length){ // zoom out past threshold -> ascend a level
    sel=path.pop(); mpanx=mpany=0; mscale=1; render(); return;
  }
  mscale=Math.max(0.3,Math.min(3,ns)); drawMacro();
}, {passive:false});
ucv.addEventListener("click", e=>{ const n=pickU(e.offsetX,e.offsetY); if(n){ sel=n.id; render(); } });
// Double-click a node in the RIGHT (flow) pane -> move the LEFT pane's focus onto
// it. Any node, not just coarse ones: focusLeftOn routes the left level stack to
// the node's own level and selects it (a coarse node additionally opens). The
// click that precedes the dblclick has already re-centred the flow layout on the
// picked node, so a second pick at the same point can miss - fall back to the
// current selection, which is exactly that node.
ucv.addEventListener("dblclick", e=>{ const n=pickU(e.offsetX,e.offsetY), id=n?n.id:sel; if(id) focusLeftOn(id); });
ucv.addEventListener("mousemove", e=>{ const n=pickU(e.offsetX,e.offsetY); const id=n?n.id:null;
  if(id!==hoverId){ hoverId=id; drawFlow(); } });
ucv.addEventListener("mouseleave", ()=>{ if(hoverId!==null){ hoverId=null; drawFlow(); } });

function buildProjSeg(){
  const seg=document.getElementById("proj"), pl=projList();
  if(!pl.some(x=>x.p===proj)) proj=pl[0].p;
  seg.innerHTML=pl.map(x=>`<button data-p="${x.p}"${x.p===proj?' class="on"':''}>${x.p}</button>`).join("");
}
document.getElementById("proj").addEventListener("click", e=>{ if(!e.target.dataset.p) return; proj=e.target.dataset.p; path=[]; sel=null;
  mpanx=mpany=0; mscale=1;
  for(const b of e.currentTarget.children) b.classList.toggle("on", b.dataset.p===proj); render(); });
document.getElementById("crumbs").addEventListener("click", e=>{ const t=e.target.closest("[data-i]"); if(!t) return;
  path=path.slice(0, +t.dataset.i); sel=null; mpanx=mpany=0; mscale=1; render(); });
document.getElementById("refresh").onclick = ()=>load();

function esc(s){ return (s==null?"":String(s)).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }
function mathHTML(s){ if(typeof katex==="undefined") return '<code>'+esc(s)+'</code>'; try { return katex.renderToString(String(s||""),{throwOnError:false,displayMode:true}); } catch(e){ return '<code>'+esc(s)+'</code>'; } }
// The LaTeX to typeset for an equation node. Blueprint/canon equation nodes
// carry the source in meta.latex and use the bare label (eq:foo) as their name,
// so prefer the stored latex; substrate equations carry the LaTeX as the label.
function eqLatex(n){ const m=n.meta||{}; const s=(m.latex&&String(m.latex).trim())||n.label||""; return s; }
function badge(l,v){ const c=STATUS_COLOR[v]||"#445"; return `<span class="badge" style="background:${c}22;color:${c};border:1px solid ${c}66">${esc(l)}</span>`; }
function badgeBar(f){ const w=Math.round(Math.max(0,Math.min(1,f))*48); const c=f>=0.66?"#9B5DE5":f>=0.45?"#4A90D9":"#7d8794";
  return ` <span style="display:inline-block;width:50px;height:7px;border:1px solid #3a455c;border-radius:3px;vertical-align:middle"><span style="display:block;width:${w}px;height:5px;background:${c};border-radius:2px"></span></span>`; }
// Health-cohort badges from the graph's health() report: the node's standing in
// the engine's own self-audit (frontier / contradictions / ancestral baseline).
function healthFlags(id){
  const fr=health.frontier||{}; let out="";
  const cont=(health.contradictions||[]).some(c=>c.from===id||c.to===id);
  if(cont) out+=`<span class="badge" style="background:#E74C3C22;color:#E74C3C;border:1px solid #E74C3C66">contradiction</span>`;
  if((fr.loose||[]).includes(id)) out+=`<span class="badge" style="background:#E67E2222;color:#E67E22;border:1px solid #E67E2266">frontier · loose</span>`;
  if((fr.unsourced||[]).includes(id)) out+=`<span class="badge" style="background:#C0392B22;color:#C0392B;border:1px solid #C0392B66">unsourced</span>`;
  if((health.orphans||[]).includes(id)) out+=`<span class="badge" style="background:#7d879422;color:#7d8794;border:1px solid #7d879466">orphan</span>`;
  if((health.dead_wood_linked||[]).includes(id)) out+=`<span class="badge" style="background:#7d879422;color:#7d8794;border:1px solid #7d879466">dead wood</span>`;
  return out;
}
// A figure node: try the real asset, fall back to the placeholder card. The
// server resolves meta.file (a manuscript \includegraphics) or the bare handle
// against the source's image tree; if nothing resolves the img errors and the
// placeholder beneath it stays. Purely additive - no asset, same card as before.
function figureHTML(n){
  const m=n.meta||{}, ref=(m.file||n.id||"").trim();
  const url=`/figure?source=${encodeURIComponent(meta.source)}&path=${encodeURIComponent(meta.path||"")}&ref=${encodeURIComponent(ref)}`;
  const card=`<div class="figcard" data-figcard><div class="fl">${esc(n.id)}</div>${esc(n.label)}</div>`;
  return `<figure class="figimg" data-figwrap style="display:none">`
    +`<div class="fl">${esc(n.id)}</div>`
    +`<img alt="${esc(n.label)}" data-figsrc="${esc(url)}">`
    +`<figcaption class="cap">${esc(n.label)}</figcaption></figure>${card}`;
}
// Activate figure images after the panel is in the DOM: load each, reveal it on
// success and drop its placeholder, leave the placeholder on failure.
function wireFigures(el){
  for(const img of el.querySelectorAll("img[data-figsrc]")){
    const fig=img.closest("[data-figwrap]"), card=fig&&fig.nextElementSibling;
    img.onload=()=>{ if(fig) fig.style.display="block"; if(card&&card.hasAttribute("data-figcard")) card.style.display="none"; };
    img.onerror=()=>{ if(fig) fig.remove(); };
    img.src=img.getAttribute("data-figsrc");
  }
}
function chip(n){ const c=col(n); return `<span class="chip" data-n="${esc(n.id)}"><span class="dot" style="background:${c}"></span>${esc((n.label||n.id).slice(0,40))}</span>`; }
function wire(el){ for(const c of el.querySelectorAll("[data-n]")) c.onclick=()=>{ sel=c.dataset.n; render(); }; }

function renderCrumbs(){ const el=document.getElementById("crumbs"); let html=`<a data-i="0">${esc(proj)}</a>`;
  path.forEach((id,i)=>{ const n=node(id); html+=` ▸ <a data-i="${i+1}">${esc(n?n.label.slice(0,22):id)}</a>`; }); el.innerHTML=html; }

function renderPanel(){
  const panel=document.getElementById("panel");
  if(!sel||!node(sel)){ panel.innerHTML=`<p class="hint">Click a node: the level it lives in is on the left, the network it encodes is top-right, its detail is here. Double-click to descend; the breadcrumb climbs back.</p>`; return; }
  const n=node(sel), m=n.meta||{};
  let html=`<div class="kind">${esc(n.kind)}</div><h2>${esc(n.label)}</h2>`;
  if(n.link) html+=badge(n.link,n.link);
  if(n.status) html+=badge(n.status,n.status);
  if(m.result) html+=badge("result "+m.result,"established");
  html+=healthFlags(n.id);
  // provenance: a node id (generated_by), an outside door, or the ancestor
  // baseline (the pre-provenance canon, trusted-but-audited).
  if(n.source){ const sn=node(n.source);
    html+=`<div class="row"><div class="k">provenance</div>`
      +(sn?chip(sn):`<span class="badge" style="background:${n.source==="ancestor"?"#8a6d3b22":"#2c3a4d"};color:#c9a96a;border:1px solid #8a6d3b66">${esc(n.source)}</span>`)
      +`</div>`; }
  if(m.summary) html+=`<div class="row"><div class="k">summary</div>${esc(m.summary)}</div>`;
  // canon node metadata: the reference handle, domain, fitness, and tags.
  if(m.ref) html+=`<div class="row"><div class="k">reference</div><code>${esc(m.ref)}</code></div>`;
  if(m.domain&&m.domain!=="global") html+=`<div class="row"><div class="k">domain</div>${esc(m.domain)}</div>`;
  if(typeof m.fitness==="number") html+=`<div class="row"><div class="k">fitness</div>${(m.fitness).toFixed(2)}${badgeBar(m.fitness)}</div>`;
  if(m.tags&&m.tags.length) html+=`<div class="row"><div class="k">tags</div>${m.tags.map(t=>`<span class="badge" style="background:#2c3a4d;color:#9fb0c3;border:1px solid #3a455c">${esc(t)}</span>`).join("")}</div>`;
  // a node's lineage is a graph in depth: what it feeds into, and is fed from
  const up=aboveOf(sel), down=interiorOf(sel);
  if(up.length) html+=`<div class="row"><div class="k">feeds into ↑</div>${up.map(chip).join("")}</div>`;
  // the derivation (mathematics) and figures this node encodes
  const eqs=down.filter(x=>x.kind==="equation"), figs=down.filter(x=>x.kind==="figure");
  if(n.kind==="equation") html+=`<div class="row"><div class="k">mathematics</div><div class="math">${mathHTML(eqLatex(n))}</div></div>`;
  if(eqs.length){ html+=`<div class="row"><div class="k">derivation</div>`; for(const q of eqs) html+=`<div class="math">${mathHTML(eqLatex(q))}</div>`; html+=`</div>`; }
  if(figs.length){ html+=`<div class="row"><div class="k">figures</div>`; for(const f of figs) html+=figureHTML(f); html+=`</div>`; }
  if(n.kind==="figure") html+=`<div class="row"><div class="k">figure</div>${figureHTML(n)}</div>`;
  const rest=down.filter(x=>!["equation","figure"].includes(x.kind));
  if(rest.length) html+=`<div class="row"><div class="k">fed from ↓ (${rest.length})</div>${rest.map(chip).join("")}</div>`;
  panel.innerHTML=html; wire(panel); wireFigures(panel);
}
function render(){ renderCrumbs(); if(!animating) drawAll(); renderPanel(); }

function load(){
  const el=document.getElementById("graph-data");
  let data={nodes:[],edges:[]}; try{ data=JSON.parse(el.textContent); }catch(e){}
  const art=data.artifact||data; G.nodes=art.nodes||[]; G.edges=art.edges||[];
  health=data.health||art.health||{};
  meta={source:(document.body.getAttribute("data-source")||"canon"), path:null};
  const sr=document.getElementById("src"); if(sr) sr.textContent=meta.source;
  buildProjSeg();
  if(sel&&!node(sel)) sel=null;
  path=path.filter(id=>node(id));
  const fr=health.frontier||{loose:[]};
  const nc=(health.contradictions||[]).length;
  const st=document.getElementById("stat");
  if(st) st.innerHTML=`${G.nodes.length} nodes · ${G.edges.length} edges`
    +(fr.loose&&fr.loose.length?` · ${fr.loose.length} loose`:"")
    +(nc?` · <span style="color:#E74C3C">${nc} contradiction${nc>1?"s":""}</span>`:"");
  render();
}
resize(); load();
</script>
</body>
</html>
