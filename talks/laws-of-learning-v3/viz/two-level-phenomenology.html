<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settle or Ring</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }
  body {
    background: #0e1116;
    color: #c8cad0;
    font-family: 'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow: hidden;                 /* the deck frame is fixed-height: never scroll */
  }

  /* fill the iframe exactly: canvas, then one control row */
  .app {
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 10px 14px 12px;
    gap: 8px;
  }

  .canvas-wrap {
    position: relative;
    flex: 1 1 auto;                   /* take all the height the row leaves */
    min-height: 0;
    border-radius: 6px;
    overflow: hidden;
    background: #0a0d12;
  }
  canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }

  .controls {
    flex: 0 0 auto;
    display: flex; align-items: center; justify-content: center;
    gap: 18px; flex-wrap: nowrap;
  }
  .controls label { display: flex; align-items: center; gap: 8px; font-size: 12.5px; white-space: nowrap; color: #aeb4c2; }
  .controls input[type="range"] { width: 150px; accent-color: #6b8aaf; cursor: pointer; }
  .controls .val { display: inline-block; min-width: 3.4em; text-align: right; color: #cdd2dc; font-variant-numeric: tabular-nums; }

  .ghost {
    background: transparent; border: 1px solid rgba(255,255,255,0.12);
    color: #9ba2b0; padding: 5px 12px; border-radius: 5px; font-size: 12px; cursor: pointer;
    font-family: inherit;
  }
  .ghost:hover { background: rgba(255,255,255,0.08); color: #c8cad0; }

  .verdict {
    font-size: 12.5px; font-weight: 700; letter-spacing: 0.04em;
    padding: 5px 14px; border-radius: 5px; min-width: 7.4em; text-align: center; color: #0a0d12;
  }
</style>
</head>
<body>

<div class="app">
  <div class="canvas-wrap" id="wrap">
    <canvas id="cv"></canvas>
  </div>

  <div class="controls">
    <label>parts&nbsp;N
      <input type="range" id="nN" min="50" max="1000" step="5" value="140">
      <span class="val" id="nVal">140</span>
    </label>
    <label>relaxation&nbsp;&tau;
      <input type="range" id="tau" min="0.3" max="6.0" step="0.05" value="1.00">
      <span class="val" id="tauVal">1.00</span>
    </label>
    <div class="verdict" id="verdict">settles</div>
    <button class="ghost" id="kick">Nudge</button>
  </div>
</div>

<script>
// ─── palette (shared loop colours, matched to the other viz) ──────────────
const BG    = '#0a0d12';
const INK   = '#e6e8ee';
const MUTED = '#828a99';
const FAINT = 'rgba(255,255,255,0.10)';
const C_SETTLE = '#5cacee';   // settles / contracts - blue
const C_RING   = '#d4826a';   // rings / flips - vermilion
const C_EDGE   = '#c9a96e';   // the boundary - gold

const FONT = '"Segoe UI", system-ui, -apple-system, sans-serif';

// ─── model constants (grounded in the ANF spine, B4–B6) ───────────────────
//   return map:  e_{k+1} = (r − K_N) e_k − alpha c_N e_k^3      (B4, supercritical flip)
//   memory:      r = exp(−T/tau)                                (B3)
//   loop gain:   K_N = alpha chi_N g                            (B4)
//   majority:    chi_N = beta sqrt(2N/pi)   (the Z2 worked corner, B6)
//   flip:        ring when slope r − K_N crosses −1, i.e. K_N = K_c = r + 1   (B5)
// Constants chosen (verified) so the flip N_c(tau) sits mid-slider for every tau:
//   N_c runs ~170 (tau=0.3) to ~535 (tau=6) inside the N range [50,1000].
const ALPHA = 1.0;        // slow-law gain
const G     = 1.0;        // self-consistency slope d_theta O-hat = chi_N Pi'
const BETA  = 0.10;       // majority sharpness
const T     = 1.0;        // update interval (sets r with tau)
const C_N   = 1.0;        // cubic stabiliser (Z2 forbids the quadratic)
// Bounded realisation: the EXACT small-e germ (slope r−K_N, cubic −alpha c_N e^3)
// is preserved, then soft-clipped at S so a super-threshold slope rings as a
// clean bounded period-2 rather than a numerical blow-up. f(e)=S·tanh(germ/S).
const SAT   = 0.5;

// ─── state ────────────────────────────────────────────────────────────────
let N = 140, tau = 1.0;
let e = 0.05;                 // current error iterate
const SERIES_MAX = 34;        // visible iterations: few enough that each rung is wide
                              // and the period-2 alternation reads as an oscillation,
                              // not a barcode. The window fills the whole panel width.
let series = [0.05];          // e_k history (the hero panel)
let trail = [];               // (N,tau) operating-point breadcrumb on the plane

// ─── derived quantities ─────────────────────────────────────────────────--
function rMem()  { return Math.exp(-T / tau); }
function chiN(n) { return BETA * Math.sqrt(2 * n / Math.PI); }
function K_N(n)  { return ALPHA * chiN(n) * G; }
function slope() { return rMem() - K_N(N); }            // the eigenvalue r − K_N
function Kc()    { return rMem() + 1; }                 // flip threshold
// critical N where K_N = r+1  ->  beta sqrt(2N/pi) = r+1
function Ncrit(tauv) {
  const r = Math.exp(-T / tauv);
  const s = (r + 1) / (BETA * Math.sqrt(2 / Math.PI));
  return s * s;
}

// ─── the return map (faithful germ, bounded) ──────────────────────────────
function fmap(x) {
  const germ = slope() * x - ALPHA * C_N * x * x * x;
  return SAT * Math.tanh(germ / SAT);
}

// regime by the eigenvalue: |slope| < 1 settles, ≈1 edge, < −1 rings (flip)
function regime() {
  const s = slope();
  if (Math.abs(s + 1) < 0.035) return 'edge';
  return s > -1 ? 'settle' : 'ring';
}

// ─── canvas (crisp at any DPR - 2x render is sharp) ────────────────────────
const wrap = document.getElementById('wrap');
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
let W = 0, H = 0, DPR = 1;
function resize() {
  DPR = Math.max(1, window.devicePixelRatio || 1);
  const rect = wrap.getBoundingClientRect();
  W = Math.max(1, Math.round(rect.width));
  H = Math.max(1, Math.round(rect.height));
  cv.width = Math.round(W * DPR);
  cv.height = Math.round(H * DPR);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);
if (window.matchMedia) {
  try { window.matchMedia(`(resolution: ${DPR}dppx)`).addEventListener('change', resize); } catch (_) {}
}

// crisp text helper: render on the device-pixel grid so glyphs are sharp at 2x
function text(str, x, y, font, fill, align, baseline) {
  ctx.font = font; ctx.fillStyle = fill;
  ctx.textAlign = align || 'left'; ctx.textBaseline = baseline || 'alphabetic';
  ctx.fillText(str, Math.round(x), Math.round(y));
}

// ─── LEFT panel: the error time series - the phenomenon itself ─────────────
// The transient is a FIXED curve spanning the whole panel (computed once per
// knob setting). A glowing cursor sweeps along it on a slow loop, so the
// characteristic shape - a decaying ripple, or a growing-then-locked
// oscillation - is on screen at every instant, never an empty or flatlined
// panel, and the sweep gives the time-order without the busyness of scrolling.
function drawSeries(px, py, pw, ph) {
  ctx.strokeStyle = FAINT; ctx.lineWidth = 1;
  rr(px + 0.5, py + 0.5, pw - 1, ph - 1, 6); ctx.stroke();

  text('Order parameter over time', px + 14, py + 24, '600 14px ' + FONT, INK, 'left', 'alphabetic');

  const ml = 18, mt = 40, mb = 34, mr = 18;
  const ax = px + ml, ay = py + mt, aw = pw - ml - mr, ah = ph - mt - mb;
  const EMAX = 0.62;                                  // vertical half-range
  const n = series.length;
  const sx = (k) => ax + (k / (n - 1)) * aw;          // fill the FULL panel width
  const sy = (v) => ay + ah / 2 - (v / EMAX) * (ah / 2);

  const reg = regime();
  const col = reg === 'settle' ? C_SETTLE : reg === 'edge' ? C_EDGE : C_RING;

  // zero line (the settled state)
  ctx.strokeStyle = 'rgba(255,255,255,0.18)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(ax, sy(0)); ctx.lineTo(ax + aw, sy(0)); ctx.stroke();

  // stems give the discrete-iteration feel; faint so the line + dots dominate
  ctx.strokeStyle = hexA(col, 0.22); ctx.lineWidth = 1.4;
  for (let i = 0; i < n; i++) {
    const X = sx(i), Y = sy(series[i]);
    ctx.beginPath(); ctx.moveTo(X, sy(0)); ctx.lineTo(X, Y); ctx.stroke();
  }
  // the connecting trace, full width
  ctx.strokeStyle = hexA(col, 0.85); ctx.lineWidth = 2; ctx.lineJoin = 'round';
  ctx.beginPath();
  for (let i = 0; i < n; i++) {
    const X = sx(i), Y = sy(series[i]);
    i ? ctx.lineTo(X, Y) : ctx.moveTo(X, Y);
  }
  ctx.stroke();
  // a dot on each iterate so the discreteness reads
  for (let i = 0; i < n; i++) {
    ctx.fillStyle = hexA(col, 0.9);
    ctx.beginPath(); ctx.arc(sx(i), sy(series[i]), 2.2, 0, 7); ctx.fill();
  }

  // sweeping cursor: a glowing dot walking the curve on a slow loop. The few
  // iterates just behind it are brightened into a short comet so the eye picks
  // up the direction of time.
  const ci = sweep % n;
  for (let b = 0; b < 5; b++) {
    const idx = ci - b; if (idx < 0) break;
    const a = (1 - b / 5);
    ctx.fillStyle = hexA(col, 0.35 * a);
    ctx.beginPath(); ctx.arc(sx(idx), sy(series[idx]), 3.2 * a + 1, 0, 7); ctx.fill();
  }
  const cx = sx(ci), cy = sy(series[ci]);
  ctx.fillStyle = col; ctx.shadowColor = col; ctx.shadowBlur = 10;
  ctx.beginPath(); ctx.arc(cx, cy, 4.4, 0, 7); ctx.fill(); ctx.shadowBlur = 0;

  // axis labels - in clear gutters, no trace collision
  text('iteration  k', ax + aw / 2, py + ph - 11, '11px ' + FONT, MUTED, 'center', 'alphabetic');
  // describe what is happening in plain words at the foot (substance, not padding)
  const phrase = reg === 'settle' ? 'error fades to zero'
               : reg === 'edge'   ? 'poised at the edge'
               :                    'error locks into a steady oscillation';
  text(phrase, px + 14, py + ph - 11, 'italic 11.5px ' + FONT, hexA(col, 0.92), 'left', 'alphabetic');
}

// ─── RIGHT panel: the (N, tau) plane - the boundary emerges empirically ────
function drawPlane(px, py, pw, ph) {
  ctx.strokeStyle = FAINT; ctx.lineWidth = 1;
  rr(px + 0.5, py + 0.5, pw - 1, ph - 1, 6); ctx.stroke();

  text('Where it settles, where it rings', px + 14, py + 24, '600 14px ' + FONT, INK, 'left', 'alphabetic');

  const ml = 42, mt = 40, mb = 36, mr = 18;
  const ax = px + ml, ay = py + mt, aw = pw - ml - mr, ah = ph - mt - mb;
  const NMIN = 50, NMAX = 1000, TMIN = 0.3, TMAX = 6.0;
  const sx = (n) => ax + (n - NMIN) / (NMAX - NMIN) * aw;
  const sy = (t) => ay + ah - (t - TMIN) / (TMAX - TMIN) * ah;

  // shade each tau-row: settle side (small N) blue, ring side (large N) vermilion.
  // the colour change traces the empirical boundary N_c(tau) WITHOUT drawing a hard line.
  const rows = 96;
  for (let j = 0; j < rows; j++) {
    const t = TMIN + (j / rows) * (TMAX - TMIN);
    const y0 = sy(t + (TMAX - TMIN) / rows) , y1 = sy(t);
    const nc = Ncrit(t);
    const xb = sx(Math.max(NMIN, Math.min(NMAX, nc)));
    ctx.fillStyle = hexA(C_SETTLE, 0.13);
    ctx.fillRect(ax, y0, xb - ax, (y1 - y0) + 0.6);
    ctx.fillStyle = hexA(C_RING, 0.13);
    ctx.fillRect(xb, y0, (ax + aw) - xb, (y1 - y0) + 0.6);
  }

  // the emergent boundary curve N_c(tau) - soft, the seam between the two tints
  ctx.beginPath();
  let started = false;
  for (let j = 0; j <= rows; j++) {
    const t = TMIN + (j / rows) * (TMAX - TMIN);
    const nc = Math.max(NMIN, Math.min(NMAX, Ncrit(t)));
    const X = sx(nc), Y = sy(t);
    started ? ctx.lineTo(X, Y) : (ctx.moveTo(X, Y), started = true);
  }
  ctx.strokeStyle = hexA(C_EDGE, 0.85); ctx.lineWidth = 2; ctx.lineJoin = 'round'; ctx.stroke();

  // operating-point trail (faint breadcrumb of recent settings)
  for (let i = 0; i < trail.length; i++) {
    const a = (i + 1) / trail.length * 0.5;
    ctx.fillStyle = hexA('#ffffff', a * 0.5);
    ctx.beginPath(); ctx.arc(sx(trail[i][0]), sy(trail[i][1]), 2, 0, 7); ctx.fill();
  }

  // the live operating point (N, tau)
  const reg = regime();
  const opCol = reg === 'settle' ? C_SETTLE : reg === 'edge' ? C_EDGE : C_RING;
  const opx = sx(N), opy = sy(tau);
  // crosshair to the axes so the read-off is unambiguous
  ctx.strokeStyle = hexA('#ffffff', 0.18); ctx.setLineDash([2, 3]); ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(opx, sy(TMIN)); ctx.lineTo(opx, opy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(ax, opy); ctx.lineTo(opx, opy); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = opCol; ctx.shadowColor = opCol; ctx.shadowBlur = 11;
  ctx.beginPath(); ctx.arc(opx, opy, 5.2, 0, 7); ctx.fill(); ctx.shadowBlur = 0;
  ctx.strokeStyle = hexA('#ffffff', 0.55); ctx.lineWidth = 1.4;
  ctx.beginPath(); ctx.arc(opx, opy, 5.2, 0, 7); ctx.stroke();

  // axis ticks + labels - placed in the gutters, never over the field
  for (const n of [50, 250, 500, 750, 1000]) {
    text(String(n), sx(n), sy(TMIN) + 15, '10px ' + FONT, MUTED, 'center', 'alphabetic');
  }
  text('parts  N', ax + aw / 2, sy(TMIN) + 29, '10.5px ' + FONT, MUTED, 'center', 'alphabetic');
  for (const t of [1, 2, 3, 4, 5, 6]) {
    text(String(t), ax - 8, sy(t), '10px ' + FONT, MUTED, 'right', 'middle');
  }
  ctx.save(); ctx.translate(px + 15, ay + ah / 2); ctx.rotate(-Math.PI / 2);
  text('relaxation  τ', 0, 0, '10.5px ' + FONT, MUTED, 'center', 'alphabetic');
  ctx.restore();

  // region words, anchored in opposite corners. They are orientation aids, so
  // they YIELD: when the live operating point comes near a word it fades out,
  // guaranteeing no label/point collision anywhere the point can roam.
  const fade = (lx, ly) => {
    const d = Math.hypot(opx - lx, opy - ly);
    return Math.max(0, Math.min(1, (d - 26) / 34));   // 0 within 26px, full by 60px
  };
  const sLx = sx(95), sLy = sy(5.4);
  const rLx = sx(905), rLy = sy(0.85);
  text('settles', sLx, sLy, 'italic 11px ' + FONT, hexA(C_SETTLE, 0.92 * fade(sLx, sLy)), 'left', 'middle');
  text('rings', rLx, rLy, 'italic 11px ' + FONT, hexA(C_RING, 0.92 * fade(rLx, rLy)), 'right', 'middle');
}

// ─── sweep (paced slowly so the cursor is followable) ──────────────────────
// The series buffer is fixed (set in reseed). A cursor index `sweep` advances
// along it ~3 iterates/second, looping back to the start, so the eye can track
// the orbit rung by rung without the panel ever scrolling to empty.
let sweep = 0;
const STEP_EVERY = 0.34;
let acc = 0, prev = performance.now();
function draw(now) {
  const dt = Math.min(0.05, (now - prev) / 1000); prev = now;
  acc += dt;
  if (acc >= STEP_EVERY) { sweep = (sweep + 1) % SERIES_MAX; acc -= STEP_EVERY; }

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = BG; ctx.fillRect(0, 0, W, H);

  const gap = 12;
  // the time series is the hero - give it the larger share
  const leftW = Math.round((W - gap * 3) * 0.56);
  const rightW = (W - gap * 3) - leftW;
  drawSeries(gap, gap, leftW, H - gap * 2);
  drawPlane(gap * 2 + leftW, gap, rightW, H - gap * 2);

  requestAnimationFrame(draw);
}

// ─── helpers ───────────────────────────────────────────────────────────────
function rr(x, y, w, h, rad) {
  rad = Math.max(0, Math.min(rad, w / 2, h / 2));
  ctx.beginPath(); ctx.moveTo(x + rad, y);
  ctx.arcTo(x + w, y, x + w, y + h, rad); ctx.arcTo(x + w, y + h, x, y + h, rad);
  ctx.arcTo(x, y + h, x, y, rad); ctx.arcTo(x, y, x + w, y, rad); ctx.closePath();
}
function hexA(hex, a) {
  const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${a})`;
}

// ─── controls ───────────────────────────────────────────────────────────────
const nEl = document.getElementById('nN');
const tauEl = document.getElementById('tau');
const verdict = document.getElementById('verdict');

function updateVerdict() {
  const reg = regime();
  let txt, col;
  if (reg === 'settle')    { txt = 'SETTLES'; col = C_SETTLE; }
  else if (reg === 'edge') { txt = 'AT THE EDGE'; col = C_EDGE; }
  else                     { txt = 'RINGS'; col = C_RING; }
  verdict.textContent = txt;
  verdict.style.background = col;
}
function syncReadouts() {
  document.getElementById('nVal').textContent = String(Math.round(N));
  document.getElementById('tauVal').textContent = tau.toFixed(2);
}
function pushTrail() {
  const last = trail[trail.length - 1];
  if (!last || last[0] !== N || last[1] !== tau) {
    trail.push([N, tau]);
    if (trail.length > 12) trail.shift();
  }
}
// recompute the fixed transient window from a small perturbation `seed`. The
// buffer holds the FIRST window of iterates from that seed - the transient
// itself - so the panel reads full immediately and the characteristic shape
// (a decaying ripple, or a growing-then-locked oscillation) is always on
// screen. Called on every knob change and restarts the cursor at the left.
let seed = 0.05;
function reseed() {
  e = seed;
  series = [e];
  for (let i = 1; i < SERIES_MAX; i++) {
    e = fmap(e);
    if (regime() === 'settle' && Math.abs(e) < 0.0015) e = Math.sign(seed) * 0.0015;
    series.push(e);
  }
  sweep = 0;
}

function refresh() {
  N = parseFloat(nEl.value);
  tau = parseFloat(tauEl.value);
  syncReadouts(); reseed(); pushTrail(); updateVerdict();
}
nEl.addEventListener('input', refresh);
tauEl.addEventListener('input', refresh);
// Nudge: perturb from the opposite side and replay - the settle/ring fate is a
// property of the regime, not of which way it was knocked.
document.getElementById('kick').addEventListener('click', () => { seed = -seed; reseed(); });

// ─── go ─────────────────────────────────────────────────────────────────---
resize();
refresh();
requestAnimationFrame(draw);
</script>
</body>
</html>
