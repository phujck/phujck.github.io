<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Viable Window</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }
  body {
    background: #0e1116;
    color: #c8cad0;
    font-family: 'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow: hidden;                 /* the deck frame is fixed-height: never scroll */
  }

  /* fill the iframe exactly: header line, canvas, one control row */
  .app {
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 10px 14px 12px;
    gap: 8px;
  }

  .canvas-wrap {
    position: relative;
    flex: 1 1 auto;                   /* take all the height the row leaves */
    min-height: 0;
    border-radius: 6px;
    overflow: hidden;
    background: #0a0d12;
  }
  canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }

  .controls {
    flex: 0 0 auto;
    display: flex; align-items: center; justify-content: center;
    gap: 11px; flex-wrap: nowrap; padding: 0 2px;
  }
  .controls label { display: flex; align-items: center; gap: 6px; font-size: 12px; white-space: nowrap; }
  .controls input[type="range"] { width: 88px; accent-color: #6b8aaf; cursor: pointer; }
  .controls .val { display: inline-block; min-width: 2.7em; text-align: right; color: #9ba2b0; font-variant-numeric: tabular-nums; }

  .seg { display: flex; gap: 6px; }
  .preset {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.14);
    color: #c8cad0; padding: 5px 10px; border-radius: 5px; font-size: 12px; cursor: pointer;
    white-space: nowrap; transition: background .12s, border-color .12s;
  }
  .preset:hover { background: rgba(255,255,255,0.12); }
  .preset.p-stable { border-color: rgba(92,172,238,0.55); }
  .preset.p-stable:hover { background: rgba(92,172,238,0.16); }
  .preset.p-edge { border-color: rgba(201,169,110,0.6); }
  .preset.p-edge:hover { background: rgba(201,169,110,0.16); }

  .ghost {
    background: transparent; border: 1px solid rgba(255,255,255,0.12);
    color: #9ba2b0; padding: 5px 10px; border-radius: 5px; font-size: 12px; cursor: pointer;
  }
  .ghost:hover { background: rgba(255,255,255,0.08); color: #c8cad0; }

  .verdict {
    font-size: 12px; font-weight: 700; letter-spacing: 0.02em;
    padding: 5px 10px; border-radius: 5px; min-width: 8em; text-align: center; color: #0a0d12;
    white-space: nowrap;
  }
</style>
</head>
<body>

<div class="app">
  <div class="canvas-wrap" id="wrap">
    <canvas id="cv"></canvas>
  </div>

  <div class="controls">
    <div class="seg">
      <button class="preset p-stable" id="pStable">Stable</button>
      <button class="preset p-edge"   id="pEdge">Edge of chaos</button>
    </div>
    <label>ψ
      <input type="range" id="psi" min="-0.6" max="0.6" step="0.01" value="-0.10">
      <span class="val" id="psiVal">-0.10</span>
    </label>
    <label>size&nbsp;N
      <input type="range" id="logN" min="0.5" max="4.0" step="0.02" value="2.0">
      <span class="val" id="nVal">100</span>
    </label>
    <label>memory&nbsp;r
      <input type="range" id="rr" min="0.0" max="0.9" step="0.01" value="0.40">
      <span class="val" id="rVal">0.40</span>
    </label>
    <div class="verdict" id="verdict">stable</div>
    <button class="ghost" id="kick">Kick</button>
  </div>
</div>

<script>
// ─── palette (shared loop colours) ────────────────────────────
const BG    = '#0a0d12';
const INK   = '#e6e8ee';
const MUTED = '#828a99';
const FAINT = 'rgba(255,255,255,0.10)';
const C_STABLE = '#5cacee';   // contracting / fading - blue
const C_CRIT   = '#c9a96e';   // edge of chaos - gold
const C_RUN    = '#d4826a';   // runaway / flip - vermilion
const C_VIABLE = '#7ec4a5';   // the viable band - green

const FONT = '"Segoe UI", system-ui, -apple-system, sans-serif';

// ─── model constants (grounded in the ANF spine) ──────────────
//   return map:  e_{k+1} = (r - K_N) e_k + higher order
//   gain:        K_N = alpha * chi_N * g,   chi_N = A * N^psi
//   threshold:   flip when (r - K_N) crosses -1, i.e. K_N = K_c = r + 1
//   FP slope:    lambda0 = n^psi  (decimation eigenvalue); psi = log_n lambda0
const N_DEC   = 4;        // decimation factor n (group size)
const A_CHI   = 1.0;      // susceptibility prefactor
const ALPHA_G = 1.0;      // alpha * g lumped (so K_N = chi_N)
const SAT     = 2.2;      // saturation sharpness: f(x)=(slope/SAT)*tanh(SAT*x).
                          // f'(0)=slope (the eigenvalue), but it saturates - so a
                          // slope below −1 gives a clean, bounded period-2 flip
                          // instead of a numerical blow-up.

// ─── state ────────────────────────────────────────────────────
let psi = -0.10, logN = 2.0, r = 0.40;
let e = 0.18;             // current error iterate
let cobweb = [];          // recent (e_k -> e_{k+1}) points for the staircase

// derived
function N() { return Math.pow(10, logN); }
function chiN() { return A_CHI * Math.pow(N(), psi); }
function K_N() { return ALPHA_G * chiN(); }
function K_c() { return r + 1; }
function slope() { return r - K_N(); }
function lambda0() { return Math.pow(N_DEC, psi); }

function Ncrit() {
  if (psi <= 1e-6) return Infinity;
  return Math.pow(K_c() / (ALPHA_G * A_CHI), 1/psi);
}
function Lmin(nn) {
  if (psi <= 1e-6) return 1;
  const nc1 = Ncrit();
  if (nn <= nc1) return 1;
  return 1 + Math.log(nn / nc1) / Math.log(lambda0());
}

// ─── canvas (crisp at any DPR) ────────────────────────────────
const wrap = document.getElementById('wrap');
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
let W = 0, H = 0, DPR = 1;
function resize() {
  DPR = window.devicePixelRatio || 1;
  const rect = wrap.getBoundingClientRect();
  W = Math.max(1, Math.round(rect.width));
  H = Math.max(1, Math.round(rect.height));
  cv.width = Math.round(W * DPR);
  cv.height = Math.round(H * DPR);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);
// DPR can change (zoom / monitor move) - re-snap the backing store when it does
if (window.matchMedia) {
  try { window.matchMedia(`(resolution: ${DPR}dppx)`).addEventListener('change', resize); } catch (_) {}
}
resize();

// crisp text helper: render on the device-pixel grid so glyphs are sharp at 2x
function text(str, x, y, font, fill, align, baseline) {
  ctx.font = font; ctx.fillStyle = fill;
  ctx.textAlign = align || 'left'; ctx.textBaseline = baseline || 'alphabetic';
  ctx.fillText(str, Math.round(x) + 0.0, Math.round(y) + 0.0);
}

// ─── the return map ───────────────────────────────────────────
function fmap(x) {
  const s = slope();
  return (s / SAT) * Math.tanh(SAT * x);
}

// ─── left panel: live cobweb of the return map ────────────────
function drawReturnMap(px, py, pw, ph) {
  ctx.strokeStyle = FAINT; ctx.lineWidth = 1;
  rr(px + 0.5, py + 0.5, pw - 1, ph - 1, 6); ctx.stroke();

  const mx = 30, mt = 38, mb = 30, mr = 16;
  const ax = px + mx, ay = py + mt, aw = pw - mx - mr, ah = ph - mt - mb;
  const E = 1.25;
  const sx = (x) => ax + (x + E) / (2 * E) * aw;
  const sy = (y) => ay + ah - (y + E) / (2 * E) * ah;

  text('Return map   eₖ₊₁ = f(eₖ)', px + 14, py + 24, '600 14px ' + FONT, INK, 'left', 'alphabetic');

  // axes
  ctx.strokeStyle = 'rgba(255,255,255,0.18)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(sx(-E), sy(0)); ctx.lineTo(sx(E), sy(0)); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(sx(0), sy(-E)); ctx.lineTo(sx(0), sy(E)); ctx.stroke();

  // identity line y = x
  ctx.strokeStyle = 'rgba(255,255,255,0.24)'; ctx.setLineDash([4, 4]);
  ctx.beginPath(); ctx.moveTo(sx(-E), sy(-E)); ctx.lineTo(sx(E), sy(E)); ctx.stroke();
  ctx.setLineDash([]);

  const reg = regime();
  const curveCol = reg === 'stable' ? C_STABLE : reg === 'critical' ? C_CRIT : C_RUN;

  // the map curve - break where it leaves the box so a steep slope reads as an exit, not a wall
  ctx.strokeStyle = curveCol; ctx.lineWidth = 2.4; ctx.lineJoin = 'round';
  ctx.beginPath();
  let pen = false;
  for (let i = 0; i <= 200; i++) {
    const x = -E + (i / 200) * 2 * E;
    const y = fmap(x);
    if (y < -E || y > E) { pen = false; continue; }
    const X = sx(x), Y = sy(y);
    if (!pen) { ctx.moveTo(X, Y); pen = true; } else ctx.lineTo(X, Y);
  }
  ctx.stroke();

  // slope tangent at the origin (the eigenvalue made visible)
  const s = slope();
  ctx.strokeStyle = 'rgba(255,255,255,0.30)'; ctx.lineWidth = 1; ctx.setLineDash([2, 3]);
  ctx.beginPath(); ctx.moveTo(sx(-0.5), sy(s * -0.5)); ctx.lineTo(sx(0.5), sy(s * 0.5)); ctx.stroke();
  ctx.setLineDash([]);

  // cobweb staircase
  ctx.strokeStyle = 'rgba(255,255,255,0.55)'; ctx.lineWidth = 1.3; ctx.lineJoin = 'round';
  ctx.beginPath();
  for (let i = 0; i < cobweb.length - 1; i++) {
    const a = cobweb[i], b = cobweb[i + 1];
    const X0 = sx(clamp(a[0], -E, E)), Y0 = sy(clamp(a[1], -E, E));
    const X1 = sx(clamp(b[0], -E, E)), Y1 = sy(clamp(b[1], -E, E));
    if (i === 0) ctx.moveTo(X0, Y0);
    ctx.lineTo(X1, Y1);
  }
  ctx.stroke();

  // current iterate dot (rides on the staircase at its latest point)
  const last = cobweb.length ? cobweb[cobweb.length - 1] : [e, e];
  const cx = sx(clamp(last[0], -E, E)), cy = sy(clamp(last[1], -E, E));
  ctx.fillStyle = curveCol; ctx.shadowColor = curveCol; ctx.shadowBlur = 9;
  ctx.beginPath(); ctx.arc(cx, cy, 4.2, 0, 7); ctx.fill(); ctx.shadowBlur = 0;

  // slope readout (dedicated band at the foot - no overlap with the plot)
  text('slope = r − Kₙ = ' + s.toFixed(2), px + 14, py + ph - 11, '11.5px ' + FONT, MUTED, 'left', 'alphabetic');
  const tag = Math.abs(Math.abs(s) - 1) < 0.04 ? '|slope| ≈ 1  edge'
            : Math.abs(s) < 1 ? '|slope| < 1  contracts' : '|slope| > 1  flips';
  text(tag, px + pw - 14, py + ph - 11, '11.5px ' + FONT, MUTED, 'right', 'alphabetic');
}

// ─── right panel: the (N, L) viable window ────────────────────
function drawWindow(px, py, pw, ph) {
  ctx.strokeStyle = FAINT; ctx.lineWidth = 1;
  rr(px + 0.5, py + 0.5, pw - 1, ph - 1, 6); ctx.stroke();

  const ml = 40, mt = 38, mb = 34, mr = 18;
  const ax = px + ml, ay = py + mt, aw = pw - ml - mr, ah = ph - mt - mb;
  const NX0 = 0.5, NX1 = 4.5, LY0 = 0, LY1 = 9;
  const sx = (ln) => ax + (ln - NX0) / (NX1 - NX0) * aw;
  const sy = (L) => ay + ah - (L - LY0) / (LY1 - LY0) * ah;

  text('Viable window   (size N, depth L)', px + 14, py + 24, '600 14px ' + FONT, INK, 'left', 'alphabetic');

  const Lceil = 7.5;

  // shade columns: viable band [floor,ceiling] green; below floor vermilion (too flat)
  const cols = 130;
  for (let i = 0; i < cols; i++) {
    const ln = NX0 + (i / cols) * (NX1 - NX0);
    const nn = Math.pow(10, ln);
    const x0 = sx(ln), x1 = sx(ln + (NX1 - NX0) / cols) + 0.6;
    const lf = Math.min(Lceil + 1, Lmin(nn));
    if (lf < Lceil) {
      ctx.fillStyle = hexA(C_VIABLE, 0.16);
      ctx.fillRect(x0, sy(Lceil), x1 - x0, sy(lf) - sy(Lceil));
    }
    ctx.fillStyle = hexA(C_RUN, 0.13);
    ctx.fillRect(x0, sy(lf), x1 - x0, sy(LY0) - sy(lf));
  }
  // frozen region above ceiling
  ctx.fillStyle = 'rgba(255,255,255,0.05)';
  ctx.fillRect(ax, sy(LY1), aw, sy(Lceil) - sy(LY1));

  // floor curve L_min(N) ~ log_{lambda0} N
  ctx.beginPath();
  let started = false;
  for (let i = 0; i <= cols; i++) {
    const ln = NX0 + (i / cols) * (NX1 - NX0);
    const nn = Math.pow(10, ln);
    const L = Lmin(nn);
    const X = sx(ln), Y = sy(Math.min(LY1, L));
    if (!started) { ctx.moveTo(X, Y); started = true; } else ctx.lineTo(X, Y);
  }
  ctx.strokeStyle = C_VIABLE; ctx.lineWidth = 2.2; ctx.lineJoin = 'round'; ctx.stroke();

  // ceiling line
  ctx.strokeStyle = hexA('#ffffff', 0.4); ctx.setLineDash([5, 4]); ctx.lineWidth = 1.4;
  ctx.beginPath(); ctx.moveTo(ax, sy(Lceil)); ctx.lineTo(ax + aw, sy(Lceil)); ctx.stroke();
  ctx.setLineDash([]);

  // the live operating point (N, L=Lmin(N))
  const opX = sx(logN), opL = Math.min(LY1, Math.max(1, Lmin(N())));
  const inViable = (opL <= Lceil);
  ctx.fillStyle = inViable ? C_VIABLE : C_RUN;
  ctx.shadowColor = ctx.fillStyle; ctx.shadowBlur = 10;
  ctx.beginPath(); ctx.arc(opX, sy(opL), 5, 0, 7); ctx.fill(); ctx.shadowBlur = 0;
  ctx.strokeStyle = hexA('#ffffff', 0.25); ctx.setLineDash([2, 3]);
  ctx.beginPath(); ctx.moveTo(opX, sy(opL)); ctx.lineTo(opX, sy(LY0)); ctx.stroke();
  ctx.setLineDash([]);

  // x axis ticks + label
  for (const ln of [1, 2, 3, 4]) {
    text('10' + sup(ln), sx(ln), sy(LY0) + 15, '10.5px ' + FONT, MUTED, 'center', 'alphabetic');
  }
  text('system size N', ax + aw / 2, sy(LY0) + 29, '10.5px ' + FONT, MUTED, 'center', 'alphabetic');
  // y axis label (rotated, in the left gutter)
  ctx.save(); ctx.translate(px + 15, ay + ah / 2); ctx.rotate(-Math.PI / 2);
  text('hierarchy depth L', 0, 0, '10.5px ' + FONT, MUTED, 'center', 'alphabetic');
  ctx.restore();

  // region labels - placed in clear interior zones, no plot collisions
  text('too flat - it flips', sx(2.3), sy(0.65), 'italic 11px ' + FONT, hexA(C_RUN, 0.85), 'left', 'middle');
  text('too deep - it freezes', sx(0.95), sy(8.4), 'italic 11px ' + FONT, hexA('#cfd3da', 0.62), 'left', 'middle');
  text('viable', sx(1.95), sy(4.6), 'italic 11px ' + FONT, hexA(C_VIABLE, 0.95), 'left', 'middle');
  // floor label: pinned just under the ceiling on the right, where the floor has
  // flattened - clear of the title row, the green line, and the "too deep" label.
  text('floor  Lₘᵢₙ ~ log N', sx(3.45), sy(Lceil) + 16,
       '10px ' + FONT, hexA(C_VIABLE, 0.9), 'left', 'middle');
}

function sup(n) { return ['', '¹', '²', '³', '⁴'][n] || ''; }

// ─── regime classification ────────────────────────────────────
function regime() {
  const s = slope();
  if (Math.abs(Math.abs(s) - 1) < 0.04) return 'critical';
  if (Math.abs(s) < 1) return 'stable';
  return 'runaway';
}

// ─── iteration (paced slowly so the staircase is followable) ──
function iterate() {
  const next = fmap(e);
  cobweb.push([e, e]);
  cobweb.push([e, next]);
  cobweb.push([next, next]);
  if (cobweb.length > 75) cobweb.splice(0, cobweb.length - 75);
  e = clamp(next, -1.3, 1.3);
  if (regime() === 'stable' && Math.abs(e) < 0.004) e = 0.004; // keep a faint life
}

// step the map ~2.5x/second: slow enough to watch each rung land
const STEP_EVERY = 0.40;   // seconds between iterate steps
let acc = 0, prev = performance.now();
function draw(now) {
  const dt = Math.min(0.05, (now - prev) / 1000); prev = now;
  acc += dt;
  if (acc >= STEP_EVERY) { iterate(); acc -= STEP_EVERY; }

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = BG; ctx.fillRect(0, 0, W, H);

  const gap = 12;
  const halfW = (W - gap * 3) / 2;
  drawReturnMap(gap, gap, halfW, H - gap * 2);
  drawWindow(gap * 2 + halfW, gap, halfW, H - gap * 2);

  requestAnimationFrame(draw);
}

// ─── helpers ──────────────────────────────────────────────────
function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }
function rr(x, y, w, h, rad) {
  ctx.beginPath(); ctx.moveTo(x + rad, y);
  ctx.arcTo(x + w, y, x + w, y + h, rad); ctx.arcTo(x + w, y + h, x, y + h, rad);
  ctx.arcTo(x, y + h, x, y, rad); ctx.arcTo(x, y, x + w, y, rad); ctx.closePath();
}
function hexA(hex, a) {
  const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${a})`;
}

// ─── controls ─────────────────────────────────────────────────
const psiEl = document.getElementById('psi');
const logNEl = document.getElementById('logN');
const rEl = document.getElementById('rr');
const verdict = document.getElementById('verdict');

function updateVerdict() {
  const reg = regime();
  let txt, col;
  if (reg === 'stable') { txt = 'STABLE'; col = C_STABLE; }
  else if (reg === 'critical') { txt = 'EDGE OF CHAOS'; col = C_CRIT; }
  else { txt = 'RUNAWAY'; col = C_RUN; }
  verdict.textContent = txt;
  verdict.style.background = col;
}
function syncReadouts() {
  document.getElementById('psiVal').textContent = (psi >= 0 ? '+' : '') + psi.toFixed(2);
  const nn = N();
  document.getElementById('nVal').textContent = nn >= 1000 ? (nn / 1000).toFixed(1) + 'k' : Math.round(nn);
  document.getElementById('rVal').textContent = r.toFixed(2);
}
function resetIterate() { e = 0.18; cobweb.length = 0; }

function refresh() {
  psi = parseFloat(psiEl.value); logN = parseFloat(logNEl.value); r = parseFloat(rEl.value);
  syncReadouts(); resetIterate(); updateVerdict();
}
psiEl.addEventListener('input', refresh);
logNEl.addEventListener('input', refresh);
rEl.addEventListener('input', refresh);
document.getElementById('kick').addEventListener('click', () => { e = (e >= 0 ? -1 : 1) * 0.5; });

// presets: one click drops the loop into a named regime for the talk
function applyPreset(p, n, rr_) {
  psiEl.value = String(p); logNEl.value = String(n); rEl.value = String(rr_);
  refresh();
}
// Stable: psi<0 so K_N<1; slope = r−K_N ≈ −0.41 - a clearly visible contracting
// staircase spiralling into the origin (blue, fades). Op point sits in the viable band.
document.getElementById('pStable').addEventListener('click', () => applyPreset(-0.06, 2.0, 0.35));
// Edge of chaos: tuned so K_N ≈ K_c = r+1 = 1.40, i.e. slope ≈ −1.00 (gold) - the S-curve
// sits tangent to the diagonal, right on the flip wall. (psi=0.16, N≈8, r=0.40.)
document.getElementById('pEdge').addEventListener('click', () => applyPreset(0.16, 0.92, 0.40));

refresh();
requestAnimationFrame(draw);
</script>
</body>
</html>
