<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Model, on One Loop</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { width: 100%; height: 100%; overflow: hidden; }   /* deck frame is fixed-height: never scroll */
  body {
    background: #0a0d12;
    color: #c8cad0;
    font-family: 'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    display: flex; flex-direction: column;
  }

  /* thin control strip - the only chrome; the slide carries the title */
  .bar {
    flex: 0 0 auto;
    display: flex; align-items: center; justify-content: center; flex-wrap: nowrap;
    gap: 14px; padding: 8px 14px;
    background: rgba(255,255,255,0.04);
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }
  .seg { display: inline-flex; border: 1px solid rgba(255,255,255,0.14); border-radius: 6px; overflow: hidden; }
  .seg button {
    background: transparent; border: 0; color: #aeb4c2;
    padding: 5px 13px; font-size: 12px; cursor: pointer; white-space: nowrap; font-family: inherit;
  }
  .seg button + button { border-left: 1px solid rgba(255,255,255,0.14); }
  .seg button:hover:not(:disabled) { background: rgba(255,255,255,0.07); }
  .seg button:disabled { opacity: 0.35; cursor: default; }
  .seg button.play.on { background: rgba(201,169,110,0.22); color: #eef1f6; }

  /* the step rail: one pip per step, the active one lit, click to jump */
  .pips { display: inline-flex; align-items: center; gap: 7px; }
  .pip {
    width: 9px; height: 9px; border-radius: 50%;
    background: rgba(255,255,255,0.16); border: 1px solid rgba(255,255,255,0.10);
    cursor: pointer; padding: 0; transition: background .15s, transform .15s;
  }
  .pip:hover { transform: scale(1.25); }
  .pip.on { background: #c9a96e; border-color: #c9a96e; box-shadow: 0 0 7px rgba(201,169,110,0.7); }
  .pip.done { background: rgba(201,169,110,0.45); border-color: rgba(201,169,110,0.4); }
  .counter { font-size: 12px; color: #8b92a1; font-variant-numeric: tabular-nums; min-width: 3.4em; text-align: center; }

  .stage { position: relative; flex: 1 1 auto; min-height: 0; }
  canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
</style>
</head>
<body>

<div class="bar">
  <div class="seg">
    <button id="prevBtn">&#8592; back</button>
    <button id="nextBtn">step &#8594;</button>
  </div>
  <div class="pips" id="pips"></div>
  <span class="counter" id="counter">1 / 8</span>
  <div class="seg">
    <button id="playBtn" class="play">&#9654; play</button>
  </div>
</div>

<div class="stage" id="stage">
  <canvas id="cv"></canvas>
</div>

<script>
"use strict";
// ─── palette (shared with the rest of the deck) ────────────────────────────
const BG    = '#0a0d12';
const INK   = '#e6e8ee';
const MUTED = '#8b92a1';
const DIM   = 'rgba(255,255,255,0.22)';
const FAINT = 'rgba(255,255,255,0.10)';
// the four legs of the loop - the SAME colours the adaptive-loop applet uses,
// so furniture and figure read as one object across the deck.
const C_CTRL  = '#e8a84c';   // theta  - slow control / variational principle - gold
const C_ENV   = '#d4826a';   // h=Pi(theta) - the generated environment / endogeneity - vermilion
const C_STATE = '#7ec4a5';   // N fast parts relaxing to rho_h - green
const C_MEAS  = '#5cacee';   // m = <O> - coarse delayed measurement - blue
const C_GAIN  = '#c9a96e';   // the assembled object: gain K_N, return map - warm gold

const FONT = '"Segoe UI", system-ui, -apple-system, sans-serif';
// a serif italic for the maths variables reads as "equation", not UI text
const MFONT = "'Cambria Math','Georgia',serif";

// ─── canvas (crisp at any DPR; the 2x render is sharp) ─────────────────────
const stage = document.getElementById('stage');
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
let W_=0, H_=0, DPR=1;
function resize(){
  DPR = Math.max(1, window.devicePixelRatio || 1);
  const r = stage.getBoundingClientRect();
  W_ = Math.max(1, Math.round(r.width));
  H_ = Math.max(1, Math.round(r.height));
  cv.width  = Math.round(W_*DPR);
  cv.height = Math.round(H_*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
  layout();
}
window.addEventListener('resize', resize);
// the iframe box can change after load (lazy reveal, layout settle, presenter
// zoom) with NO resize event - observe the stage element directly and re-fit.
if (window.ResizeObserver) new ResizeObserver(resize).observe(stage);

// crisp text on the device-pixel grid (round to integer CSS px)
function text(str, x, y, font, fill, align, baseline){
  ctx.font = font; ctx.fillStyle = fill;
  ctx.textAlign = align||'left'; ctx.textBaseline = baseline||'alphabetic';
  ctx.fillText(str, Math.round(x), Math.round(y));
}
function rr(x,y,w,h,rad){ rad=Math.min(rad,w/2,h/2);
  ctx.beginPath(); ctx.moveTo(x+rad,y);
  ctx.arcTo(x+w,y,x+w,y+h,rad); ctx.arcTo(x+w,y+h,x,y+h,rad);
  ctx.arcTo(x,y+h,x,y,rad); ctx.arcTo(x,y,x+w,y,rad); ctx.closePath();
}
function hexA(hex,a){ const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return `rgba(${r},${g},${b},${a})`; }

// ─── the steps - the spine of the walkthrough ──────────────────────────────
// Each step names the part of the loop it lights, the leg(s) it lights, and the
// equation + role revealed in the right-hand panel. Steps 0-4 walk the loop;
// 5-7 ASSEMBLE the fixed point, the linearisation, and the return map.
//
// id  : which node is the FOCUS ('theta'|'h'|'state'|'m'|'feedback'|null)
// legs: which of the 4 arcs to light (0:theta->h, 1:h->state, 2:state->m, 3:m->theta)
const STEPS = [
  {
    key:'theta', focus:'theta', legs:[], col:C_CTRL,
    kicker:'THE SLOW CONTROL',
    title:'θ - the global variational principle',
    eqs:[
      {t:'θ descends a single scalar action', s:0},
      {m:'F[θ ; m]  =  ½ ‖ m − Ô(θ) ‖²', big:1},
      {t:'the slow scale does not pick an action and does not set the macro-state - it descends F', s:1},
    ],
    role:'The slow degrees of freedom. One Lyapunov candidate, so every non-equilibrium effect comes from delay and noise downstream, never from the slow law itself.'
  },
  {
    key:'h', focus:'h', legs:[0], col:C_ENV,
    kicker:'THE ONE DEFINING ARROW',
    title:'h = Π(θ) - the environment it generates',
    eqs:[
      {t:'the control reaches the fast scale ONLY through the field it makes', s:0},
      {m:'h  =  Π(θ)', big:1},
      {t:'endogeneity (A5): no fixed external drive - the system cannot step outside the field it is making', s:1},
    ],
    role:'This single arrow is what makes the loop adaptive rather than driven. Everything downstream is its consequence.'
  },
  {
    key:'state', focus:'state', legs:[1], col:C_STATE,
    kicker:'THE LOW-LEVEL EXPECTATION',
    title:'N fast parts relax to ρₕ',
    eqs:[
      {t:'within a period T the field is held fixed - the parts relax toward ρₕ', s:0},
      {m:'ẋ  =  −∇ₓ V(x ; h) + √(2D) η        ρₕ  ∝  e^(−V/D)', big:1},
      {m:'relaxation time τ  →  memory factor   r = e^(−T/τ)', s:1, col:C_STATE},
    ],
    role:'For each fixed h the stationary measure ρₕ is reached ergodically (FP1). T ≫ τ ⇒ r→0 (a fresh read). T ≪ τ ⇒ r→1 (a stale read).'
  },
  {
    key:'m', focus:'m', legs:[2], col:C_MEAS,
    kicker:'THE COARSE, DELAYED MEASUREMENT',
    title:'m = ⟨O⟩',
    eqs:[
      {t:'one scalar functional of the microstate is fed back', s:0},
      {m:'mₖ  =  ⟨O⟩ + N^(−½) ξₖ ,        ξₖ = O(1)', big:1},
      {t:'coarse (blind to all of ρₕ orthogonal to O), delayed (read once per period), finite-N (√N sampling noise)', s:1},
    ],
    role:'A3. The feedback sees only this projection. The N⁻½ fluctuation and the one-period delay are the two ingredients that can destabilise an otherwise stable loop.'
  },
  {
    key:'feedback', focus:'theta', legs:[3], col:C_CTRL, closeLoop:true,
    kicker:'CLOSE THE LOOP - THE PERIODIC UPDATE',
    title:'θₖ₊₁ = θₖ + α g eₖ',
    eqs:[
      {t:'gradient descent of F on the measured mismatch closes the loop', s:0},
      {m:'θₖ₊₁  =  θₖ − α ∂θ F  =  θₖ + α g eₖ', big:1},
      {m:'mismatch  eₖ = mₖ − Ô(θₖ) ,    g := ∂θÔ|★', s:1, col:C_CTRL},
    ],
    role:'Every period T: relax under the old field → measure → step θ → set the new field. The ordered timing is what gives a clean coefficient with no rα cross-term.'
  },
  // ─── ASSEMBLE ────────────────────────────────────────────────────────────
  {
    key:'fp2', focus:'all', legs:[0,1,2,3], col:C_GAIN, assemble:'fp2',
    kicker:'ASSEMBLE · THE SELF-CONSISTENT FIXED POINT',
    title:'FP2 :  m(θ★) = Ô(θ★)',
    eqs:[
      {t:'the loop closes on a fixed point where the mandate is consistent with the statistics it induces', s:0},
      {m:'m(θ★) = Ô(θ★) ,      ∂θ F = 0 ,      e★ = 0', big:1},
      {m:'self-consistency:   g = ∂θÔ|★ = χₙ Πʹ(θ★)', s:1, col:C_GAIN},
    ],
    role:'The phases are the stability types of FP2. The one non-trivial input: Ô IS the model’s prediction of ⟨O⟩, so both θ-derivatives equal g at the fixed point.'
  },
  {
    key:'linearise', focus:'all', legs:[0,1,2,3], col:C_GAIN, assemble:'lin',
    kicker:'ASSEMBLE · LINEARISE ABOUT FP2',
    title:'three relations, one elimination',
    eqs:[
      {m:'(F)   δmₖ₊₁ = r δmₖ + (1−r) g δθₖ', s:0, col:C_STATE},
      {m:'(S)   δθₖ₊₁ = δθₖ + α g eₖ', s:0, col:C_CTRL},
      {m:'(E)   eₖ = δmₖ − g δθₖ', s:0, col:C_MEAS},
      {t:'eliminate the fast mode - eₖ₊₁ = δmₖ₊₁ − g δθₖ₊₁ collapses in three lines:', s:1},
      {m:'= r(δmₖ − gδθₖ) − α g² eₖ  =  (r − αχₙg) eₖ', s:2, col:C_GAIN},
    ],
    role:'xₖ₊₁ (the fast partial-relaxation update) and r both come straight from the fixed point. The fast variable eliminates exactly - no asserted map, a derived one.'
  },
  {
    key:'returnmap', focus:'all', legs:[0,1,2,3], col:C_GAIN, assemble:'map',
    kicker:'THE RETURN MAP - EMERGED FROM THE LOOP',
    title:'one 1-D map for the mismatch',
    eqs:[
      {m:'eₖ₊₁ = (r − Kₙ) eₖ − α cₙ eₖ³', big:1, col:C_GAIN},
      {m:'loop gain   Kₙ = α χₙ g', s:0, col:C_GAIN},
      {m:'r : fast relaxation   ·   χₙ, g : measurement + field   ·   α : slow law', s:1},
      {t:'Γ = ℤ₂ forbids the quadratic → leading term cubic. Stable while Kₙ < r+1, a supercritical flip at the edge.', s:1},
    ],
    role:'Every symbol traced to its part of the loop. The map was derived from the four legs and their fixed point, not decreed.'
  },
];
const NSTEP = STEPS.length;
let step = 0;
let appear = 0;           // 0..1 reveal progress of the current step's panel rows
const APPEAR_RATE = 0.055;

// ─── layout: computed from the box so nothing ever collides ────────────────
// LEFT zone: the persistent four-node loop (the spine). RIGHT zone: the panel
// that reveals the active step's equations + role. A return-map inset replaces
// the lower-left during the ASSEMBLE steps so the cobweb shares the frame.
let L = null;
function layout(){
  if (!W_ || !H_) return;
  const pad = 18;
  const splitX = Math.round(W_ * 0.515);
  const loopBox  = { x: pad, y: pad, w: splitX - pad - 8, h: H_ - 2*pad };
  const panelBox = { x: splitX + 8, y: pad, w: W_ - pad - (splitX + 8), h: H_ - 2*pad };

  // loop ring geometry inside loopBox
  const cx = loopBox.x + loopBox.w/2;
  const cy = loopBox.y + loopBox.h*0.46;
  const R  = Math.min(loopBox.w*0.34, loopBox.h*0.30);
  // node order: theta top, h right, state bottom, m left
  const ang = [-Math.PI/2, 0, Math.PI/2, Math.PI];
  const nodeKey = ['theta','h','state','m'];
  const nodeCol = [C_CTRL, C_ENV, C_STATE, C_MEAS];
  const nodes = ang.map((a,i)=>({ a, x: cx+R*Math.cos(a), y: cy+R*Math.sin(a), key:nodeKey[i], col:nodeCol[i] }));

  L = { pad, loopBox, panelBox, cx, cy, R, nodes,
        nodeR: Math.max(9, Math.min(15, R*0.16)) };
}

// ─── node glyphs + descriptors (short, sit beside the node) ────────────────
const NODE_META = {
  theta: { glyph:'θ',      sub:'slow control',     col:C_CTRL  },
  h:     { glyph:'h=Π(θ)', sub:'environment',  col:C_ENV   },
  state: { glyph:'ρₕ', sub:'N fast parts',     col:C_STATE },
  m:     { glyph:'m=⟨O⟩', sub:'measurement',   col:C_MEAS  },
};
// the four legs, each with its driving label drawn at the arc midpoint
const LEG_LABEL = ['Π', 'relax → ρₕ', 'measure', 'α g eₖ'];

// ─── the loop spine (always drawn; focus/dim by step) ──────────────────────
function drawLoop(t){
  const s = STEPS[step];
  const focusAll = (s.focus === 'all');
  const cx=L.cx, cy=L.cy, R=L.R;

  // section caption above the ring - which part we are on (minimal, one line)
  text('THE ADAPTIVE LOOP', L.loopBox.x, L.loopBox.y + 2, '600 11px '+FONT, MUTED, 'left', 'top');
  // F[theta] descent annotation near theta when it (or all) is active
  // ── arcs ──
  for(let i=0;i<4;i++){
    let a0=L.nodes[i].a, a1=L.nodes[(i+1)%4].a; if(a1<a0) a1+=2*Math.PI;
    const lit = s.legs.includes(i) || focusAll;
    const isEndo = (i===0);          // theta -> h is the endogeneity arrow
    const isFeed = (i===3);          // m -> theta closes the loop
    let col = lit ? (i===0?C_ENV : i===1?C_STATE : i===2?C_MEAS : C_CTRL) : DIM;
    if (focusAll) col = hexA(C_GAIN, 0.55);
    ctx.strokeStyle = lit ? col : DIM;
    ctx.lineWidth = lit ? 3.2 : 1.6;
    // the endogeneity arrow gets a touch more weight whenever it is lit
    if (lit && isEndo && !focusAll) ctx.lineWidth = 3.8;
    ctx.setLineDash([]);
    ctx.beginPath(); ctx.arc(cx,cy,R,a0,a1); ctx.stroke();
    // arrowhead at a1
    const hx=cx+R*Math.cos(a1), hy=cy+R*Math.sin(a1), tg=a1+Math.PI/2;
    ctx.fillStyle = lit ? col : DIM;
    const hl = lit ? 11 : 8;
    ctx.beginPath(); ctx.moveTo(hx,hy);
    ctx.lineTo(hx-hl*Math.cos(tg-0.42), hy-hl*Math.sin(tg-0.42));
    ctx.lineTo(hx-hl*Math.cos(tg+0.42), hy-hl*Math.sin(tg+0.42)); ctx.closePath(); ctx.fill();
    // travelling pulse on a lit leg (gentle), only on the single active leg of a walk step
    if (lit && !focusAll && s.legs.length===1 && s.legs[0]===i){
      const ph = (t*0.55)%1; const ad=a0+(a1-a0)*ph;
      const px=cx+R*Math.cos(ad), py=cy+R*Math.sin(ad);
      ctx.fillStyle=col; ctx.shadowColor=col; ctx.shadowBlur=12;
      ctx.beginPath(); ctx.arc(px,py,4.4,0,7); ctx.fill(); ctx.shadowBlur=0;
    }
    // leg label at the arc midpoint, pushed OUTSIDE the ring so it never crosses
    // a node. ONLY during the walk steps - by the ASSEMBLE phase the loop is
    // established, the centre carries Kₙ, and the labels would crowd the cobweb.
    if (lit && !focusAll){
      const am=(a0+a1)/2; const lr=R+20;
      const lxp=cx+lr*Math.cos(am), lyp=cy+lr*Math.sin(am);
      const co=Math.cos(am), si=Math.sin(am);
      ctx.save();
      text(LEG_LABEL[i], lxp, lyp,
           'italic 11.5px '+FONT, col,
           co<-0.35?'right':(co>0.35?'left':'center'),
           si<-0.35?'bottom':(si>0.35?'top':'middle'));
      ctx.restore();
    }
  }

  // ── nodes ──
  for(const n of L.nodes){
    const meta = NODE_META[n.key];
    const active = (!focusAll && s.focus===n.key) || focusAll;
    const dim = !active;
    const r = L.nodeR * (active && !focusAll ? 1.18 : 1.0);
    // halo on the focused node (a step-keyed glow that breathes)
    if (active && !focusAll){
      const pul = 0.5 + 0.5*Math.sin(t*2.4);
      ctx.fillStyle = hexA(n.col, 0.10 + 0.10*pul);
      ctx.beginPath(); ctx.arc(n.x, n.y, r*2.3, 0, 7); ctx.fill();
    }
    ctx.fillStyle = BG;
    ctx.strokeStyle = dim ? DIM : n.col;
    ctx.lineWidth = active ? 3 : 1.8;
    ctx.beginPath(); ctx.arc(n.x, n.y, r, 0, 7); ctx.fill(); ctx.stroke();
    // glyph inside the node
    text(meta.glyph, n.x, n.y, (active?'600 ':'')+'13px '+MFONT,
         dim?MUTED:n.col, 'center', 'middle');
    // descriptor beside the node, anchored radially so it never crosses the ring
    const co=Math.cos(n.a), si=Math.sin(n.a);
    const dx=n.x+co*(r+12), dy=n.y+si*(r+12);
    text(meta.sub, dx, dy, (active?'600 ':'')+'11px '+FONT,
         dim?'rgba(139,146,161,0.55)':INK,
         co<-0.35?'right':(co>0.35?'left':'center'),
         si<-0.35?'bottom':(si>0.35?'top':'middle'));
  }

  // ── centre annotation: F[theta] descent, or the assembled label ──
  if (focusAll){
    // during ASSEMBLE the centre carries the object being built
    const lbl = STEPS[step].assemble==='fp2' ? 'e★ = 0' :
                STEPS[step].assemble==='lin' ? 'eliminate\nfast mode' :
                'Kₙ = αχₙg';
    ctx.save();
    ctx.globalAlpha = 0.4 + 0.6*appear;
    const lines = lbl.split('\n');
    lines.forEach((ln,i)=>{
      text(ln, cx, cy - (lines.length-1)*9 + i*18, '600 14px '+MFONT, hexA(C_GAIN,0.95), 'center', 'middle');
    });
    ctx.restore();
  } else if (step===0){
    // theta descending F - a tiny down-gradient glyph in the ring centre
    text('descends', cx, cy-8, 'italic 11px '+FONT, hexA(C_CTRL,0.7), 'center', 'middle');
    text('F[θ]', cx, cy+9, '600 14px '+MFONT, hexA(C_CTRL,0.95), 'center', 'middle');
  } else if (step===1){
    text('the one', cx, cy-8, 'italic 10.5px '+FONT, hexA(C_ENV,0.7), 'center', 'middle');
    text('arrow', cx, cy+8, 'italic 11px '+FONT, hexA(C_ENV,0.85), 'center', 'middle');
  }

  // ── the periodic-update refrain under the ring (walk steps only; the cobweb
  //    owns this vertical space during ASSEMBLE) ──
  if (!focusAll){
    const ny = cy + R + 46;
    text('every period T :   relax  →  measure  →  update θ  →  new field',
         cx, ny, 'italic 11px '+FONT, hexA('#ffffff', step===4?0.5:0.22), 'center', 'top');
  }

  // ── during ASSEMBLE: a return-map cobweb inset bottom-left of the loop box ──
  if (focusAll) drawCobweb();
}

// ─── the return-map cobweb (lives in the loop box during ASSEMBLE) ─────────
// e_{k+1} = (r - K_N) e_k - alpha c_N e_k^3.  We iterate it live so the audience
// sees the SAME object the equations just produced behaving as a 1-D map.
let cob = { e: 0.30, hist: [] };
const COB_R = 0.55;          // memory factor r used in the live demo
// The demo map is the supercritical-flip normal form with its natural saturation:
//   e_{k+1} = -A tanh(g e),   linear coefficient (r - K_N) = -A g,
// whose Taylor series is  (r-K_N) e + (A g^3/3) e^3 - ...  i.e. exactly the spine's
//   e_{k+1} = (r - K_N) e - alpha c_N e^3 + O(e^5),  c_N>0 (supercritical).
// The tanh is the honest resummation of that "+ O(e^5)": the bare cubic truncation
// diverges past the flip, the real bounded loop saturates into a finite 2-cycle.
// K_N per assemble step tells the right story:
//  fp2 / lin -> K_N < r+1  (lambda = -0.85): stable spiral to e*=0
//  map       -> K_N > r+1  (lambda = -1.10): a STABLE bounded period-2 ring (the flip)
function cobLambda(){ return (STEPS[step].assemble==='map') ? -1.10 : -0.85; }   // = r - K_N
function cobK(){ return COB_R - cobLambda(); }                                    // implied loop gain
const COB_A = 1.08;          // saturation amplitude -> 2-cycle sits at a legible ~|0.42|
function cobMap(e){ const g = -cobLambda()/COB_A; return -COB_A*Math.tanh(g*e); }

function drawCobweb(){
  const b = L.loopBox;
  const w = Math.min(b.w*0.46, 210), h = w;       // square
  const x = b.x + 6, y = b.y + b.h - h - 6;
  // frame
  rr(x+0.5, y+0.5, w-1, h-1, 8);
  ctx.fillStyle = 'rgba(255,255,255,0.018)'; ctx.fill();
  ctx.strokeStyle = FAINT; ctx.lineWidth = 1; ctx.stroke();
  text('the map, iterating', x+10, y+8, '600 10.5px '+FONT, hexA(C_GAIN,0.9), 'left', 'top');

  const m = 22;
  const ax=x+m, ay=y+m+8, aw=w-m-12, ah=h-m-20;
  const E=0.9;                       // plot window [-E, E]
  const sx=e=> ax + (e+E)/(2*E)*aw;
  const sy=e=> ay+ah - (e+E)/(2*E)*ah;
  // axes
  ctx.strokeStyle='rgba(255,255,255,0.14)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(sx(-E),sy(0)); ctx.lineTo(sx(E),sy(0)); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(sx(0),sy(-E)); ctx.lineTo(sx(0),sy(E)); ctx.stroke();
  // identity line e_{k+1}=e_k
  ctx.strokeStyle='rgba(255,255,255,0.18)'; ctx.setLineDash([3,3]);
  ctx.beginPath(); ctx.moveTo(sx(-E),sy(-E)); ctx.lineTo(sx(E),sy(E)); ctx.stroke(); ctx.setLineDash([]);
  // the map curve
  ctx.strokeStyle=hexA(C_GAIN,0.95); ctx.lineWidth=2; ctx.beginPath();
  for(let i=0;i<=120;i++){ const e=-E+(i/120)*2*E; const X=sx(e), Y=sy(Math.max(-E,Math.min(E,cobMap(e))));
    i?ctx.lineTo(X,Y):ctx.moveTo(X,Y); }
  ctx.stroke();
  // cobweb staircase from the live orbit
  ctx.strokeStyle=hexA(C_MEAS,0.85); ctx.lineWidth=1.3;
  ctx.beginPath();
  let e=cob.hist.length?cob.hist[0]:cob.e;
  ctx.moveTo(sx(e), sy(0));
  for(let i=1;i<cob.hist.length;i++){ const en=cob.hist[i];
    ctx.lineTo(sx(e), sy(en));   // vertical to the curve
    ctx.lineTo(sx(en), sy(en));  // horizontal to identity
    e=en; }
  ctx.stroke();
  // current point
  const ecur = cob.hist.length?cob.hist[cob.hist.length-1]:cob.e;
  ctx.fillStyle=C_MEAS; ctx.shadowColor=C_MEAS; ctx.shadowBlur=8;
  ctx.beginPath(); ctx.arc(sx(ecur), sy(cobMap(ecur)), 3.2, 0, 7); ctx.fill(); ctx.shadowBlur=0;
  // axis labels
  text('eₖ', sx(E), sy(0)-3, 'italic 10px '+FONT, MUTED, 'right', 'bottom');
  text('eₖ₊₁', sx(0)+4, sy(E), 'italic 10px '+FONT, MUTED, 'left', 'top');
  // verdict line under the inset
  const verdict = STEPS[step].assemble==='map'
    ? 'Kₙ > r+1 :  flip to a two-cycle'
    : 'Kₙ < r+1 :  spirals to e★ = 0';
  const vcol = STEPS[step].assemble==='map' ? C_ENV : C_STATE;
  text(verdict, x+w/2, y+h+2, '600 10px '+FONT, vcol, 'center', 'top');
}

// ─── the right-hand panel: kicker, title, staged equations, role ───────────
function drawPanel(){
  const b = L.panelBox, s = STEPS[step];
  // panel frame, tinted faintly to the step colour
  rr(b.x+0.5, b.y+0.5, b.w-1, b.h-1, 12);
  ctx.fillStyle = hexA(s.col, 0.05); ctx.fill();
  ctx.strokeStyle = hexA(s.col, 0.42); ctx.lineWidth = 1.4; ctx.stroke();

  const px = b.x + 26;
  let yy = b.y + 26;
  const innerW = b.w - 52;

  // step index chip, top-right
  text((step+1)+' / '+NSTEP, b.x+b.w-16, b.y+16, '600 11px '+FONT, hexA(s.col,0.8), 'right', 'top');

  // kicker
  text(s.kicker, px, yy, '700 11.5px '+FONT, hexA(s.col,0.95), 'left', 'top');
  yy += 22;
  // title (the headline equation / phrase) - wrap if needed
  yy = drawWrapped(s.title, px, yy, innerW-40, '600 '+titleSize(s.title)+'px '+MFONT, INK, 7);
  yy += 14;
  // divider
  ctx.strokeStyle = hexA(s.col,0.25); ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(px, yy); ctx.lineTo(px+innerW, yy); ctx.stroke();
  yy += 20;

  // staged equation rows - revealed progressively by `appear`
  // each row has a reveal threshold so rows cascade in as the step settles
  const rows = s.eqs;
  for(let i=0;i<rows.length;i++){
    const thr = i/(rows.length+0.5);
    const a = Math.max(0, Math.min(1, (appear - thr) / 0.32));
    if (a <= 0.02) continue;
    ctx.save(); ctx.globalAlpha = a;
    const dx = px + (1-a)*10;       // slide in slightly
    const r = rows[i];
    if (r.m){
      // a maths line: bigger, serif, in the row's colour (default panel colour)
      const fs = r.big ? bigEqSize(r.m, innerW) : 17;
      const col = r.col || INK;
      // a faint card behind the headline equation so it reads as the result
      if (r.big){
        const tw = measure(r.m, '600 '+fs+'px '+MFONT);
        const ch = fs*1.7;
        rr(px-10, yy-6, Math.min(innerW+18, tw+28), ch, 7);
        ctx.fillStyle = hexA(s.col, 0.10); ctx.fill();
        ctx.strokeStyle = hexA(s.col, 0.30); ctx.lineWidth=1; ctx.stroke();
        text(r.m, dx, yy + ch/2 - 6, '600 '+fs+'px '+MFONT, col, 'left', 'middle');
        yy += ch + 14;
      } else {
        yy = drawWrapped(r.m, dx, yy, innerW, '500 '+fs+'px '+MFONT, col, 8);
        yy += 12;
      }
    } else {
      // a prose line: smaller, sans, muted (the "why / role" connective tissue)
      yy = drawWrapped(r.t, dx, yy, innerW, '13px '+FONT, r.s===1?'#b9bfca':MUTED, 7);
      yy += 12;
    }
    ctx.restore();
  }

  // role box, pinned to the foot of the panel
  const roleH = 92;
  const roy = b.y + b.h - roleH - 16;
  ctx.save();
  ctx.globalAlpha = Math.max(0, Math.min(1, (appear-0.55)/0.4));
  rr(px-12, roy, innerW+24, roleH, 9);
  ctx.fillStyle = hexA(s.col, 0.07); ctx.fill();
  ctx.strokeStyle = hexA(s.col, 0.22); ctx.lineWidth=1; ctx.stroke();
  text(s.assemble ? 'WHY IT MATTERS' : 'ROLE', px+4, roy+12, '700 10px '+FONT, hexA(s.col,0.85), 'left', 'top');
  drawWrapped(s.role, px+4, roy+30, innerW+8, '12.5px '+FONT, '#c2c8d2', 6);
  ctx.restore();
}

// title font shrinks for long equation titles so they never wrap awkwardly
function titleSize(str){ return str.length > 34 ? 19 : (str.length > 24 ? 21 : 23); }
function bigEqSize(str, w){
  // shrink the headline maths to fit the inner width
  let fs = 22;
  while (fs > 13 && measure(str, '600 '+fs+'px '+MFONT) > w-6) fs -= 1;
  return fs;
}
function measure(str, font){ ctx.font=font; return ctx.measureText(str).width; }

// word-wrap helper - returns the new y after drawing
function drawWrapped(str, x, y, maxW, font, fill, lineGap){
  ctx.font = font;
  const words = str.split(' ');
  let line = '', yy = y;
  const lh = parseInt(font.match(/(\d+)px/)[1],10) + (lineGap||6);
  for (let n=0;n<words.length;n++){
    const test = line ? line+' '+words[n] : words[n];
    if (ctx.measureText(test).width > maxW && line){
      text(line, x, yy, font, fill, 'left', 'top'); yy += lh; line = words[n];
    } else line = test;
  }
  if (line) { text(line, x, yy, font, fill, 'left', 'top'); yy += lh; }
  return yy;
}

// ─── frame loop ────────────────────────────────────────────────────────────
let prev = performance.now();
let tSec = 0;
function frame(now){
  let dt = (now-prev)/1000; prev = now; dt = Math.min(0.05, dt);
  tSec += dt;
  // settle the panel reveal
  if (appear < 1) appear = Math.min(1, appear + APPEAR_RATE);

  // advance the live cobweb orbit during ASSEMBLE steps
  if (STEPS[step].focus==='all'){
    // step the map a few times per second so the staircase grows watchably
    cob._acc = (cob._acc||0) + dt;
    const period = 0.34;
    while (cob._acc > period){
      cob._acc -= period;
      if (!cob.hist.length) cob.hist.push(cob.e);
      let last = cob.hist[cob.hist.length-1];
      let nx = cobMap(last);
      // the tanh map self-bounds; a light safety clamp at the plot edge only
      nx = Math.max(-0.88, Math.min(0.88, nx));
      cob.hist.push(nx);
      // keep the staircase legible: a rolling window of recent steps, so the
      // stable case shows a tight spiral and the flip shows a clean 2-box loop
      if (cob.hist.length > 46) cob.hist.shift();
    }
  }

  // autoplay
  if (playing){
    playAcc += dt;
    if (playAcc > PLAY_DWELL){ playAcc = 0; if (step < NSTEP-1) gotoStep(step+1); else setPlaying(false); }
  }

  ctx.clearRect(0,0,W_,H_);
  ctx.fillStyle = BG; ctx.fillRect(0,0,W_,H_);
  if (!L) layout();
  if (L){ drawLoop(tSec); drawPanel(); }
  requestAnimationFrame(frame);
}

// ─── stepping + controls ───────────────────────────────────────────────────
function resetCobweb(){ cob.hist = []; cob.e = 0.30; cob._acc = 0; }
function gotoStep(i){
  step = Math.max(0, Math.min(NSTEP-1, i));
  appear = 0;
  if (STEPS[step].focus==='all') resetCobweb();
  syncBar();
}
const prevBtn=document.getElementById('prevBtn'), nextBtn=document.getElementById('nextBtn');
const playBtn=document.getElementById('playBtn'), counter=document.getElementById('counter');
const pipsEl=document.getElementById('pips');
// build pips
for(let i=0;i<NSTEP;i++){
  const p=document.createElement('button'); p.className='pip'; p.title='step '+(i+1);
  p.addEventListener('click',()=>{ setPlaying(false); gotoStep(i); });
  pipsEl.appendChild(p);
}
function syncBar(){
  counter.textContent = (step+1)+' / '+NSTEP;
  prevBtn.disabled = (step===0);
  nextBtn.disabled = (step===NSTEP-1);
  [...pipsEl.children].forEach((p,i)=>{
    p.classList.toggle('on', i===step);
    p.classList.toggle('done', i<step);
  });
}
prevBtn.addEventListener('click',()=>{ setPlaying(false); gotoStep(step-1); });
nextBtn.addEventListener('click',()=>{ setPlaying(false); gotoStep(step+1); });

// autoplay
let playing=false, playAcc=0; const PLAY_DWELL=3.6;
function setPlaying(on){
  playing=on; playAcc=0;
  playBtn.classList.toggle('on', on);
  playBtn.innerHTML = on ? '❚❚ pause' : '▶ play';
  if (on && step===NSTEP-1) gotoStep(0);
}
playBtn.addEventListener('click',()=> setPlaying(!playing));

// keyboard: arrows + space, so the applet drives from the presenter remote
window.addEventListener('keydown',(e)=>{
  if (e.key==='ArrowRight' || e.key==='PageDown'){ setPlaying(false); gotoStep(step+1); e.preventDefault(); }
  else if (e.key==='ArrowLeft' || e.key==='PageUp'){ setPlaying(false); gotoStep(step-1); e.preventDefault(); }
  else if (e.key===' '){ setPlaying(!playing); e.preventDefault(); }
  else if (e.key==='Home'){ setPlaying(false); gotoStep(0); }
  else if (e.key==='End'){ setPlaying(false); gotoStep(NSTEP-1); }
});

// ─── go ────────────────────────────────────────────────────────────────────
resize();
syncBar();
requestAnimationFrame(frame);
</script>
</body>
</html>
