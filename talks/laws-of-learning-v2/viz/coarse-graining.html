<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Depth is Renormalisation Time</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: #0e1116; color: #c8cad0;
    font-family: 'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    /* fixed-viewport column: the applet fills its iframe exactly, never scrolls */
    display: flex; flex-direction: column; overflow: hidden;
    padding: 12px 14px 10px;
  }
  /* one slim header line only - the slide caption carries the full explanation */
  .head {
    flex: 0 0 auto; display: flex; align-items: baseline; justify-content: center;
    gap: 0.5rem; margin-bottom: 8px; white-space: nowrap;
  }
  .head .t { font-size: 0.92rem; font-weight: 600; color: #e6e8ee; letter-spacing: 0.01em; }
  .head .s { font-size: 0.82rem; color: #7a8190; }
  .head .s b { color: #c9a96e; font-weight: 600; font-style: normal; }

  .canvas-wrap {
    flex: 1 1 auto; position: relative; width: 100%; min-height: 0;
    border-radius: 6px; overflow: hidden; background: #0a0d12;
    box-shadow: 0 2px 22px rgba(0,0,0,0.45);
  }
  canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

  .controls {
    flex: 0 0 auto;
    display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 1.25rem;
    margin-top: 9px; padding: 0.45rem 0.9rem; background: rgba(255,255,255,0.04); border-radius: 6px;
  }
  .controls label { display: flex; align-items: center; gap: 0.5rem; font-size: 0.8rem; white-space: nowrap; }
  .controls input[type="range"] { width: 132px; accent-color: #6b8aaf; }
  .controls .val { display: inline-block; min-width: 2.6em; text-align: right; color: #9ba2b0; font-variant-numeric: tabular-nums; }
  .controls button {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
    color: #c8cad0; padding: 0.32rem 0.78rem; border-radius: 4px; font-size: 0.8rem; cursor: pointer;
  }
  .controls button:hover { background: rgba(255,255,255,0.13); }
  .controls button.active { border-color: #6b8aaf; background: rgba(107,138,175,0.18); color: #e6e8ee; }
</style>
</head>
<body>

<div class="head">
  <span class="t">Depth is renormalisation time</span>
  <span class="s">- one level is one coarse-graining step, worth a factor <b>λ₀</b></span>
</div>

<div class="canvas-wrap" id="wrap">
  <canvas id="cv"></canvas>
</div>

<div class="controls">
  <button id="autoBtn" class="active">Auto</button>
  <button id="stepBtn">Coarse-grain ▸</button>
  <button id="resetBtn">Reset</button>
  <label>group&nbsp;n
    <input type="range" id="nn" min="2" max="4" step="1" value="2">
    <span class="val" id="nnVal">2</span>
  </label>
  <label>λ₀
    <input type="range" id="lam" min="1.2" max="2.2" step="0.05" value="1.41">
    <span class="val" id="lamVal">1.41</span>
  </label>
</div>

<script>
// ─── palette (shared with the deck's applet family) ───────────────
const BG='#0a0d12', INK='#d2d5dc', MUTED='#7a8190';
const C_ATOM ='#7ec4a5';   // primitive parts - green
const C_BLOCK='#5cacee';   // coarse units - blue
const C_LAM  ='#c9a96e';   // the λ₀ factor - gold
const C_FLOOR='#7ec4a5';   // the log-N staircase - green

// ─── canvas (DPI-aware: crisp at 2x) ──────────────────────────────
const wrap=document.getElementById('wrap'), cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let W=0,H=0;
function resize(){
  const d=window.devicePixelRatio||1;
  const r=wrap.getBoundingClientRect();
  W=Math.max(1,Math.round(r.width)); H=Math.max(1,Math.round(r.height));
  cv.width=Math.round(W*d); cv.height=Math.round(H*d);
  ctx.setTransform(d,0,0,d,0,0);
}
window.addEventListener('resize',resize); resize();

// ─── state ─────────────────────────────────────────────────────────
let n=2;                 // decimation factor: group n parts into one
let lambda0=1.41;        // decimation eigenvalue R'(m*) - the per-step gain factor
const MAXL=4;            // levels of hierarchy shown
let level=0;             // completed coarse-graining steps
let anim=0;              // 0..1 progress of the step currently forming
let folding=false;
let auto=true;
let hold=0;              // dwell frames between auto steps (slow pacing)

// ─── helpers ───────────────────────────────────────────────────────
function rr(x,y,w,h,r){ r=Math.min(r,w/2,h/2); ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function hexA(hex,a){ const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return `rgba(${r},${g},${b},${a})`; }
function ease(t){ return t<0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2; }
function panel(x,y,w,h,title){
  ctx.strokeStyle='rgba(255,255,255,0.10)'; ctx.lineWidth=1; rr(x+0.5,y+0.5,w-1,h-1,7); ctx.stroke();
  ctx.fillStyle='#e6e8ee'; ctx.font='600 13px "Segoe UI",system-ui,sans-serif';
  ctx.textAlign='left'; ctx.textBaseline='top'; ctx.fillText(title, x+13, y+11);
}

// ════════════════════════════════════════════════════════════════════
//  LEFT - the self-similar decimation zoom: n parts fold into one, and
//  the camera zooms out so the new coarse unit fills the SAME box the
//  parts did. Every level looks identical - that is the RG fixed point.
// ════════════════════════════════════════════════════════════════════
//
// One "cell" is drawn recursively. A cell at recursion-depth d>0 is a
// rounded box holding n child cells of depth d-1 plus a stem joining
// them to the parent dot - so a coarse unit literally IS a shrunken
// copy of the structure beneath it. The live continuous "zoom" factor z
// scales the whole figure so that as a level forms, the view pulls back
// by exactly one grouping, landing on a frame indistinguishable from
// the one before. Self-similarity, made literal.

function drawCellOutline(cx, cy, cw, ch, depth, alpha){
  // the rounded container of a coarse unit (depth>0); primitives (depth 0) are dots
  if(depth<=0) return;
  ctx.strokeStyle=hexA(C_BLOCK, 0.22*alpha + 0.05);
  ctx.lineWidth=1.1;
  rr(cx-cw/2, cy-ch/2, cw, ch, Math.min(7, cw*0.12)); ctx.stroke();
}

// draw a self-similar cell centred at (cx,cy) spanning (cw,ch).
// depth = how many grouping levels this cell contains (0 = a primitive).
// formP = 0..1 forming progress of the OUTERMOST grouping (animates the
// newest level only); childForm passes 1 to settled inner levels.
function drawCell(cx, cy, cw, ch, depth, formP, alpha){
  if(depth<=0){
    // primitive part - a small green dot
    const rad=Math.max(1.6, Math.min(cw,ch)*0.30);
    ctx.globalAlpha=alpha; ctx.fillStyle=hexA(C_ATOM,0.9);
    ctx.beginPath(); ctx.arc(cx,cy,rad,0,7); ctx.fill(); ctx.globalAlpha=1;
    return {x:cx,y:cy};
  }
  // container of the coarse unit
  drawCellOutline(cx,cy,cw,ch,depth, alpha);
  // lay n children in a row inside the box
  const inset=cw*0.10;
  const innerW=cw-2*inset, gap=innerW*0.10/Math.max(1,n-1);
  const childW=(innerW - gap*(n-1))/n;
  const childH=ch*0.62;
  const childY=cy + ch*0.06;
  const kids=[];
  for(let i=0;i<n;i++){
    const childCx = cx - innerW/2 + childW/2 + i*(childW+gap);
    const k=drawCell(childCx, childY, childW, childH, depth-1, 1, alpha);
    kids.push(k);
  }
  // the parent dot sits at the top of this cell - the "coarse part"
  const parentY = cy - ch/2 + ch*0.14;
  const prad = Math.max(2.2, Math.min(cw,ch)*0.10);
  // stems from each child up to the parent, growing in as the level forms
  ctx.strokeStyle=hexA(C_LAM, 0.55*alpha*formP + 0.04);
  ctx.lineWidth=1.3;
  for(const k of kids){
    const ex=k.x + (cx-k.x)*ease(formP);
    const ey=k.y + (parentY-k.y)*ease(formP);
    ctx.beginPath(); ctx.moveTo(k.x, k.y); ctx.lineTo(ex,ey); ctx.stroke();
  }
  // parent dot fades/grows in
  ctx.globalAlpha=alpha*formP;
  ctx.fillStyle=BG; ctx.strokeStyle=hexA(C_BLOCK,0.95); ctx.lineWidth=1.6;
  ctx.beginPath(); ctx.arc(cx, parentY, prad*(0.6+0.4*ease(formP)), 0, 7); ctx.fill(); ctx.stroke();
  ctx.globalAlpha=1;
  return {x:cx, y:parentY};
}

function drawZoom(x,y,w,h){
  panel(x,y,w,h,'Decimation - group n parts, repeat');

  const padX=20, padTop=44, padBot=46;
  const ax=x+padX, ay=y+padTop, aw=w-2*padX, ah=h-padTop-padBot;
  const cx=ax+aw/2, cyBase=ay+ah*0.56;   // slight downward bias leaves headroom for the root dot

  // Figure and readout share ONE state so they never disagree: `shownLevel` is
  // the number of groupings currently on screen - it includes the level being
  // formed during a fold, because that structure is already drawn.
  const formingP = folding ? ease(anim) : 0;
  const shownLevel = level + (folding?1:0);
  const totalDepth = shownLevel;
  // base size of the outermost cell, fit to the panel box (height-limited so the
  // root dot always sits clearly inside the frame, never clipped by the header)
  let cw = aw*0.74, ch = ah*0.74;
  // a gentle "breathing" zoom-out anchored to forming progress - as a level forms
  // the view pulls back slightly, landing on a frame like the one before.
  const zoomK = folding ? (1.05 - 0.05*formingP) : 1.0;
  cw*=zoomK; ch*=zoomK;

  if(totalDepth===0){
    // level 0 - just the n primitive parts in a row, no grouping yet
    const count=n;
    const rowW=aw*0.7, x0=cx-rowW/2, dx=rowW/Math.max(1,count-1);
    for(let i=0;i<count;i++){
      const px=count===1?cx:x0+i*dx;
      ctx.fillStyle=hexA(C_ATOM,0.9);
      ctx.beginPath(); ctx.arc(px, cyBase, 4, 0, 7); ctx.fill();
    }
    ctx.fillStyle=hexA(C_ATOM,0.85); ctx.font='11px "Segoe UI",system-ui,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='top';
    ctx.fillText('n primitive parts', cx, cyBase+16);
  } else {
    drawCell(cx, cyBase, cw, ch, totalDepth, formingP, 1);
  }

  // ── readouts (kept clear of the figure: pinned to top-right + bottom) ──
  // current scale: how many primitives the top coarse unit now stands for.
  // Driven by `shownLevel` so the count always matches the structure drawn.
  const partsPer = Math.pow(n, shownLevel);
  ctx.fillStyle=hexA(C_BLOCK,0.92); ctx.font='600 11px "Segoe UI",system-ui,sans-serif';
  ctx.textAlign='right'; ctx.textBaseline='top';
  ctx.fillText(`level ${shownLevel}  ·  1 unit = ${partsPer} ${partsPer===1?'part':'parts'}`, x+w-13, y+12);

  // the per-step factor, declared along the bottom - the whole content of ψ
  ctx.textAlign='center'; ctx.textBaseline='bottom';
  ctx.font='italic 12.5px "Segoe UI",system-ui,sans-serif';
  ctx.fillStyle=hexA(C_LAM,0.95);
  ctx.fillText('each step:  χ → λ₀ χ      (one decimation, one factor of λ₀)', cx, y+h-13);
}

// ════════════════════════════════════════════════════════════════════
//  RIGHT - the log-N staircase:  L_min(N) ~ log_λ₀ N.
//  Each level buys a factor λ₀ in governable size N → one tread.
// ════════════════════════════════════════════════════════════════════
function drawStaircase(x,y,w,h){
  panel(x,y,w,h,'The staircase   L_min ~ log_λ₀ N');

  // ml gives the rotated y-axis title its own column to the left of the L= tick
  // labels (they used to graze each other); mb leaves a two-line caption band
  // below the axis (x-axis label + punchline equation, stacked and centred) so
  // neither collides at a short embed height
  const ml=54, mt=42, mb=56, mr=18;
  const ax=x+ml, ay=y+mt, aw=w-ml-mr, ah=h-mt-mb;

  const Nc1=50;                                   // single-level critical size (visual anchor)
  const LY0=0, LY1=MAXL+1.15;
  // x-axis spans log10 N from Nc1 down a touch to one tread past the last level
  const lnLo=Math.log10(Nc1)-0.55;
  const lnHi=Math.log10(Nc1)+ (MAXL+0.55)*Math.log10(lambda0);
  const sx=(ln)=>ax + (ln-lnLo)/(lnHi-lnLo)*aw;
  const sy=(L)=>ay+ah - (L-LY0)/(LY1-LY0)*ah;

  // axes
  ctx.strokeStyle='rgba(255,255,255,0.18)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(ax, sy(LY0)); ctx.lineTo(ax+aw, sy(LY0)); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(ax, sy(LY0)); ctx.lineTo(ax, sy(LY1)); ctx.stroke();

  // continuous floor L_min(N) = 1 + log_λ0 (N/Nc1)
  const Lcont=(N)=> 1 + Math.log(N/Nc1)/Math.log(lambda0);
  ctx.beginPath(); let pen=false;
  for(let i=0;i<=160;i++){
    const ln=lnLo+(i/160)*(lnHi-lnLo); const N=Math.pow(10,ln); const L=Lcont(N);
    if(L<LY0){ pen=false; continue; }
    const X=sx(ln), Y=sy(Math.min(LY1,L));
    if(!pen){ctx.moveTo(X,Y);pen=true;} else ctx.lineTo(X,Y);
  }
  ctx.strokeStyle=hexA(C_FLOOR,0.32); ctx.lineWidth=1.4; ctx.setLineDash([4,4]); ctx.stroke(); ctx.setLineDash([]);

  // discrete staircase: treads at L=1..(level), each riser one factor λ₀ wide
  const liveTop = level + (folding?ease(anim):0);
  ctx.strokeStyle=C_FLOOR; ctx.lineWidth=2.6; ctx.lineJoin='round';
  ctx.beginPath(); let started=false;
  for(let L=1; L<=level+(folding?1:0); L++){
    const nLo=Nc1*Math.pow(lambda0,L-1), nHi=Nc1*Math.pow(lambda0,L);
    const xLo=sx(Math.log10(nLo)), xHi=sx(Math.log10(nHi)), yL=sy(L);
    if(L>liveTop+1) break;
    const frac=Math.max(0,Math.min(1, liveTop-(L-1)));   // how much of this tread is drawn
    const xEnd=xLo+(xHi-xLo)*frac;
    if(!started){ ctx.moveTo(xLo,yL); started=true; } else ctx.lineTo(xLo,yL);
    ctx.lineTo(xEnd,yL);
    if(frac>=1 && L<level+(folding?1:0)) ctx.lineTo(xHi, sy(L+1));  // riser
  }
  if(started) ctx.stroke();

  // riser brackets labelled ×λ₀ (only between settled treads - no overlap)
  ctx.font='10.5px "Segoe UI",system-ui,sans-serif';
  for(let L=1; L<level; L++){
    const xHi=sx(Math.log10(Nc1*Math.pow(lambda0,L)));
    ctx.strokeStyle=hexA(C_LAM,0.45); ctx.lineWidth=1; ctx.setLineDash([2,3]);
    ctx.beginPath(); ctx.moveTo(xHi, sy(L)); ctx.lineTo(xHi, sy(L+1)); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle=hexA(C_LAM,0.9); ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillText('×λ₀', xHi+5, sy(L+0.5));
  }

  // operating-point dots: each completed level marks (N_c(L), L)
  for(let L=1; L<=level; L++){
    const X=sx(Math.log10(Nc1*Math.pow(lambda0,L-1)));
    ctx.fillStyle=C_BLOCK; ctx.beginPath(); ctx.arc(X, sy(L), 3.6, 0, 7); ctx.fill();
  }

  // axis labels
  ctx.fillStyle=MUTED; ctx.font='11px "Segoe UI",system-ui,sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.fillText('system size N  (log scale)', ax+aw/2, sy(LY0)+13);
  ctx.save(); ctx.translate(x+13, ay+ah/2); ctx.rotate(-Math.PI/2);
  ctx.textAlign='center'; ctx.textBaseline='top'; ctx.fillText('hierarchy depth L', 0, 0); ctx.restore();
  // L ticks
  ctx.textAlign='right'; ctx.textBaseline='middle';
  for(let L=1;L<=MAXL;L++){ ctx.fillStyle=MUTED; ctx.fillText('L='+L, ax-6, sy(L)); }

  // punchline equation: a second centred line BELOW the x-axis label, so the
  // axis caption and the takeaway never share a row (the old bottom-right
  // placement collided with "(log scale)" in a narrow panel)
  ctx.fillStyle=hexA(C_FLOOR,0.95); ctx.font='italic 12.5px "Segoe UI",system-ui,sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.fillText('N_c(L) = N_c(1) · λ₀^(L−1)', ax+aw/2, sy(LY0)+30);
}

// ─── main loop (slow, watchable pacing) ────────────────────────────
function tick(){
  if(folding){
    anim += 0.012;                     // slow fold: ~1.4s per coarse-graining step
    if(anim>=1){ anim=0; folding=false; level=Math.min(MAXL, level+1); hold=0; }
  } else if(auto){
    hold++;
    if(hold>78){                       // dwell ~1.3s on each level before the next
      if(level<MAXL){ folding=true; anim=0; }
      else if(hold>78+150){ level=0; hold=0; }   // pause on the full tree, then restart
    }
  }
  ctx.clearRect(0,0,W,H); ctx.fillStyle=BG; ctx.fillRect(0,0,W,H);
  const gap=14, halfW=(W-gap*3)/2;
  drawZoom(gap, 8, halfW, H-16);
  drawStaircase(gap*2+halfW, 8, halfW, H-16);
  requestAnimationFrame(tick);
}

// ─── controls ──────────────────────────────────────────────────────
const autoBtn=document.getElementById('autoBtn');
function setAuto(on){ auto=on; autoBtn.classList.toggle('active',on); if(on){hold=0;} }
autoBtn.addEventListener('click', ()=> setAuto(!auto));
document.getElementById('stepBtn').addEventListener('click', ()=>{
  setAuto(false); if(!folding && level<MAXL){ folding=true; anim=0; }
});
document.getElementById('resetBtn').addEventListener('click', ()=>{
  level=0; folding=false; anim=0; hold=0; setAuto(true);
});
document.getElementById('nn').addEventListener('input', e=>{
  n=parseInt(e.target.value,10); document.getElementById('nnVal').textContent=n;
  level=0; folding=false; anim=0; hold=0;
});
document.getElementById('lam').addEventListener('input', e=>{
  lambda0=parseFloat(e.target.value); document.getElementById('lamVal').textContent=lambda0.toFixed(2);
});

requestAnimationFrame(tick);
</script>
</body>
</html>
