<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Many Faces, One Loop</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { width: 100%; height: 100%; overflow: hidden; }

  body {
    background: #0a0d12;
    color: #c8cad0;
    font-family: 'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* The applet fills its iframe completely: a canvas stage + a thin control bar
     pinned to the bottom. No outer title / subtitle / hint - the slide supplies
     the title and caption. This is what lets it fit with no scroll. */
  #stage {
    position: absolute;
    inset: 0;
    background: #0a0d12;
  }
  #cv { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }

  #bar {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.4rem;
    padding: 0.4rem 0.5rem;
    background: linear-gradient(to top, rgba(10,13,18,0.92), rgba(10,13,18,0));
    z-index: 2;
  }
  #bar button {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.14);
    color: #c8cad0;
    padding: 0.28rem 0.66rem;
    border-radius: 999px;
    font-size: 0.74rem;
    line-height: 1;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }
  #bar button:hover { background: rgba(255,255,255,0.12); }
  #bar button.active {
    border-color: #6b8aaf;
    background: rgba(107,138,175,0.22);
    color: #eef1f6;
  }
  #bar .gap { width: 0.5rem; }
</style>
</head>
<body>

<div id="stage">
  <canvas id="cv"></canvas>
  <div id="bar">
    <button data-face="0">Evolution</button>
    <button data-face="1">Gradient descent</button>
    <button data-face="2">Market</button>
    <button data-face="3">Reservoir</button>
    <span class="gap"></span>
    <button id="allBtn">All four</button>
  </div>
</div>

<script>
"use strict";
// ─── palette ──────────────────────────────────────────────────
const BG     = '#0a0d12';
const INK    = '#e6e8ee';
const MUTED  = '#8b93a3';
// the four legs of the loop get fixed colours, shared across every face
const C_CTRL  = '#e8a84c';   // control - the slow variable being tuned (gold)
const C_ENV   = '#d4826a';   // environment - the field the control makes (vermilion)
const C_STATE = '#7ec4a5';   // state - the fast parts living in it (green)
const C_MEAS  = '#5cacee';   // measure - the coarse, delayed read (blue)

// ─── canvas setup (DPR-correct → crisp at 2x) ─────────────────
const stage = document.getElementById('stage');
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
let W = 0, H = 0, DPR = 1;

function resize() {
  DPR = Math.max(1, window.devicePixelRatio || 1);
  const rect = stage.getBoundingClientRect();
  W = Math.max(1, Math.round(rect.width));
  H = Math.max(1, Math.round(rect.height));
  cv.width = Math.round(W * DPR);
  cv.height = Math.round(H * DPR);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);
// iframes do not always fire window resize on layout - observe the stage too.
if (window.ResizeObserver) { new ResizeObserver(resize).observe(stage); }
resize();

// ─── deterministic RNG (same picture every run) ───────────────
function mulberry32(a) {
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
const rng = mulberry32(20260601);
// fixed jitter for the evolution cloud so it reads as a steady population, not noise
const CLOUD = Array.from({ length: 46 }, () => (rng() * 2 - 1));

// ─── faces ────────────────────────────────────────────────────
// Each face re-skins the SAME four-node loop. The skin words label the ring;
// the little simulation shows that face actually running the loop.
const FACES = [
  { name: 'Evolution',        ctrl: 'trait mean',     env: 'fitness landscape', state: 'the population', meas: 'who survives' },
  { name: 'Gradient descent', ctrl: 'the weights',    env: 'loss surface',      state: 'the output',     meas: 'the gradient'  },
  { name: 'A market',         ctrl: 'the price',      env: 'supply & demand',   state: 'trades',         meas: 'excess demand' },
  { name: 'A reservoir',      ctrl: 'readout weights', env: 'recurrent state',  state: 'the signal',     meas: 'output error'  },
];

// ── per-face sim state (a slow control + a fast state) ──
// Markets and reservoirs are time-series, so we pre-warm a few seconds of history
// at reset. That way the panels show their characteristic shape - the market's
// cobweb overshoot, the reservoir's output chasing its target - from the first
// frame, instead of a flat line that only develops after several seconds.
const sim = [];
function resetSim() {
  sim.length = 0;
  sim.push({ t: 0, mean: -1.3, peak: 0.7 });                 // evolution
  sim.push({ t: 0, x: -1.6, v: 0, hist: [] });               // gradient descent
  sim.push({ t: 0, price: 0.30, eq: 0.62, hist: [] });       // market
  sim.push({ t: 0, w: 0.20, out: 0, hist: [] });             // reservoir
  // warm the two time-series faces so they read on the first frame
  for (let k = 0; k < 150; k++) { stepMarket(sim[2]); stepReservoir(sim[3]); }
  sim[2].t = 0; sim[3].t = 0;                                // restart clocks; keep history
}

// ─── view state ───────────────────────────────────────────────
let mode = 'cycle';        // 'cycle' | 'single' | 'all'
let activeFace = 0;
let cycleIdx = 0;
let faceTimer = 0;
const FACE_FRAMES = 540;   // ~9s per face in cycle mode - slow enough to follow
let loopPhase = 0;         // 0..1 pointer running the ring
const LOOP_SPEED = 0.0016; // ~10.4s per full lap - slow, legible

// ─── small helpers ────────────────────────────────────────────
function rr(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
function hexA(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
// fonts scale with panel size so a single big panel and four small ones both read
function fpx(big, small) { return big ? small * 1.45 : small; }

// ─── per-face mini-simulations, drawn into a given panel rect ──
function drawFace(faceIdx, rect, big) {
  const f = FACES[faceIdx];
  const s = sim[faceIdx];
  const pad = big ? 16 : 9;
  const px = rect.x + pad, py = rect.y + pad;
  const pw = rect.w - 2*pad;

  // panel frame
  ctx.strokeStyle = 'rgba(255,255,255,0.10)';
  ctx.lineWidth = 1;
  rr(rect.x + 1, rect.y + 1, rect.w - 2, rect.h - 2, 7); ctx.stroke();

  // title
  ctx.fillStyle = INK;
  ctx.font = `600 ${big ? 18 : 11}px "Segoe UI", system-ui, sans-serif`;
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText(f.name, px, py);

  // sim viewport sits below the title with a little headroom
  const titleH = big ? 30 : 18;
  const vx = px, vy = py + titleH;
  const vw = pw, vh = rect.h - pad*2 - titleH;

  ctx.save();
  rr(vx, vy, vw, vh, 4); ctx.clip();
  if (faceIdx === 0) drawEvolution(s, vx, vy, vw, vh, big);
  else if (faceIdx === 1) drawGradient(s, vx, vy, vw, vh, big);
  else if (faceIdx === 2) drawMarket(s, vx, vy, vw, vh, big);
  else drawReservoir(s, vx, vy, vw, vh, big);
  ctx.restore();
}

// small caption inside a panel's plot, top-left, never overlapping the curve area badly
function plotTag(text, x, y, big, col) {
  ctx.fillStyle = col || MUTED;
  ctx.font = `${fpx(big, 9.5)}px "Segoe UI", system-ui, sans-serif`;
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText(text, x + 2, y + 2);
}

// Evolution: a population cloud (histogram of dots) climbing a fitness hill
// whose PEAK drifts as the population arrives - the field it reshapes by climbing.
function drawEvolution(s, x, y, w, h, big) {
  s.t += 0.016;
  s.peak = 0.55 * Math.sin(s.t * 0.32);          // the peak the population pushes
  s.mean += (s.peak - s.mean) * 0.018;           // selection drags the mean uphill (lag)
  const U0 = -2, U1 = 2;
  const land = (u) => Math.exp(-Math.pow((u - s.peak) / 0.62, 2));   // 0..1
  const baseY = y + h - 10;
  const topY = y + 14;
  const sx = (u) => x + (u - U0) / (U1 - U0) * w;
  const sy = (v) => baseY - v * (baseY - topY);

  // landscape fill + curve
  ctx.beginPath();
  ctx.moveTo(sx(U0), baseY);
  for (let i = 0; i <= 90; i++) { const u = U0 + (i/90)*(U1-U0); ctx.lineTo(sx(u), sy(land(u))); }
  ctx.lineTo(sx(U1), baseY); ctx.closePath();
  ctx.fillStyle = hexA(C_ENV, 0.10); ctx.fill();
  ctx.beginPath();
  for (let i = 0; i <= 90; i++) { const u = U0 + (i/90)*(U1-U0); const X = sx(u), Y = sy(land(u)); i ? ctx.lineTo(X, Y) : ctx.moveTo(X, Y); }
  ctx.strokeStyle = hexA(C_ENV, 0.9); ctx.lineWidth = big ? 2 : 1.4; ctx.stroke();

  // moving peak marker
  ctx.strokeStyle = hexA(C_ENV, 0.45); ctx.lineWidth = 1; ctx.setLineDash([3,3]);
  ctx.beginPath(); ctx.moveTo(sx(s.peak), sy(1)); ctx.lineTo(sx(s.peak), baseY); ctx.stroke(); ctx.setLineDash([]);

  // population cloud: dots sitting ON the curve, clustered around the mean
  const n = big ? CLOUD.length : 18;
  const spread = 0.34;
  for (let i = 0; i < n; i++) {
    const u = s.mean + CLOUD[i % CLOUD.length] * spread;
    const fit = land(u);
    ctx.fillStyle = hexA(C_STATE, 0.32 + 0.6*fit);
    ctx.beginPath(); ctx.arc(sx(u), sy(fit) - (big?4:2.5), big?2.6:1.7, 0, 7); ctx.fill();
  }
  plotTag('fitness ↑', x, y, big);
}

// Gradient descent: a ball rolling DOWNHILL on a loss surface that tilts under it.
// It descends to the basin, then the basin shifts and it must roll again - so it
// is visibly descending, not parked at the bottom.
function drawGradient(s, x, y, w, h, big) {
  s.t += 0.016;
  const tilt = 0.7 * Math.sin(s.t * 0.28);                 // the surface its own data defines, moving
  const loss = (u) => 0.42*u*u - 0.5*Math.cos(2.2*u) + tilt*u + 1.0;
  const dloss = (u) => 0.84*u + 0.5*2.2*Math.sin(2.2*u) + tilt;
  s.v = 0.9*s.v - 0.06*dloss(s.x);                          // momentum descent
  s.x += s.v;
  if (s.x < -1.95) { s.x = -1.95; s.v = Math.abs(s.v)*0.3; }
  if (s.x >  1.95) { s.x =  1.95; s.v = -Math.abs(s.v)*0.3; }
  const U0 = -2, U1 = 2;
  let lo = Infinity, hi = -Infinity;
  for (let i = 0; i <= 40; i++) { const v = loss(U0 + (i/40)*(U1-U0)); if (v<lo) lo=v; if (v>hi) hi=v; }
  const pad = (hi-lo)*0.12 || 0.1;
  const baseY = y + h - 8, topY = y + 12;
  const sx = (u) => x + (u - U0)/(U1-U0)*w;
  const sy = (v) => topY + (v - lo + pad) / ((hi - lo) + 2*pad) * (baseY - topY);
  ctx.beginPath();
  for (let i = 0; i <= 100; i++) { const u = U0 + (i/100)*(U1-U0); const X = sx(u), Y = sy(loss(u)); i ? ctx.lineTo(X, Y) : ctx.moveTo(X, Y); }
  ctx.strokeStyle = hexA(C_ENV, 0.9); ctx.lineWidth = big?2:1.4; ctx.stroke();
  // descent trail of the ball
  s.hist.push(s.x); if (s.hist.length > 26) s.hist.shift();
  for (let i = 0; i < s.hist.length; i++) {
    const a = i / s.hist.length;
    ctx.fillStyle = hexA(C_CTRL, 0.06 + 0.16*a);
    ctx.beginPath(); ctx.arc(sx(s.hist[i]), sy(loss(s.hist[i])), big?2.4:1.6, 0, 7); ctx.fill();
  }
  // the ball (the weights)
  const bx = sx(s.x), by = sy(loss(s.x));
  ctx.fillStyle = C_CTRL; ctx.shadowColor = C_CTRL; ctx.shadowBlur = big?10:5;
  ctx.beginPath(); ctx.arc(bx, by, big?5:3.2, 0, 7); ctx.fill(); ctx.shadowBlur = 0;
  plotTag('loss ↓', x, y, big);
}

// Market: price chases a moving equilibrium with delay → cobweb overshoot. Smooth
// line, dashed equilibrium it shifts. The pronounced over/undershoot and the slow
// rolling line distinguish it from the reservoir's fast recurrent wiggle.
function stepMarket(s) {
  s.t += 0.016;
  s.eq = 0.55 + 0.22*Math.sin(s.t*0.42);
  const err = s.eq - s.price;
  s.price += err * 0.16 + 0.11*Math.sin(s.t*2.3)*Math.abs(err);   // delayed → visible over/undershoot
  s.hist.push(s.price); if (s.hist.length > 170) s.hist.shift();
}
function drawMarket(s, x, y, w, h, big) {
  stepMarket(s);
  const vmin = 0.05, vmax = 1.05;
  const baseY = y + h - 8, topY = y + 12;
  const sy = (v) => baseY - (v - vmin)/(vmax - vmin)*(baseY - topY);
  // equilibrium (the level the price itself shifts)
  ctx.strokeStyle = hexA(C_ENV, 0.7); ctx.lineWidth = 1.2; ctx.setLineDash([5,4]);
  ctx.beginPath(); ctx.moveTo(x, sy(s.eq)); ctx.lineTo(x+w, sy(s.eq)); ctx.stroke(); ctx.setLineDash([]);
  // price series
  ctx.beginPath();
  for (let i = 0; i < s.hist.length; i++) { const X = x + (i/(s.hist.length-1||1))*w; const Y = sy(s.hist[i]); i ? ctx.lineTo(X, Y) : ctx.moveTo(X, Y); }
  ctx.strokeStyle = C_CTRL; ctx.lineWidth = big?2.2:1.5; ctx.stroke();
  ctx.fillStyle = C_CTRL; ctx.beginPath(); ctx.arc(x + (s.hist.length?w:0), sy(s.price), big?4:2.6, 0, 7); ctx.fill();
  plotTag('price', x, y, big, hexA(C_CTRL,0.95));
  ctx.textAlign = 'right'; ctx.textBaseline = 'top';
  ctx.fillStyle = hexA(C_ENV, 0.9); ctx.font = `${fpx(big,9.5)}px "Segoe UI", system-ui, sans-serif`;
  ctx.fillText('clears', x + w - 2, y + 2);
}

// Reservoir: a wiggly recurrent signal drives an output that chases a target as the
// readout weight adapts. The fast wiggle distinguishes it from the smooth market.
function stepReservoir(s) {
  s.t += 0.016;
  s.target = 0.5 + 0.32*Math.sin(s.t*0.5);
  const state = 0.5 + 0.42*Math.sin(s.t*3.0) + 0.2*Math.sin(s.t*7.3+1.0);    // recurrent signal
  s.out = s.w * state;
  s.w += 0.05 * (s.target - s.out) * state;                                  // readout learns
  s.hist.push([s.out, s.target]); if (s.hist.length > 170) s.hist.shift();
}
function drawReservoir(s, x, y, w, h, big) {
  stepReservoir(s);
  const vmin = -0.15, vmax = 1.15;
  const baseY = y + h - 8, topY = y + 12;
  const sy = (v) => baseY - (v - vmin)/(vmax - vmin)*(baseY - topY);
  // target (dashed)
  ctx.beginPath();
  for (let i = 0; i < s.hist.length; i++) { const X = x + (i/(s.hist.length-1||1))*w; const Y = sy(s.hist[i][1]); i ? ctx.lineTo(X, Y) : ctx.moveTo(X, Y); }
  ctx.strokeStyle = hexA(C_ENV, 0.7); ctx.lineWidth = big?2:1.4; ctx.setLineDash([6,4]); ctx.stroke(); ctx.setLineDash([]);
  // output (the chasing signal)
  ctx.beginPath();
  for (let i = 0; i < s.hist.length; i++) { const X = x + (i/(s.hist.length-1||1))*w; const Y = sy(s.hist[i][0]); i ? ctx.lineTo(X, Y) : ctx.moveTo(X, Y); }
  ctx.strokeStyle = C_STATE; ctx.lineWidth = big?2.2:1.5; ctx.stroke();
  ctx.fillStyle = C_STATE; ctx.beginPath(); ctx.arc(x + (s.hist.length?w:0), sy(s.out), big?4:2.6, 0, 7); ctx.fill();
  plotTag('output', x, y, big, hexA(C_STATE,0.95));
  ctx.textAlign = 'right'; ctx.textBaseline = 'top';
  ctx.fillStyle = hexA(C_ENV, 0.9); ctx.font = `${fpx(big,9.5)}px "Segoe UI", system-ui, sans-serif`;
  ctx.fillText('target', x + w - 2, y + 2);
}

// ─── the shared loop diagram ──────────────────────────────────
// Four nodes on a ring: CONTROL → ENVIRONMENT → STATE → MEASURE → back.
// Labels live in side-gutters with generous radius so they never touch the ring
// or each other. A slow pulse runs the ring; the active leg lights in its colour.
function drawLoop(rect, faceIdx, showSkin) {
  const f = FACES[faceIdx];
  // reserve gutters for labels so the ring is comfortably inset
  const gx = rect.x + rect.w * 0.30;
  const gw = rect.w * 0.40;
  const cx = gx + gw / 2;
  const cy = rect.y + rect.h * 0.5;
  const R = Math.min(gw, rect.h - 70) * 0.5;

  const nodes = [
    { a: -Math.PI/2, key: 'top',    label: 'CONTROL',     sub: showSkin ? f.ctrl  : 'slow variable',  col: C_CTRL  },
    { a: 0,          key: 'right',  label: 'ENVIRONMENT', sub: showSkin ? f.env   : 'the field',      col: C_ENV   },
    { a: Math.PI/2,  key: 'bottom', label: 'STATE',       sub: showSkin ? f.state : 'fast parts',     col: C_STATE },
    { a: Math.PI,    key: 'left',   label: 'MEASURE',     sub: showSkin ? f.meas  : 'coarse, delayed', col: C_MEAS  },
  ];
  const pos = nodes.map(n => ({ x: cx + R*Math.cos(n.a), y: cy + R*Math.sin(n.a), ...n }));

  // arcs with a travelling highlight
  for (let i = 0; i < 4; i++) {
    const a = pos[i], b = pos[(i+1)%4];
    ctx.strokeStyle = 'rgba(255,255,255,0.16)';
    ctx.lineWidth = 2;
    arrowArc(a, b, cx, cy, R, false, 0);
    const segPhase = (loopPhase*4) - i;
    if (segPhase >= 0 && segPhase < 1) {
      ctx.strokeStyle = a.col; ctx.lineWidth = 3.4;
      arrowArc(a, b, cx, cy, R, true, segPhase);
    }
  }

  // nodes + labels in gutters (no overlap by construction)
  for (const n of pos) {
    ctx.fillStyle = BG; ctx.strokeStyle = n.col; ctx.lineWidth = 2.2;
    ctx.beginPath(); ctx.arc(n.x, n.y, 7, 0, 7); ctx.fill(); ctx.stroke();

    let lx, ly, align, baseLabel, baseSub;
    if (n.key === 'top')    { lx = n.x;        ly = n.y - 16; align = 'center'; baseLabel = 'bottom'; }
    if (n.key === 'bottom') { lx = n.x;        ly = n.y + 16; align = 'center'; baseLabel = 'top'; }
    if (n.key === 'right')  { lx = n.x + 16;   ly = n.y;      align = 'left';   baseLabel = 'middle'; }
    if (n.key === 'left')   { lx = n.x - 16;   ly = n.y;      align = 'right';  baseLabel = 'middle'; }

    ctx.textAlign = align;
    // primary label
    ctx.fillStyle = n.col;
    ctx.font = '700 12px "Segoe UI", system-ui, sans-serif';
    if (n.key === 'top')    { ctx.textBaseline = 'bottom'; ctx.fillText(n.label, lx, ly); ctx.fillStyle = MUTED; ctx.font = '11px "Segoe UI", system-ui, sans-serif'; ctx.fillText(n.sub, lx, ly - 14); }
    else if (n.key === 'bottom') { ctx.textBaseline = 'top'; ctx.fillText(n.label, lx, ly); ctx.fillStyle = MUTED; ctx.font = '11px "Segoe UI", system-ui, sans-serif'; ctx.fillText(n.sub, lx, ly + 14); }
    else { // left / right - label then sub stacked, vertically centred
      ctx.textBaseline = 'bottom'; ctx.fillText(n.label, lx, ly + 1);
      ctx.fillStyle = MUTED; ctx.font = '11px "Segoe UI", system-ui, sans-serif';
      ctx.textBaseline = 'top'; ctx.fillText(n.sub, lx, ly + 3);
    }
  }

  // the endogeneity arc (control → environment) carries the one idea-label, placed
  // OUTSIDE the top-right arc, clear of nodes and labels
  ctx.fillStyle = hexA(C_ENV, 0.9);
  ctx.font = 'italic 11px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  const ex = cx + (R + 16) * Math.cos(-Math.PI/4);
  const ey = cy + (R + 16) * Math.sin(-Math.PI/4);
  ctx.fillText('makes its own', ex, ey - 6);
  ctx.fillText('field', ex, ey + 6);
}

// arc segment between two ring nodes, gap-trimmed off the node circles, optional moving dot
function arrowArc(a, b, cx, cy, R, withDot, p) {
  const gap = 0.24;                       // angular gap so arcs do not touch node circles
  let a0 = Math.atan2(a.y - cy, a.x - cx);
  let a1 = Math.atan2(b.y - cy, b.x - cx);
  if (a1 < a0) a1 += Math.PI*2;
  const s0 = a0 + gap, s1 = a1 - gap;
  ctx.beginPath(); ctx.arc(cx, cy, R, s0, s1); ctx.stroke();
  // arrowhead at the s1 end
  const tx = cx + R*Math.cos(s1), ty = cy + R*Math.sin(s1);
  const tang = s1 + Math.PI/2;            // tangent direction (clockwise)
  ctx.beginPath();
  ctx.moveTo(tx, ty);
  ctx.lineTo(tx - 8*Math.cos(tang - 0.4), ty - 8*Math.sin(tang - 0.4));
  ctx.lineTo(tx - 8*Math.cos(tang + 0.4), ty - 8*Math.sin(tang + 0.4));
  ctx.closePath();
  ctx.fillStyle = ctx.strokeStyle; ctx.fill();
  if (withDot) {
    const ad = s0 + (s1 - s0)*p;
    const dx = cx + R*Math.cos(ad), dy = cy + R*Math.sin(ad);
    ctx.fillStyle = ctx.strokeStyle; ctx.shadowColor = ctx.strokeStyle; ctx.shadowBlur = 12;
    ctx.beginPath(); ctx.arc(dx, dy, 4.2, 0, 7); ctx.fill(); ctx.shadowBlur = 0;
  }
}

// ─── layout / scenes ──────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = BG; ctx.fillRect(0, 0, W, H);

  loopPhase = (loopPhase + LOOP_SPEED) % 1;
  const barH = 38;                 // leave room for the control bar at the bottom

  if (mode === 'all') {
    // four small panels on the left, the shared (generic) loop on the right
    const m = 12, gap = 10;
    const colW = W * 0.50;
    const cellW = (colW - m - gap) / 2;
    const cellH = (H - barH - m - gap) / 2;
    const cells = [
      { x: m,             y: m,              w: cellW, h: cellH },
      { x: m+cellW+gap,   y: m,              w: cellW, h: cellH },
      { x: m,             y: m+cellH+gap,    w: cellW, h: cellH },
      { x: m+cellW+gap,   y: m+cellH+gap,    w: cellW, h: cellH },
    ];
    for (let i = 0; i < 4; i++) drawFace(i, cells[i], false);
    drawLoop({ x: colW, y: 0, w: W - colW, h: H - barH }, 0, false);
  } else {
    const idx = (mode === 'single') ? activeFace : cycleIdx;
    const m = 12;
    const split = W * 0.50;
    drawFace(idx, { x: m, y: m, w: split - m - 6, h: H - barH - m }, true);
    drawLoop({ x: split, y: 0, w: W - split - 4, h: H - barH }, idx, true);

    if (mode === 'cycle') {
      faceTimer++;
      if (faceTimer >= FACE_FRAMES) { faceTimer = 0; cycleIdx = (cycleIdx + 1) % 4; }
      // progress ticks centred under the loop, above the bar
      const tx = split + (W - split) / 2;
      for (let i = 0; i < 4; i++) {
        ctx.fillStyle = (i === cycleIdx) ? C_MEAS : 'rgba(255,255,255,0.20)';
        ctx.beginPath(); ctx.arc(tx - 24 + i*16, H - barH - 6, 3, 0, 7); ctx.fill();
      }
    }
  }

  requestAnimationFrame(draw);
}

// ─── controls ─────────────────────────────────────────────────
const faceButtons = [...document.querySelectorAll('button[data-face]')];
const allBtn = document.getElementById('allBtn');
function setActiveButton(btn) {
  faceButtons.forEach(b => b.classList.remove('active'));
  allBtn.classList.remove('active');
  if (btn) btn.classList.add('active');
}
faceButtons.forEach(btn => {
  btn.addEventListener('click', () => {
    mode = 'single'; activeFace = parseInt(btn.dataset.face, 10);
    setActiveButton(btn);
  });
});
allBtn.addEventListener('click', () => { mode = 'all'; setActiveButton(allBtn); });
// click the stage (not a button) to resume autoplay
cv.addEventListener('click', () => { mode = 'cycle'; setActiveButton(null); });

// ─── start ────────────────────────────────────────────────────
resetSim();                       // seeds + warms the time-series faces
requestAnimationFrame(draw);
</script>
</body>
</html>
