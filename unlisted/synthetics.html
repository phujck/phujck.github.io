<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synthetics</title>
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #0a0e1a;
  --bg-secondary: #111827;
  --bg-card: rgba(255, 255, 255, 0.04);
  --border-glass: rgba(255, 255, 255, 0.08);
  --text-primary: #e8e6e3;
  --text-secondary: #9ca3af;
  --accent: #c9a96e;
  --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-display: 'Outfit', var(--font-body);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 24px;
  background:
    radial-gradient(circle at top left, rgba(201, 169, 110, 0.10), transparent 35%),
    linear-gradient(180deg, #0a0e1a 0%, #060912 100%);
  color: var(--text-primary);
  font-family: var(--font-body);
}

.shell {
  width: min(1200px, 100%);
  border: 1px solid var(--border-glass);
  border-radius: 24px;
  background: var(--bg-card);
  box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
  overflow: hidden;
}

.header {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border-glass);
}

.eyebrow {
  font-size: 12px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 8px;
}

.title {
  font-family: var(--font-display);
  font-size: clamp(28px, 4vw, 44px);
  line-height: 1.05;
  margin: 0;
}

.subtitle {
  margin: 10px 0 0;
  color: var(--text-secondary);
  font-size: 15px;
}

.player-wrap {
  padding: 20px;
}

video {
  width: 100%;
  display: block;
  border-radius: 16px;
  background: var(--bg-secondary);
}
</style>
</head>
<body>
  <main class="shell">
    <header class="header">
      <div class="eyebrow">Unlisted</div>
      <h1 class="title">Synthetics</h1>
      <p class="subtitle">Private playback page for the residency deck video.</p>
    </header>

    <div class="player-wrap">
      <video controls preload="metadata" playsinline>
        <source src="/assets/unlisted/synthetics.mp4" type="video/mp4">
      </video>
    </div>
  </main>
</body>
</html>
